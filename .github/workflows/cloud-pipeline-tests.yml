name: "Cloud Pipeline: Stage 1-3 Unit Tests"

on:
  push:
    branches: [main, master, develop]
    paths:
      - "cloud/processor/pipeline/**"
      - "cloud/processor/tests/**"
      - "cloud/processor/requirements*.txt"
      - ".github/workflows/cloud-pipeline-tests.yml"
  pull_request:
    branches: [main, master, develop]
    paths:
      - "cloud/processor/pipeline/**"
      - "cloud/processor/tests/**"
      - "cloud/processor/requirements*.txt"

jobs:
  test:
    name: Pipeline Unit Tests (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: cloud/processor

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: cloud/processor/requirements-test.txt

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Run Stage 1-3 tests
        run: pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloud-pipeline-test-results
          path: cloud/processor/test-results.xml
          retention-days: 14
