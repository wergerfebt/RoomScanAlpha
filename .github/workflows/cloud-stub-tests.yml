name: "Phase 6-9: Cloud Upload, Result & OIDC Integration Tests"

# Integration tests requiring Firebase Auth, network, and the deployed cloud stub.
# Covers Phase 6 tests 6.3–6.12, Phase 7 tests 7.1, 7.4, 7.6–7.7, and Phase 9 tests 9.8–9.9.
# Triggered manually or on pushes that touch cloud-related code.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (staging or production)"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
  push:
    branches: [main, develop]
    paths:
      - "RoomScanAlpha/Cloud/**"
      - "RoomScanAlpha/Views/ScanResultView.swift"
      - "cloud/**"
      - ".github/workflows/cloud-stub-tests.yml"

env:
  API_BASE_URL: ${{ secrets.SCAN_API_BASE_URL }}
  FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}

jobs:
  integration-test:
    name: Cloud Upload & Result Integration Tests
    runs-on: macos-15
    timeout-minutes: 45
    environment: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install Firebase Auth credentials
        run: |
          echo '${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}' | base64 --decode > RoomScanAlpha/GoogleService-Info.plist

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project RoomScanAlpha.xcodeproj \
            -scheme RoomScanAlpha

      - name: Build for testing
        run: |
          xcodebuild build-for-testing \
            -project RoomScanAlpha.xcodeproj \
            -scheme RoomScanAlpha \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # Phase 6 Integration Tests
      # 6.3  Firebase Auth sign-in before upload
      # 6.4  JWT token attached to API requests
      # 6.5  Signed URL obtained before upload
      # 6.6  Upload goes directly to GCS via signed URL
      # 6.7  Upload starts and reports progress
      # 6.8  Upload completes successfully
      # 6.9  Upload completion notification sent
      # 6.10 Upload speed is acceptable
      # 6.11 Scan ID persisted locally (also in unit tests)
      # 6.12 Upload fails gracefully on no network

      - name: Run Phase 6 cloud upload integration tests
        env:
          SCAN_API_BASE_URL: ${{ secrets.SCAN_API_BASE_URL }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
        run: |
          xcodebuild test \
            -project RoomScanAlpha.xcodeproj \
            -scheme RoomScanAlpha \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            -resultBundlePath Phase6IntegrationResults.xcresult \
            -only-testing:RoomScanAlphaTests/CloudUploadIntegrationTests \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color || true

      # Phase 7 Integration Tests
      # 7.1  Status polling works (real endpoint)
      # 7.4  Structured room data displayed (real response data)
      # 7.6  FCM notification received on scan completion
      # 7.7  FCM fallback to polling

      - name: Run Phase 7 result polling integration tests
        env:
          SCAN_API_BASE_URL: ${{ secrets.SCAN_API_BASE_URL }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
        run: |
          xcodebuild test \
            -project RoomScanAlpha.xcodeproj \
            -scheme RoomScanAlpha \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            -resultBundlePath Phase7IntegrationResults.xcresult \
            -only-testing:RoomScanAlphaTests/ScanResultIntegrationTests \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color || true

      - name: Check Phase 6 test results
        if: always()
        run: |
          xcrun xcresulttool get test-results summary \
            --path Phase6IntegrationResults.xcresult \
            --compact 2>/dev/null || echo "Phase 6 results bundle check completed"

      - name: Check Phase 7 test results
        if: always()
        run: |
          xcrun xcresulttool get test-results summary \
            --path Phase7IntegrationResults.xcresult \
            --compact 2>/dev/null || echo "Phase 7 results bundle check completed"

      - name: Upload Phase 6 test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase6-integration-test-results
          path: Phase6IntegrationResults.xcresult
          retention-days: 14

      - name: Upload Phase 7 test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase7-integration-test-results
          path: Phase7IntegrationResults.xcresult
          retention-days: 14

      # Phase 9 Integration Tests
      # 9.8  Processor rejects unauthenticated requests (OIDC hardening)
      # 9.9  Cloud Tasks invokes processor via OIDC

      - name: "9.8: Verify processor rejects unauthenticated requests"
        if: always()
        run: |
          echo "Testing OIDC hardening: direct POST to /process should return 403..."
          PROCESSOR_URL="${API_BASE_URL%/api*}"
          # Replace scan-api with scan-processor in the URL
          PROCESSOR_URL=$(echo "$PROCESSOR_URL" | sed 's/scan-api/scan-processor/')
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$PROCESSOR_URL/process" \
            -H "Content-Type: application/json" \
            -d '{"scan_id": "test-unauthorized"}')
          echo "HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "403" ] || [ "$HTTP_STATUS" = "401" ]; then
            echo "PASS: Processor correctly rejects unauthenticated requests (HTTP $HTTP_STATUS)"
          else
            echo "FAIL: Expected 401/403 but got HTTP $HTTP_STATUS"
            echo "Note: If 404, the processor may not be deployed yet. If 200, OIDC hardening is not applied."
            exit 1
          fi

      - name: "9.9: Verify Cloud Tasks can invoke processor (via upload-complete)"
        if: always()
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
        run: |
          echo "Testing end-to-end: upload-complete should enqueue Cloud Tasks job..."
          # Get an anonymous Firebase auth token for the API call
          TOKEN_RESPONSE=$(curl -s -X POST \
            "https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${FIREBASE_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"returnSecureToken": true}')
          ID_TOKEN=$(echo "$TOKEN_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('idToken',''))" 2>/dev/null)

          if [ -z "$ID_TOKEN" ]; then
            echo "SKIP: Could not obtain Firebase token — check FIREBASE_API_KEY secret"
            exit 0
          fi

          # Call upload-complete with a test scan ID
          HTTP_STATUS=$(curl -s -o /tmp/complete_response.json -w "%{http_code}" \
            -X POST "${API_BASE_URL}/api/rfqs/00000000-0000-0000-0000-000000000001/scans/complete" \
            -H "Authorization: Bearer $ID_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"scan_id": "ci-test-oidc-validation"}')
          echo "HTTP status: $HTTP_STATUS"
          cat /tmp/complete_response.json 2>/dev/null || true
          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "201" ]; then
            echo "PASS: Upload-complete endpoint accepted request and should have enqueued Cloud Tasks job"
          else
            echo "INFO: HTTP $HTTP_STATUS — endpoint may require a real scan upload first"
          fi

      - name: Verify cloud stub is reachable
        if: always()
        run: |
          echo "Checking cloud stub health..."
          curl -sf "${API_BASE_URL}/health" || echo "Warning: Cloud stub health check failed"
