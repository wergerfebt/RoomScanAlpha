// ============================================================
// MESH LOADING — from API (same as contractor view)
// ============================================================
function scanFilesBase(prefix) {
  const base = `${API_BASE}/api/rfqs/${currentRfqId}/scans/${currentScanId}/files/`;
  return prefix ? base + prefix + '/' : base;
}

function loadMesh(textureUrls, useStandard) {
  const resourcePath = scanFilesBase(useStandard ? 'standard' : null);
  const mtlUrl = resourcePath + 'textured.mtl';

  const mtlLoader = new MTLLoader();
  mtlLoader.setResourcePath(resourcePath);
  mtlLoader.setCrossOrigin('anonymous');
  mtlLoader.load(mtlUrl, (materials) => {
    materials.preload();
    Object.values(materials.materials).forEach(mat => {
      if (mat.map) { mat.map.colorSpace = THREE.SRGBColorSpace; mat.map.needsUpdate = true; }
      mat.transparent = false; mat.opacity = 1.0; mat.side = THREE.DoubleSide;
    });
    const objLoader = new OBJLoader();
    objLoader.setMaterials(materials);
    objLoader.load(textureUrls.obj, onMeshLoaded, undefined, (err) => {
      console.error('OBJ load failed:', err);
      document.getElementById('viewer-spinner').style.display = 'none';
    });
  }, undefined, (err) => {
    console.warn('MTL failed, loading OBJ with atlas:', err);
    const objLoader = new OBJLoader();
    objLoader.load(textureUrls.obj, (obj) => {
      if (textureUrls.atlas) {
        const tex = new THREE.TextureLoader().load(textureUrls.atlas);
        tex.colorSpace = THREE.SRGBColorSpace;
        const mat = new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide });
        obj.traverse(child => { if (child.isMesh) child.material = mat; });
      }
      onMeshLoaded(obj);
    });
  });
}

function onMeshLoaded(group) {
  meshGroup = group;
  scene.add(group);
  meshChildren = [];
  group.traverse(c => { if (c.isMesh) meshChildren.push(c); });

  // Position camera
  if (restoreCamAfterLoad) {
    camera.position.copy(restoreCamAfterLoad.pos);
    controls.target.copy(restoreCamAfterLoad.target);
    restoreCamAfterLoad = null;
  } else {
    const box = new THREE.Box3().setFromObject(group);
    const center = box.getCenter(new THREE.Vector3());
    camera.position.set(center.x, center.y, center.z);
    controls.target.set(center.x, center.y, center.z + 1);
  }
  controls.update();

  document.getElementById('viewer-spinner').style.display = 'none';

  const totalFaces = meshChildren.reduce((s, m) => s + faceCount(m), 0);
  console.log(`Loaded: ${meshChildren.length} sub-meshes, ${totalFaces} faces`);

  // Build measurements and initialize room polygon
  if (activeRoomIndex >= 0 && currentData?.rooms?.[activeRoomIndex]) {
    initRoomPolygonFeature(currentData.rooms[activeRoomIndex]);
    buildMeasurements(currentData.rooms[activeRoomIndex]);
  }

  // Build spatial indexes then load annotations
  setTimeout(() => {
    for (let ci = 0; ci < meshChildren.length; ci++) buildSpatialIndex(ci);
    loadAnnotations();
  }, 50);
}

function clearMesh() {
  if (meshGroup) {
    scene.remove(meshGroup);
    meshGroup.traverse(c => { if (c.isMesh) { c.geometry?.dispose(); if (Array.isArray(c.material)) c.material.forEach(m=>m.dispose()); else c.material?.dispose(); }});
    meshGroup = null; meshChildren = []; spatialIndexes.length = 0;
  }
  if (hdGroup) { scene.remove(hdGroup); hdGroup = null; }
  if (measurementGroup) {
    measurementGroup.traverse(c => { if (c.isCSS2DObject && c.element) c.element.remove(); });
    scene.remove(measurementGroup); measurementGroup = null;
  }
  if (hoverEdgeObj) { scene.remove(hoverEdgeObj); hoverEdgeObj = null; }
  if (hoverVertObj) { scene.remove(hoverVertObj); hoverVertObj = null; }
  if (hoverFaceObj) { scene.remove(hoverFaceObj); hoverFaceObj = null; }
  selectedFaces.clear(); faceMeshes = [];
  cornersChanged = false;
  // Clear features — must remove DOM elements for CSS2DObject labels
  for (const [id, vis] of featureMeshes) {
    vis.spheres.forEach(s=>scene.remove(s));
    vis.lines.forEach(l=>scene.remove(l));
    vis.labels.forEach(l=>{ if(l.element) l.element.remove(); if(l.parent) l.parent.remove(l); scene.remove(l); });
  }
  featureMeshes.clear(); features = []; activeFeatureIdx = -1; featureDrawing = false; featuresChanged = false;
  if (hoverMesh) { scene.remove(hoverMesh); hoverMesh.geometry.dispose(); hoverMesh.material.dispose(); hoverMesh = null; }
}

// ============================================================
// FACE HELPERS
// ============================================================
function faceCount(mesh) {
  const g = mesh.geometry;
  return g.index ? g.index.count / 3 : g.attributes.position.count / 3;
}

function triVerts(mesh, fi) {
  const g = mesh.geometry, pos = g.attributes.position;
  const v0 = new THREE.Vector3(), v1 = new THREE.Vector3(), v2 = new THREE.Vector3();
  if (g.index) {
    v0.fromBufferAttribute(pos, g.index.getX(fi*3)); v1.fromBufferAttribute(pos, g.index.getX(fi*3+1)); v2.fromBufferAttribute(pos, g.index.getX(fi*3+2));
  } else {
    v0.fromBufferAttribute(pos, fi*3); v1.fromBufferAttribute(pos, fi*3+1); v2.fromBufferAttribute(pos, fi*3+2);
  }
  v0.applyMatrix4(mesh.matrixWorld); v1.applyMatrix4(mesh.matrixWorld); v2.applyMatrix4(mesh.matrixWorld);
  return [v0, v1, v2];
}

function triArea(v0, v1, v2) { return v1.clone().sub(v0).cross(v2.clone().sub(v0)).length() * 0.5; }

// ============================================================
// SPATIAL INDEX
// ============================================================
function buildSpatialIndex(ci) {
  const mesh = meshChildren[ci];
  const n = faceCount(mesh);
  const g = mesh.geometry, pos = g.attributes.position;
  const mat4 = mesh.matrixWorld;
  const centers = new Float32Array(n * 3);
  const v0 = new THREE.Vector3(), v1 = new THREE.Vector3(), v2 = new THREE.Vector3();
  for (let fi = 0; fi < n; fi++) {
    if (g.index) { v0.fromBufferAttribute(pos, g.index.getX(fi*3)); v1.fromBufferAttribute(pos, g.index.getX(fi*3+1)); v2.fromBufferAttribute(pos, g.index.getX(fi*3+2)); }
    else { v0.fromBufferAttribute(pos, fi*3); v1.fromBufferAttribute(pos, fi*3+1); v2.fromBufferAttribute(pos, fi*3+2); }
    v0.applyMatrix4(mat4); v1.applyMatrix4(mat4); v2.applyMatrix4(mat4);
    const off = fi * 3;
    centers[off] = (v0.x+v1.x+v2.x)/3; centers[off+1] = (v0.y+v1.y+v2.y)/3; centers[off+2] = (v0.z+v1.z+v2.z)/3;
  }
  const CELL = 0.25;
  const grid = new Map();
  for (let fi = 0; fi < n; fi++) {
    const off = fi*3;
    const key = `${Math.floor(centers[off]/CELL)},${Math.floor(centers[off+1]/CELL)},${Math.floor(centers[off+2]/CELL)}`;
    if (!grid.has(key)) grid.set(key, []);
    grid.get(key).push(fi);
  }
  spatialIndexes[ci] = { centers, grid, CELL, count: n };
}

function nearbyFaces(mesh, ci, seedFi, rWorld) {
  if (rWorld <= 0) return [{ ci, fi: seedFi }];
  const idx = spatialIndexes[ci];
  if (!idx) return [{ ci, fi: seedFi }];
  const off = seedFi*3, sx = idx.centers[off], sy = idx.centers[off+1], sz = idx.centers[off+2];
  const r2 = rWorld*rWorld, CELL = idx.CELL;
  const out = [];
  for (let ix = Math.floor((sx-rWorld)/CELL); ix <= Math.floor((sx+rWorld)/CELL); ix++)
    for (let iy = Math.floor((sy-rWorld)/CELL); iy <= Math.floor((sy+rWorld)/CELL); iy++)
      for (let iz = Math.floor((sz-rWorld)/CELL); iz <= Math.floor((sz+rWorld)/CELL); iz++) {
        const cell = idx.grid.get(`${ix},${iy},${iz}`);
        if (!cell) continue;
        for (const fi of cell) { const fo=fi*3, dx=idx.centers[fo]-sx, dy=idx.centers[fo+1]-sy, dz=idx.centers[fo+2]-sz; if (dx*dx+dy*dy+dz*dz<=r2) out.push({ci,fi}); }
      }
  return out;
}

// ============================================================
// RAYCASTING
// ============================================================
const ray = new THREE.Raycaster();
ray.params.Line.threshold = 0.03; // 3cm threshold for edge picking
const ndc = new THREE.Vector2();
function castFace(e) {
  const rect = renderer.domElement.getBoundingClientRect();
  ndc.x = ((e.clientX-rect.left)/rect.width)*2-1;
  ndc.y = -((e.clientY-rect.top)/rect.height)*2+1;
  ray.setFromCamera(ndc, camera);
  const hits = ray.intersectObjects(meshChildren, false);
  if (hits.length > 0) { const h = hits[0]; return { ci: meshChildren.indexOf(h.object), fi: h.faceIndex, pt: h.point, mesh: h.object }; }
  return null;
}

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
let modeBeforeHold = null;
function onKeyDown(e) {
  // Prevent arrow keys from scrolling sidebar, shift from selecting
  if (['arrowup','arrowdown','arrowleft','arrowright','shift'].includes(e.key.toLowerCase())) e.preventDefault();
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') { keys[e.key.toLowerCase()] = true; return; }
  const k = e.key.toLowerCase();
  if (e.ctrlKey || e.metaKey) {
    if (k === 'z') { e.preventDefault(); doUndo(); return; }
    if (k === 'n') { e.preventDefault(); setMode('orbit'); return; }
    if (k === 'p') { e.preventDefault(); setMode('paint'); return; }
    if (k === 'e') { e.preventDefault(); setMode('erase'); return; }
    if (k === 'c') { e.preventDefault(); setMode('annotate'); return; }
  }
  if (k === 'p' && mode !== 'paint') { modeBeforeHold = mode; setMode('paint'); return; }
  if (k === 'n' && mode !== 'orbit') { modeBeforeHold = mode; setMode('orbit'); return; }
  if (k === 'e' && mode !== 'erase' && mode !== 'annotate' && !e.ctrlKey && !e.metaKey) { modeBeforeHold = mode; setMode('erase'); return; }
  if (k === 'c' && mode !== 'annotate' && !e.ctrlKey && !e.metaKey) { modeBeforeHold = mode; setMode('annotate'); return; }
  keys[k] = true;
}
function onKeyUp(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') { keys[e.key.toLowerCase()] = false; return; }
  const k = e.key.toLowerCase(); keys[k] = false;
  if (modeBeforeHold !== null && ((k==='p'&&mode==='paint')||(k==='n'&&mode==='orbit')||(k==='e'&&mode==='erase')||(k==='c'&&mode==='annotate'))) { setMode(modeBeforeHold); modeBeforeHold = null; }
}

// ============================================================
// UNDO
// ============================================================
function pushUndo() {
  const annSnap = []; for (const [k,a] of anns) annSnap.push({k, faces: new Set(a.faces)});
  const featSnap = JSON.parse(JSON.stringify(features));
  undoStack.push({ anns: annSnap, features: featSnap });
  if (undoStack.length > MAX_UNDO) undoStack.shift();
}
window.doUndo = doUndo;
function doUndo() {
  if (undoStack.length === 0) return;
  const snap = undoStack.pop();
  for (const s of snap.anns) { const a = anns.get(s.k); if (a) { a.faces = s.faces; rebuildOverlay(a); } }
  if (snap.features) {
    features = snap.features;
    featuresChanged = true;
    cornersChanged = true;
    renderAllFeatures();
    renderFeatureList();
    rebuildMeasurementsAfterFeatureChange();
  }
  renderList(); updateFaces(); updateMetrics();
}

// ============================================================
// PAINTING
// ============================================================
function onDown(e) {
  if (mode === 'orbit') return;
  if (mode === 'annotate') { onFeatureDown(e); return; }
  if (!activeKey) return;
  e.preventDefault(); e.stopPropagation();
  pushUndo(); painting = true; strokeDirty = false;
  paintAt(e);
}
function onMove(e) {
  if (mode === 'orbit') return;
  if (mode === 'annotate') { onFeatureMove(e); return; }
  if (painting) { e.preventDefault(); paintAt(e); } else { showHover(e); }
}
function onUp(e) {
  if (mode === 'annotate') { onFeatureUp(e); return; }
  if (!painting) return;
  painting = false;
  if (rebuildTimer) { clearTimeout(rebuildTimer); rebuildTimer = null; }
  for (const k of dirtyOverlays) { const a = anns.get(k); if (a) rebuildOverlay(a); }
  dirtyOverlays.clear();
  if (strokeDirty) { renderList(); updateMetrics(); } else { undoStack.pop(); }
  if (hoverMesh) hoverMesh.visible = false;
}

function scheduleRebuild() {
  if (rebuildTimer) return;
  rebuildTimer = setTimeout(() => { rebuildTimer = null; for (const k of dirtyOverlays) { const a = anns.get(k); if (a) rebuildOverlay(a); } dirtyOverlays.clear(); updateFaces(); }, REBUILD_INTERVAL);
}

function paintAt(e) {
  const hit = castFace(e);
  if (!hit || !activeKey) return;
  const a = anns.get(activeKey);
  if (!a) return;
  const erase = (mode === 'erase'), rWorld = brushCm * 0.01;
  const faces = nearbyFaces(hit.mesh, hit.ci, hit.fi, rWorld);
  let changed = false;
  for (const {ci,fi} of faces) {
    const fk = `${ci}:${fi}`;
    if (erase) { if (a.faces.has(fk)) { a.faces.delete(fk); changed = true; } }
    else {
      for (const [k,o] of anns) { if (k !== activeKey && o.faces.has(fk)) { o.faces.delete(fk); dirtyOverlays.add(k); } }
      if (!a.faces.has(fk)) { a.faces.add(fk); changed = true; }
    }
  }
  if (changed) { strokeDirty = true; dirtyOverlays.add(activeKey); scheduleRebuild(); }
}

function showHover(e) {
  const hit = castFace(e);
  if (!hit) { if (hoverMesh) hoverMesh.visible = false; return; }
  const [v0,v1,v2] = triVerts(hit.mesh, hit.fi);
  if (!hoverMesh) {
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute(new Float32Array(9), 3));
    hoverMesh = new THREE.Mesh(g, new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5, side: THREE.DoubleSide, depthWrite: false, polygonOffset: true, polygonOffsetFactor: -2, polygonOffsetUnits: -2 }));
    hoverMesh.renderOrder = 3; scene.add(hoverMesh);
  }
  const p = hoverMesh.geometry.attributes.position.array;
  p[0]=v0.x;p[1]=v0.y;p[2]=v0.z;p[3]=v1.x;p[4]=v1.y;p[5]=v1.z;p[6]=v2.x;p[7]=v2.y;p[8]=v2.z;
  hoverMesh.geometry.attributes.position.needsUpdate = true;
  hoverMesh.visible = true;
}

// ============================================================
// OVERLAY RENDERING
// ============================================================
function rebuildOverlay(a) {
  if (a.overlay) { scene.remove(a.overlay); a.overlay.geometry.dispose(); a.overlay.material.dispose(); a.overlay = null; }
  if (a.faces.size === 0) return;
  const positions = [];
  for (const fk of a.faces) { const [ci,fi] = fk.split(':').map(Number); const m = meshChildren[ci]; if (!m) continue; const [v0,v1,v2] = triVerts(m,fi); positions.push(v0.x,v0.y,v0.z,v1.x,v1.y,v1.z,v2.x,v2.y,v2.z); }
  if (!positions.length) return;
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  g.computeVertexNormals();
  a.overlay = new THREE.Mesh(g, new THREE.MeshBasicMaterial({ color: new THREE.Color(a.color), transparent: true, opacity: 0.45, side: THREE.DoubleSide, depthWrite: false, polygonOffset: true, polygonOffsetFactor: -1, polygonOffsetUnits: -1 }));
  a.overlay.renderOrder = 1; a.overlay.visible = a.visible; scene.add(a.overlay);
}

// ============================================================
// ANNOTATION STATE
// ============================================================
function addAnn(labelKey) {
  if (anns.has(labelKey)) { setActive(labelKey); return; }
  const info = FLAT[labelKey]; if (!info) return;
  const color = COLORS[colorIdx++ % COLORS.length];
  anns.set(labelKey, { name: info.name, unit: info.unit, cat: info.cat, color, faces: new Set(), qty: info.unit === 'EA' ? 1 : 0, visible: true, overlay: null });
  setActive(labelKey); renderList(); updateMetrics();
}

function removeAnn(k) {
  const a = anns.get(k); if (!a) return;
  if (a.overlay) { scene.remove(a.overlay); a.overlay.geometry.dispose(); a.overlay.material.dispose(); }
  anns.delete(k); if (activeKey === k) { activeKey = null; updateStatus(); }
  renderList(); updateMetrics();
}

function setActive(k) { activeKey = k; updateStatus(); renderList(); if (mode === 'orbit') setMode('paint'); }

function clearAnnotationsState() {
  for (const a of anns.values()) { if (a.overlay) { scene.remove(a.overlay); a.overlay.geometry.dispose(); a.overlay.material.dispose(); } }
  anns.clear(); activeKey = null; colorIdx = 0; undoStack.length = 0;
  renderList(); updateStatus();
}

function computeArea(a) {
  let total = 0;
  for (const fk of a.faces) { const [ci,fi] = fk.split(':').map(Number); const m = meshChildren[ci]; if (!m) continue; const [v0,v1,v2] = triVerts(m,fi); total += triArea(v0,v1,v2); }
  return total * 10.7639;
}

// ============================================================
// MODE
// ============================================================
window.setMode = function(m) {
  mode = m;
  document.getElementById('btn-orbit')?.classList.toggle('active', m === 'orbit');
  document.getElementById('btn-paint')?.classList.toggle('active', m === 'paint');
  document.getElementById('btn-erase')?.classList.toggle('active', m === 'erase');
  document.getElementById('btn-annotate')?.classList.toggle('active', m === 'annotate');
  controls.enabled = (m === 'orbit');
  renderer.domElement.style.cursor = m === 'orbit' ? 'grab' : m === 'annotate' ? 'copy' : m === 'paint' ? 'crosshair' : 'not-allowed';
  if (hoverMesh) hoverMesh.visible = false;
  updateStatus();
};

window.setBrush = function(v) { brushCm = parseInt(v); document.getElementById('brush-lbl').textContent = brushCm === 0 ? '1px' : `${brushCm}cm`; };

// ============================================================
// PICKER UI
// ============================================================
function buildPicker() {
  const list = document.getElementById('plist'); if (!list) return;
  let h = '';
  TAXONOMY.forEach(c => {
    h += `<div class="pg"><div class="pg-label">${c.cat}</div>`;
    c.items.forEach(i => { h += `<div class="pi" data-k="${i.key}" onclick="pick('${i.key}')"><span>${i.name}</span><span class="u">${i.unit}</span></div>`; });
    h += '</div>';
  });
  list.innerHTML = h;
}
window.openPicker = () => document.getElementById('plist')?.classList.add('open');
window.filterPicker = function(q) {
  q = q.toLowerCase();
  document.querySelectorAll('.pi').forEach(el => { el.style.display = el.textContent.toLowerCase().includes(q) ? '' : 'none'; });
  document.querySelectorAll('.pg').forEach(g => { g.style.display = [...g.querySelectorAll('.pi')].some(el => el.style.display !== 'none') ? '' : 'none'; });
};
window.pick = function(k) { addAnn(k); document.getElementById('plist')?.classList.remove('open'); const s = document.getElementById('psearch'); if (s) { s.value = ''; filterPicker(''); } };
document.addEventListener('click', e => { if (!e.target.closest('.picker')) document.getElementById('plist')?.classList.remove('open'); });

// ============================================================
// ANNOTATION LIST UI
// ============================================================
function renderList() {
  const el = document.getElementById('ann-rows'); if (!el) return;
  if (anns.size === 0) { el.innerHTML = '<div class="ann-empty">Paint components onto the mesh</div>'; return; }
  let h = '';
  for (const [k, a] of anns) {
    const act = k === activeKey ? ' active' : '';
    h += `<div class="ann-row${act}" onclick="clickAnn('${k}')">
      <div class="swatch" style="background:${a.color}"></div>
      <div class="ann-info">
        <div class="ann-name">${esc(a.name)}</div>
        <div class="ann-meta">
          <input class="ann-qty" type="number" step="any" value="${a.qty}" onclick="event.stopPropagation()" onchange="chgQty('${k}',this.value)">
          <span class="ann-unit">${a.unit}</span>
          <span class="ann-faces">${a.faces.size}f</span>
        </div>
      </div>
      <div class="ann-btns">
        ${(a.unit==='SF'||a.unit==='LF') ? `<button class="abtn" onclick="event.stopPropagation();autoCalc('${k}')" title="Auto-compute area">&#x1F4D0;</button>` : ''}
        <button class="abtn${a.visible?'':' off'}" onclick="event.stopPropagation();togVis('${k}')">${a.visible?'\u25C9':'\u25CB'}</button>
        <button class="abtn" onclick="event.stopPropagation();removeAnn('${k}')">&times;</button>
      </div>
    </div>`;
  }
  el.innerHTML = h;
}

window.clickAnn = k => setActive(k);
window.chgQty = (k, v) => { const a = anns.get(k); if (a) { a.qty = parseFloat(v) || 0; updateMetrics(); } };
window.togVis = function(k) { const a = anns.get(k); if (!a) return; a.visible = !a.visible; if (a.overlay) a.overlay.visible = a.visible; renderList(); };
window.removeAnn = removeAnn;
window.autoCalc = function(k) { const a = anns.get(k); if (!a) return; a.qty = Math.round(computeArea(a)*10)/10; renderList(); updateMetrics(); };
window.doClear = function() { if (anns.size && !confirm('Clear all annotations?')) return; clearAnnotationsState(); updateMetrics(); };
window.toggleSidebar = function() { document.getElementById('sidebar').classList.toggle('collapsed'); setTimeout(onResize, 350); };
window.toggleDesc = function() { const d = document.getElementById('job-desc'); if (d) d.classList.toggle('truncated'); };

function updateFaces() { const a = activeKey ? anns.get(activeKey) : null; document.getElementById('sfaces').textContent = a ? `${a.faces.size} faces` : '0 faces'; }
function updateStatus() {
  const names = { orbit: 'Navigate', paint: 'Paint', erase: 'Erase' };
  document.getElementById('smode').textContent = names[mode] || '';
  document.getElementById('sdot').className = `dot ${mode === 'orbit' ? 'dot-orbit' : 'dot-paint'}`;
  const lbl = document.getElementById('slabel');
  if (activeKey) { const a = anns.get(activeKey); lbl.style.display = ''; lbl.textContent = a ? `Active: ${a.name}` : ''; } else { lbl.style.display = 'none'; }
  updateFaces();
}
function updateMetrics() { if (activeRoomIndex >= 0 && currentData?.rooms?.[activeRoomIndex]) renderMetrics(currentData.rooms[activeRoomIndex]); }
function esc(s) { const el = document.createElement('span'); el.textContent = s || ''; return el.innerHTML; }

// ============================================================
// SAVE/LOAD — API + localStorage fallback
// ============================================================
function serializeAnnotations() { const data = []; for (const [k,a] of anns) data.push({ k, color: a.color, faces: [...a.faces], qty: a.qty, visible: a.visible }); return data; }

function deserializeAnnotations(data) {
  clearAnnotationsState();
  for (const item of data) { const info = FLAT[item.k]; if (!info) continue; const a = { name:info.name, unit:info.unit, cat:info.cat, color:item.color||COLORS[colorIdx++%COLORS.length], faces:new Set(item.faces||[]), qty:item.qty||0, visible:item.visible!==false, overlay:null }; anns.set(item.k, a); rebuildOverlay(a); }
  renderList(); updateMetrics();
}

window.doExport = function() {
  if (anns.size === 0) { alert('No annotations to export.'); return; }
  const payload = { rfq_id: currentRfqId, scan_id: currentScanId, annotations: [] };
  for (const [k,a] of anns) payload.annotations.push({ label_key:k, display_name:a.name, unit:a.unit, category:a.cat, color:a.color, faces:[...a.faces], quantity:a.qty });
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob); const link = document.createElement('a');
  link.href = url; link.download = `annotations_${currentScanId || 'export'}.json`; link.click(); URL.revokeObjectURL(url);
};

window.doSave = async function() {
  // Auto-set baseboard qty to net trim LF if baseboard is annotated
  const trim = computeTrimLF();
  if (trim.net > 0) {
    for (const [k, a] of anns) {
      if (k === 'baseboard' || k === 'toe_kick' || k === 'shoe_molding') {
        a.qty = trim.net;
      }
    }
  }
  const data = serializeAnnotations();
  const btn = document.getElementById('btn-save');
  const storeKey = `admin_ann_${currentRfqId}_${currentScanId}`;
  localStorage.setItem(storeKey, JSON.stringify(data));
  if (authToken && currentRfqId && currentScanId) {
    try {
      if (btn) btn.textContent = 'Saving...';
      const resp = await fetch(`${API_BASE}/api/admin/rfqs/${currentRfqId}/scans/${currentScanId}/annotations`, { method: 'PUT', headers: { 'Authorization': `Bearer ${authToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      // Save features to GCS (exclude room floor/ceiling — saved via polygon endpoint)
      const featsToSave = features.filter(f => f.type !== 'room_floor' && f.type !== 'room_ceiling');
      if (featuresChanged && featsToSave.length > 0) {
        await fetch(`${API_BASE}/api/admin/rfqs/${currentRfqId}/scans/${currentScanId}/features`, {
          method: 'PUT', headers: { 'Authorization': `Bearer ${authToken}`, 'Content-Type': 'application/json' },
          body: JSON.stringify(featsToSave),
        });
        featuresChanged = false;
      }
      // Save polygon from room floor/ceiling features
      syncRoomPolygonToRoom();
      const rpRoom = currentData?.rooms?.[activeRoomIndex];
      if (cornersChanged && rpRoom?.room_polygon_ft?.length >= 3) {
        const polyResp = await fetch(`${API_BASE}/api/admin/rfqs/${currentRfqId}/scans/${currentScanId}/polygon`, {
          method: 'PUT',
          headers: { 'Authorization': `Bearer ${authToken}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            room_polygon_ft: rpRoom.room_polygon_ft,
            wall_heights_ft: rpRoom.wall_heights_ft,
            floor_heights_ft: rpRoom.floor_heights_ft,
          }),
        });
        if (polyResp.ok) cornersChanged = false;
      }
      if (btn) { btn.textContent = 'Saved!'; btn.classList.add('ok'); }
    } catch (e) { console.error('API save failed:', e); if (btn) { btn.textContent = 'Saved (local)'; btn.classList.add('ok'); } }
  } else { if (btn) { btn.textContent = 'Saved (local)'; btn.classList.add('ok'); } }
  setTimeout(() => { if (btn) { btn.textContent = 'Save'; btn.classList.remove('ok'); } }, 1500);
};

async function loadAnnotations() {
  if (authToken && currentRfqId && currentScanId) {
    try {
      const resp = await fetch(`${API_BASE}/api/admin/rfqs/${currentRfqId}/scans/${currentScanId}/annotations`, { headers: { 'Authorization': `Bearer ${authToken}` } });
      if (resp.ok) { const data = await resp.json(); if (data?.length > 0) { deserializeAnnotations(data); return; } }
    } catch (e) { console.warn('API load failed:', e); }
  }
  const storeKey = `admin_ann_${currentRfqId}_${currentScanId}`;
  const raw = localStorage.getItem(storeKey);
  if (raw) { try { deserializeAnnotations(JSON.parse(raw)); } catch (e) {} }

  // Load features
  if (authToken && currentRfqId && currentScanId) {
    try {
      const resp = await fetch(`${API_BASE}/api/admin/rfqs/${currentRfqId}/scans/${currentScanId}/features`, { headers: { 'Authorization': `Bearer ${authToken}` } });
      if (resp.ok) { const data = await resp.json(); if (data?.length > 0) { features = data.map(migrateFeature); nextFeatureId = Math.max(...features.map(f => parseInt(f.id?.replace('feat_','') || 0))) + 1; renderAllFeatures(); renderFeatureList(); } }
    } catch (e) { console.warn('Features load failed:', e); }
  }
}

// ============================================================
// AUTH + INIT
// ============================================================
function getRfqId() {
  const parts = window.location.pathname.split('/');
  const idx = parts.indexOf('rfq');
  return (idx >= 0 && parts[idx + 1]) ? parts[idx + 1] : new URLSearchParams(window.location.search).get('rfq');
}

function showAuthModal() {
  let modal = document.getElementById('auth-modal');
  if (!modal) { modal = document.createElement('div'); modal.id = 'auth-modal'; modal.className = 'modal-overlay'; document.body.appendChild(modal); }
  modal.innerHTML = `
    <div class="modal-content">
      <h2>Admin Sign In</h2>
      <p class="auth-subtitle">Sign in to access the annotator</p>
      <input type="email" id="auth-email" placeholder="Email" autocomplete="email">
      <input type="password" id="auth-password" placeholder="Password" autocomplete="current-password">
      <div id="auth-error" class="auth-error"></div>
      <button class="btn-full btn-primary" id="auth-submit" onclick="handleAuth()">Sign In</button>
      <div style="color:#8e8e93;font-size:11px;margin:12px 0 8px;text-align:center;">or</div>
      <button class="btn-full" onclick="handleGoogleSignIn()" style="background:#4285f4;color:#fff;">Sign In with Google</button>
    </div>`;
  modal.style.display = 'flex';
}

window.handleAuth = async function() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const errorEl = document.getElementById('auth-error');
  const btn = document.getElementById('auth-submit');
  if (!email || !password) { errorEl.textContent = 'Email and password required.'; return; }
  btn.disabled = true; btn.textContent = 'Signing in...';
  try { await firebase.auth().signInWithEmailAndPassword(email, password); document.getElementById('auth-modal').style.display = 'none'; }
  catch (e) { errorEl.textContent = e.code === 'auth/wrong-password' ? 'Incorrect password.' : e.code === 'auth/user-not-found' ? 'No account with this email.' : 'Sign-in failed.'; btn.disabled = false; btn.textContent = 'Sign In'; }
};

window.handleGoogleSignIn = async function() {
  try { await firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider()); document.getElementById('auth-modal').style.display = 'none'; }
  catch (e) { const err = document.getElementById('auth-error'); if (err) err.textContent = e.code === 'auth/unauthorized-domain' ? 'Domain not authorized in Firebase.' : e.message; }
};

async function init() {
  currentRfqId = getRfqId();
  if (!currentRfqId) { document.getElementById('viewer-loading').textContent = 'No RFQ ID. Navigate to /admin/rfq/{rfq_id}'; return; }

  firebase.auth().onAuthStateChanged(async (user) => {
    if (!user) { showAuthModal(); return; }
    authToken = await user.getIdToken();
    document.getElementById('viewer-loading').textContent = 'Loading project...';

    try {
      const resp = await fetch(`${API_BASE}/api/rfqs/${currentRfqId}/contractor-view`);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      currentData = await resp.json();

      initThree();
      renderSidebar(currentData);

      if (currentData.rooms?.length > 0) {
        // Auto-select the first room that has an OBJ mesh
        const firstWithMesh = currentData.rooms.findIndex(r => r.texture_urls?.obj);
        selectRoom(firstWithMesh >= 0 ? firstWithMesh : 0);
      } else {
        document.getElementById('viewer-loading').textContent = 'No rooms in this RFQ.';
      }
    } catch (e) { document.getElementById('viewer-loading').textContent = `Failed to load: ${e.message}`; }
  });
}

init();

</script>
