<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>RoomScan Admin — Component Annotator</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f2f4f8; color: #1d1d1f; overflow: hidden; height: 100vh; }

  /* Layout */
  .app { position: relative; height: 100vh; }
  .main-panel { width: 100%; height: 100%; display: flex; flex-direction: column; }
  .viewer-container { flex: 1; position: relative; background: #1a1a1a; }
  .viewer-container canvas { display: block; }

  /* Sidebar drawer — matches contractor view */
  .sidebar { position: absolute; top: 0; left: 0; z-index: 50; width: 320px; height: 100%;
             background: #fff; border-right: 1px solid #e0e4ea; display: flex; flex-direction: column;
             overflow-y: auto; box-shadow: 2px 0 12px rgba(0,0,0,0.1);
             transition: transform 0.3s ease; transform: translateX(0);
             padding-top: env(safe-area-inset-top, 0px); }
  .sidebar.collapsed { transform: translateX(-100%); box-shadow: none; }
  .sidebar-tab { position: absolute; top: 50%; left: 0; z-index: 49; transform: translateY(-50%);
                 background: #fff; border: 1px solid #e0e4ea; border-left: none;
                 border-radius: 0 8px 8px 0; padding: 12px 6px; cursor: pointer;
                 box-shadow: 2px 0 8px rgba(0,0,0,0.08); opacity: 0; pointer-events: none;
                 transition: opacity 0.3s; }
  .sidebar-tab svg { display: block; width: 20px; height: 20px; fill: #0055cc; }
  .sidebar.collapsed ~ .sidebar-tab { opacity: 1; pointer-events: auto; }
  .sidebar-close { position: absolute; top: 12px; right: 12px; z-index: 51; background: none; border: none;
                   cursor: pointer; padding: 4px; border-radius: 4px; color: #8e8e93; }
  .sidebar-close:hover { background: #f0f3f8; color: #1d1d1f; }
  .sidebar-close svg { width: 18px; height: 18px; fill: currentColor; }

  /* Sidebar sections — same as contractor view */
  .sidebar-header { padding: 16px; border-bottom: 1px solid #e0e4ea; }
  .sidebar-header h1 { font-size: 18px; font-weight: 700; color: #0055cc; }
  .sidebar-header .subtitle { color: #8e8e93; font-size: 12px; margin-top: 2px; }
  .sidebar-header .badge { display: inline-block; font-size: 10px; background: #e94560; color: #fff; padding: 2px 8px; border-radius: 10px; font-weight: 600; margin-left: 8px; vertical-align: middle; }
  .job-info { padding: 12px 16px; border-bottom: 1px solid #e0e4ea; }
  .job-info .project-title { font-size: 16px; font-weight: 700; }
  .job-info .address { color: #6e6e73; font-size: 12px; margin-top: 3px; }
  .job-info .description { color: #8e8e93; font-size: 12px; margin-top: 6px; line-height: 1.4; }
  .job-info .description.truncated { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .job-info .desc-toggle { color: #0055cc; font-size: 11px; font-weight: 600; cursor: pointer; margin-top: 2px; display: inline-block; }

  /* Room list */
  .room-list { padding: 8px; border-bottom: 1px solid #e0e4ea; }
  .room-list h3 { font-size: 12px; font-weight: 600; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; padding: 4px 8px; }
  .room-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; margin: 2px 0; transition: background 0.15s; border: 1px solid transparent; }
  .room-item:hover { background: #f0f3f8; }
  .room-item.active { background: #e8f0fe; border-color: #0055cc; }
  .room-item .name { font-size: 14px; font-weight: 500; }
  .room-item .detail { font-size: 11px; color: #8e8e93; margin-top: 2px; }

  /* Metrics panel */
  .metrics-section { padding: 12px 16px; border-bottom: 1px solid #e0e4ea; }
  .metrics-section h3 { font-size: 12px; font-weight: 600; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .metric-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
  .metric-row .label { color: #6e6e73; }
  .metric-row .value { font-weight: 600; font-variant-numeric: tabular-nums; }

  /* ---- Annotation controls (admin-only section) ---- */
  .admin-section { border-top: 2px solid #e94560; }
  .admin-section h3 { font-size: 12px; font-weight: 600; color: #e94560; text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 16px 4px; }

  /* Mode bar */
  .mode-bar { padding: 6px 12px; display: flex; gap: 4px; flex-wrap: wrap; align-items: center; border-bottom: 1px solid #e0e4ea; }
  .mode-btn { padding: 5px 10px; border-radius: 5px; border: 1px solid #e0e4ea; background: #fff;
              color: #8e8e93; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .mode-btn.active { background: #e94560; color: #fff; border-color: #e94560; }
  .mode-btn:hover:not(.active) { background: #f0f3f8; color: #1d1d1f; }
  .brush-ctrl { margin-left: auto; display: flex; align-items: center; gap: 4px; font-size: 11px; color: #8e8e93; }
  .brush-ctrl input[type=range] { width: 50px; }

  /* Component picker */
  .picker { padding: 6px 12px; border-bottom: 1px solid #e0e4ea; }
  .picker label { font-size: 10px; font-weight: 600; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; display: block; }
  .picker-search { width: 100%; padding: 5px 8px; border-radius: 5px; border: 1px solid #e0e4ea; background: #fff; color: #1d1d1f; font-size: 12px; }
  .picker-search::placeholder { color: #b0b3ba; }
  .picker-list { max-height: 180px; overflow-y: auto; background: #fff; border: 1px solid #e0e4ea; border-radius: 5px; margin-top: 4px; display: none; }
  .picker-list.open { display: block; }
  .pg-label { font-size: 10px; font-weight: 700; color: #e94560; text-transform: uppercase; letter-spacing: 0.5px; padding: 4px 8px; }
  .pi { padding: 4px 8px; font-size: 12px; cursor: pointer; display: flex; justify-content: space-between; }
  .pi:hover { background: #f0f3f8; }
  .pi .u { color: #8e8e93; font-size: 11px; }

  /* Annotation rows */
  .ann-section { flex: 1; overflow-y: auto; }
  .ann-empty { color: #b0b3ba; font-size: 12px; padding: 16px; text-align: center; }
  .ann-row { padding: 6px 12px; cursor: pointer; border-left: 3px solid transparent; display: flex; align-items: center; gap: 8px; transition: background 0.1s; }
  .ann-row:hover { background: #f0f3f8; }
  .ann-row.active { background: #fef0f2; border-left-color: #e94560; }
  .swatch { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }
  .ann-info { flex: 1; min-width: 0; }
  .ann-name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ann-meta { display: flex; align-items: center; gap: 5px; margin-top: 1px; }
  .ann-qty { width: 55px; padding: 2px 4px; border-radius: 3px; border: 1px solid #e0e4ea; background: #fff; color: #1d1d1f; font-size: 11px; text-align: right; }
  .ann-unit { font-size: 10px; color: #8e8e93; }
  .ann-faces { font-size: 10px; color: #b0b3ba; }
  .ann-btns { display: flex; gap: 1px; flex-shrink: 0; }
  .abtn { background: none; border: none; color: #8e8e93; cursor: pointer; padding: 3px; border-radius: 3px; font-size: 13px; line-height: 1; }
  .abtn:hover { background: #f0f3f8; color: #1d1d1f; }
  .abtn.off { color: #d0d0d0; }

  /* Footer */
  .admin-footer { padding: 8px 12px; border-top: 1px solid #e0e4ea; display: flex; gap: 6px; margin-top: auto; }
  .btn-save { flex: 1; padding: 7px; border-radius: 5px; border: none; background: #e94560; color: #fff; font-size: 12px; font-weight: 600; cursor: pointer; }
  .btn-save:hover { background: #d63851; }
  .btn-save.ok { background: #34a853; }
  .btn-export { padding: 7px 10px; border-radius: 5px; border: 1px solid #e0e4ea; background: #fff; color: #8e8e93; font-size: 12px; cursor: pointer; }
  .btn-export:hover { color: #0055cc; }
  .btn-clr { padding: 7px 10px; border-radius: 5px; border: 1px solid #e0e4ea; background: #fff; color: #8e8e93; font-size: 12px; cursor: pointer; }
  .btn-clr:hover { color: #e94560; }

  /* RFQ ID */
  .rfq-id-section { padding: 8px 16px; border-top: 1px solid #e0e4ea; color: #b0b3ba; font-size: 10px; font-family: monospace; word-break: break-all; }

  /* Top bar */
  .top-bar { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: #fff; border-bottom: 1px solid #e0e4ea; }
  .top-bar .room-name { font-size: 16px; font-weight: 600; flex: 1; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: background 0.15s; }
  .btn-toggle { background: #e8f0fe; color: #0055cc; }
  .btn-toggle:hover { background: #d0e2fc; }
  .btn-toggle.active { background: #0055cc; color: #fff; }

  /* Measurement labels (CSS2D) */
  .measure-label { background: rgba(0,85,204,0.85); color: #fff; padding: 2px 6px; border-radius: 3px; font-size: 11px; font-weight: 600; font-family: -apple-system, monospace; white-space: nowrap; pointer-events: none; }
  .measure-label.area { background: rgba(52,168,83,0.9); font-size: 13px; }
  .measure-label.height { background: rgba(234,134,0,0.9); }

  /* Loading / spinners */
  .loading { display: flex; align-items: center; justify-content: center; height: 100%; color: #8e8e93; font-size: 16px; }
  .viewer-spinner { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
                    z-index: 25; background: rgba(0,0,0,0.55); color: #fff; padding: 12px 20px;
                    border-radius: 8px; font-size: 13px; font-weight: 600; pointer-events: none; }

  /* Status bar */
  .status-bar { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.6); padding: 5px 16px; font-size: 11px; color: #ccc; display: flex; gap: 16px; z-index: 5; }
  .status-bar .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }
  .dot-orbit { background: #34a853; }
  .dot-paint { background: #e94560; }

  /* WASD keys */
  .wasd-keys { position: absolute; bottom: 30px; left: 16px; z-index: 15; display: grid;
               grid-template-columns: repeat(3, 28px); grid-template-rows: repeat(2, 28px); gap: 3px; pointer-events: none; }
  .wasd-key { width: 28px; height: 28px; border-radius: 4px; display: flex; align-items: center; justify-content: center;
              font-size: 11px; font-weight: 700; font-family: monospace; background: rgba(0,0,0,0.25); color: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.15); }
  .wasd-key.active { background: rgba(0,85,204,0.7); color: #fff; border-color: rgba(0,85,204,0.9); }
  .wasd-key.blank { visibility: hidden; }

  /* Modal overlay */
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
                   z-index: 100; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
  .modal-content { background: #fff; border-radius: 12px; padding: 32px; max-width: 400px; width: 90%; position: relative; }
  .modal-content h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .modal-content .auth-subtitle { color: #8e8e93; font-size: 13px; margin-bottom: 20px; }
  .modal-content input[type="email"],
  .modal-content input[type="password"] { width: 100%; padding: 12px; border: 1px solid #e0e4ea; border-radius: 8px; font-size: 14px; margin-bottom: 12px; }
  .modal-content input:focus { outline: none; border-color: #0055cc; }
  .auth-error { color: #ff3b30; font-size: 13px; min-height: 20px; margin-bottom: 8px; }
  .btn-full { width: 100%; padding: 12px; font-size: 15px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; }
  .btn-primary { background: #0055cc; color: #fff; }
  .btn-link { background: none; border: none; color: #0055cc; font-size: 13px; cursor: pointer; display: block; margin-top: 8px; text-align: center; width: 100%; }

  @media (max-width: 768px) {
    .sidebar { width: 280px; }
    .wasd-keys { display: none; }
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: #f2f4f8; }
  ::-webkit-scrollbar-thumb { background: #d0d3da; border-radius: 3px; }
</style>
</head>

<div class="app">
  <div class="sidebar" id="sidebar">
    <button class="sidebar-close" onclick="toggleSidebar()" title="Close panel">
      <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/></svg>
    </button>
    <div class="sidebar-header">
      <h1>RoomScan<span class="badge">ADMIN</span></h1>
      <div class="subtitle">Component Annotator</div>

      <div class="status-bar">
        <span><span class="dot dot-orbit" id="sdot"></span><span id="smode">Navigate</span></span>
        <span id="slabel" style="display:none"></span>
        <span id="sfaces">0 faces</span>
      </div>
    </div>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
import { MTLLoader } from 'three/addons/loaders/MTLLoader.js';

// ============================================================
// TAXONOMY
// ============================================================
const TAXONOMY = [
  { cat: 'Appliances', items: [
    { key:'sink', name:'Sink', unit:'EA' }, { key:'fridge', name:'Refrigerator', unit:'EA' },
    { key:'range', name:'Range/Oven', unit:'EA' }, { key:'tub', name:'Bathtub', unit:'EA' },
    { key:'toilet', name:'Toilet', unit:'EA' }, { key:'shower', name:'Shower', unit:'EA' },
    { key:'washer', name:'Washer', unit:'EA' }, { key:'dryer', name:'Dryer', unit:'EA' },
  ]},
  { cat: 'Cabinets', items: [
    { key:'cabinet_upper_skinny', name:'Upper Cabinet (Shallow)', unit:'LF' },
    { key:'cabinet_upper_wide', name:'Upper Cabinet (Deep)', unit:'LF' },
    { key:'cabinet_lower_skinny', name:'Lower/Base Cabinet (Shallow)', unit:'LF' },
    { key:'cabinet_lower_wide', name:'Lower/Base Cabinet (Deep)', unit:'LF' },
    { key:'cabinet_full_skinny', name:'Full Height Cabinet (Shallow)', unit:'LF' },
    { key:'cabinet_full_wide', name:'Full Height Cabinet (Deep)', unit:'LF' },
  ]},
  { cat: 'Floor Materials', items: [
    { key:'floor_hardwood', name:'Hardwood Floor', unit:'SF' },
    { key:'floor_carpet', name:'Carpet', unit:'SF' },
    { key:'floor_tile', name:'Tile Floor', unit:'SF' },
  ]},
  { cat: 'Ceiling Types', items: [
    { key:'ceiling_drywall', name:'Drywall Ceiling', unit:'SF' },
    { key:'ceiling_drop', name:'Drop/Suspended Ceiling', unit:'SF' },
  ]},
  { cat: 'Trim & Molding', items: [
    { key:'baseboard', name:'Baseboard', unit:'LF' },
    { key:'toe_kick', name:'Toe Kick', unit:'LF' },
    { key:'shoe_molding', name:'Shoe Molding', unit:'LF' },
  ]},
  { cat: 'Doors & Openings', items: [
    { key:'door_interior', name:'Interior Door', unit:'EA' },
    { key:'door_exterior', name:'Exterior Door', unit:'EA' },
  ]},
  { cat: 'Light Fixtures', items: [
    { key:'light_recessed', name:'Recessed Light', unit:'EA' },
    { key:'light_fixture', name:'Ceiling Light Fixture', unit:'EA' },
    { key:'light_fluorescent', name:'Fluorescent Light', unit:'EA' },
  ]},
  { cat: 'Occlusions / Clutter', items: [
    { key:'clutter', name:'General Clutter', unit:'SF' },
    { key:'rug', name:'Rug', unit:'SF' },
    { key:'furniture', name:'Furniture', unit:'SF' },
  ]},
];
const FLAT = {};
TAXONOMY.forEach(c => c.items.forEach(i => FLAT[i.key] = { ...i, cat: c.cat }));

const COLORS = [
  '#4CAF50','#2196F3','#FF9800','#E91E63','#9C27B0','#00BCD4','#FF5722','#795548',
  '#607D8B','#CDDC39','#F44336','#3F51B5','#009688','#FFC107','#673AB7','#8BC34A',
  '#03A9F4','#FF6F00','#AD1457','#1B5E20',
];
let colorIdx = 0;

// ============================================================
// STATE
// ============================================================
const API_BASE = window.location.origin;
let authToken = null;
let currentRfqId = null;
let currentScanId = null;
let currentData = null;
let activeRoomIndex = -1;

let scene, camera, renderer, cssRenderer, controls;
let mode = 'orbit';
let meshGroup = null;
let meshChildren = [];
let brushCm = 5;
let measurementGroup = null;
let measurementsVisible = true;
let isBirdsEye = false;
let savedInteriorCamPos = null, savedInteriorCamTarget = null, savedInteriorFov = 60;
let isHD = false;
let currentTextureUrls = null;
let hdGroup = null;

const anns = new Map();
let activeKey = null;

let painting = false;
let strokeDirty = false;
const undoStack = [];
const MAX_UNDO = 50;
let hoverMesh = null;

const keys = {};
const MOVE_SPEED = 0.04;

// Spatial index
const spatialIndexes = [];

// Corner editing state — each corner has independent floor + ceiling Y
let corners = [];             // [{x, z, ceilingY, floorY}] in feet
let selectedCornerIdx = -1;
let selectedIsFloor = false;  // true if the floor sphere is selected (vs ceiling)
let cornerSpheres = [];       // THREE.Mesh ceiling spheres
let cornerFloorSpheres = [];  // THREE.Mesh floor spheres
let cornerEdgeLines = null;   // THREE.LineSegments (ceiling + floor edges)
let cornerVertLines = null;   // THREE.LineSegments (vertical lines)
let cornerLabels = [];        // CSS2DObject labels
let draggingCorner = false;
let cornersChanged = false;
const CORNER_RADIUS = 0.04;
const CORNER_COLOR = 0x0055cc;
const CORNER_SELECTED = 0xe94560;
const CORNER_FLOOR_COLOR = 0x2196F3; // blue for floor corners (green reserved for features)

// Features layer — doors, cabinets, openings, windows
const FEATURE_TYPES = [
  { key: 'door_frame', name: 'Door Frame', color: 0x34a853 },
  { key: 'cased_opening', name: 'Cased Opening', color: 0x8BC34A },
  { key: 'window', name: 'Window', color: 0x00BCD4 },
  { key: 'cabinet_outline', name: 'Cabinet Outline', color: 0xFF9800 },
];
let features = [];               // [{ id, type, points: [{x,y,z}], edges: [[i,j]], closed }]
let activeFeatureIdx = -1;
let featureDrawing = false;       // true when placing points for a new feature
let featureLastPointIdx = -1;     // last placed point index (for edge drawing)
let featureMeshes = new Map();    // feature id → { spheres, lines, labels }
let featuresChanged = false;
const FEATURE_SPHERE_RADIUS = 0.025;
let nextFeatureId = 1;

// Paint throttle
const dirtyOverlays = new Set();
let rebuildTimer = null;
const REBUILD_INTERVAL = 120;

// ============================================================
// THREE.JS SETUP
// ============================================================
function initThree() {
  const container = document.getElementById('viewer-container');
  const loading = document.getElementById('viewer-loading');
  if (loading) loading.style.display = 'none';

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a1a);

  camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.01, 100);
  camera.position.set(0, 0.8, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  container.appendChild(renderer.domElement);

  cssRenderer = new CSS2DRenderer();
  cssRenderer.setSize(container.clientWidth, container.clientHeight);
  cssRenderer.domElement.style.position = 'absolute';
  cssRenderer.domElement.style.top = '0';
  cssRenderer.domElement.style.pointerEvents = 'none';
  container.appendChild(cssRenderer.domElement);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 0.8, 1);
  controls.enableDamping = true;
  controls.dampingFactor = 0.1;
  controls.rotateSpeed = 0.5;
  controls.enableZoom = true;
  controls.enablePan = false;
  controls.update();

  scene.add(new THREE.AmbientLight(0xffffff, 2.0));
  const dl = new THREE.DirectionalLight(0xffffff, 1.0);
  dl.position.set(0, 2, 0);
  scene.add(dl);

  window.addEventListener('resize', onResize);
  new ResizeObserver(onResize).observe(container);

  renderer.domElement.addEventListener('pointerdown', onDown);
  renderer.domElement.addEventListener('pointermove', onMove);
  renderer.domElement.addEventListener('pointerup', onUp);
  renderer.domElement.addEventListener('pointerleave', onUp);

  window.addEventListener('keydown', onKeyDown);
  window.addEventListener('keyup', onKeyUp);

  animate();
}

function onResize() {
  const c = document.getElementById('viewer-container');
  if (!c || !camera) return;
  const w = c.clientWidth, h = c.clientHeight;
  if (!w || !h) return;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  cssRenderer.setSize(w, h);
}

function animate() {
  requestAnimationFrame(animate);
  applyMovement();
  controls.update();
  renderer.render(scene, camera);
  cssRenderer.render(scene, camera);
}

function applyMovement() {
  if (!camera || !controls) return;
  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  const right = new THREE.Vector3().crossVectors(dir, camera.up).normalize();
  const fwd = new THREE.Vector3(dir.x, 0, dir.z).normalize();
  const strafe = new THREE.Vector3(right.x, 0, right.z).normalize();
  const d = new THREE.Vector3();
  if (keys['arrowup']) d.add(fwd.clone().multiplyScalar(MOVE_SPEED));
  if (keys['arrowdown']) d.add(fwd.clone().multiplyScalar(-MOVE_SPEED));
  if (keys['arrowleft']) d.add(strafe.clone().multiplyScalar(-MOVE_SPEED));
  if (keys['arrowright']) d.add(strafe.clone().multiplyScalar(MOVE_SPEED));
  if (keys['q'] || keys[' ']) d.y += MOVE_SPEED;
  if (keys['shift']) d.y -= MOVE_SPEED;
  if (d.lengthSq() > 0) { camera.position.add(d); controls.target.add(d); }

  for (const k of ['arrowup','arrowleft','arrowdown','arrowright']) {
    const el = document.getElementById('key-' + k);
    if (el) el.classList.toggle('active', !!keys[k]);
  }
}

window.toggleMeasurements = function() {
  measurementsVisible = !measurementsVisible;
  if (measurementGroup) measurementGroup.visible = measurementsVisible;
  const btn = document.getElementById('btn-measures');
  btn.classList.toggle('active', measurementsVisible);
  btn.textContent = measurementsVisible ? 'Hide Measurements' : 'Show Measurements';
};

window.toggleViewMode = function() {
  isBirdsEye = !isBirdsEye;
  const btn = document.getElementById('btn-view-mode');
  if (isBirdsEye) {
    savedInteriorCamPos = camera.position.clone();
    savedInteriorCamTarget = controls.target.clone();
    savedInteriorFov = camera.fov;

    const box = new THREE.Box3();
    if (meshGroup) box.expandByObject(meshGroup);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxSpan = Math.max(size.x, size.z, 2);
    const camHeight = box.max.y + maxSpan * 1.5;
    camera.position.set(center.x, camHeight, center.z);
    controls.target.set(center.x, box.min.y, center.z);
    const dist = camHeight - box.min.y;
    const fovFromV = 2 * Math.atan2(size.z/2, dist);
    const fovFromH = 2 * Math.atan2(size.x/2/camera.aspect, dist);
    camera.fov = Math.min(Math.max(THREE.MathUtils.radToDeg(Math.max(fovFromV, fovFromH)/0.5), 30), 120);
    camera.updateProjectionMatrix();

    // Switch to FrontSide so backface culling hides nearest surfaces
    function setSide(side) {
      [meshGroup, hdGroup].forEach(g => { if (g) g.traverse(c => { if (c.isMesh) { const ms = Array.isArray(c.material)?c.material:[c.material]; ms.forEach(m => m.side = side); } }); });
    }
    setSide(THREE.FrontSide);

    controls.enableZoom = true; controls.enablePan = true; controls.rotateSpeed = 0.5;
    controls.update();
    btn.classList.add('active'); btn.textContent = '360 Tour';
  } else {
    if (savedInteriorCamPos) { camera.position.copy(savedInteriorCamPos); controls.target.copy(savedInteriorCamTarget); camera.fov = savedInteriorFov; camera.updateProjectionMatrix(); }

    // Restore DoubleSide for interior viewing
    function setSideRestore(side) {
      [meshGroup, hdGroup].forEach(g => { if (g) g.traverse(c => { if (c.isMesh) { const ms = Array.isArray(c.material)?c.material:[c.material]; ms.forEach(m => m.side = side); } }); });
    }
    setSideRestore(THREE.DoubleSide);

    controls.enableZoom = true; controls.enablePan = false; controls.rotateSpeed = 0.5;
    controls.update();
    btn.classList.remove('active'); btn.textContent = 'Birds Eye View';
  }
};

function buildMeasurements(room) {
  if (measurementGroup) { scene.remove(measurementGroup); }
  measurementGroup = new THREE.Group();
  measurementGroup.visible = measurementsVisible;

  if (!room.room_polygon_ft || room.room_polygon_ft.length < 3) { scene.add(measurementGroup); return; }

  const FT_TO_M = 1/3.28084;
  const cornersM = room.room_polygon_ft.map(([x,z]) => [x*FT_TO_M, z*FT_TO_M]);
  const ceilingHeightM = (room.ceiling_height_ft || 8) * FT_TO_M;
  const cornersYM = (room.wall_heights_ft || []).map(h => h*FT_TO_M);
  const avgCeilingY = cornersYM.length > 0 ? cornersYM.reduce((s,v)=>s+v,0)/cornersYM.length : ceilingHeightM;
  const floorY = avgCeilingY - ceilingHeightM;
  const cx = cornersM.reduce((s,p)=>s+p[0],0)/cornersM.length;
  const cz = cornersM.reduce((s,p)=>s+p[1],0)/cornersM.length;
  const NUDGE = 0.005;

  function nudge(x,z) { const dx=cx-x, dz=cz-z, d=Math.sqrt(dx*dx+dz*dz)||1; return [x+dx/d*NUDGE, z+dz/d*NUDGE]; }

  // Edge lines + wall length labels
  const lineMat = new THREE.LineBasicMaterial({ color: 0x0055cc, depthTest: false });
  for (let i=0; i<cornersM.length; i++) {
    const j = (i+1)%cornersM.length;
    const [x0,z0] = nudge(cornersM[i][0], cornersM[i][1]);
    const [x1,z1] = nudge(cornersM[j][0], cornersM[j][1]);
    const h0 = cornersYM[i] || avgCeilingY;
    const h1 = cornersYM[j] || avgCeilingY;

    // Ceiling edge
    const ceilGeom = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x0,h0,z0), new THREE.Vector3(x1,h1,z1)]);
    const ceilLine = new THREE.Line(ceilGeom, lineMat); ceilLine.renderOrder = 999;
    measurementGroup.add(ceilLine);

    // Floor edge
    const floorGeom = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x0,floorY,z0), new THREE.Vector3(x1,floorY,z1)]);
    const floorLine = new THREE.Line(floorGeom, lineMat); floorLine.renderOrder = 999;
    measurementGroup.add(floorLine);

    // Vertical corner line
    const vertGeom = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x0,floorY,z0), new THREE.Vector3(x0,h0,z0)]);
    const vertLine = new THREE.Line(vertGeom, lineMat); vertLine.renderOrder = 999;
    measurementGroup.add(vertLine);

    // Wall length label at ceiling midpoint
    const wallLen = Math.sqrt((cornersM[j][0]-cornersM[i][0])**2 + (cornersM[j][1]-cornersM[i][1])**2) / FT_TO_M;
    const mx = (x0+x1)/2, mz = (z0+z1)/2, my = ((h0+h1)/2);
    addLabel(formatFtIn(wallLen), new THREE.Vector3(mx,my,mz));
  }

  // Height label at first corner
  addLabel(formatFtIn(room.ceiling_height_ft || 8), new THREE.Vector3(nudge(cornersM[0][0],cornersM[0][1])[0], (floorY+avgCeilingY)/2, nudge(cornersM[0][0],cornersM[0][1])[1]), 'height');

  // Floor area label
  if (room.floor_area_sqft) {
    addLabel(`${Math.round(room.floor_area_sqft)} SF`, new THREE.Vector3(cx, floorY + 0.05, cz), 'area');
  }

  scene.add(measurementGroup);
}

function addLabel(text, position, cls) {
  const div = document.createElement('div');
  div.className = 'measure-label' + (cls ? ' ' + cls : '');
  div.textContent = text;
  const label = new CSS2DObject(div);
  label.position.copy(position);
  measurementGroup.add(label);
}

function formatFtIn(totalFt) {
  const ft = Math.floor(totalFt);
  const inches = Math.round((totalFt - ft) * 12);
  return inches === 0 ? `${ft}'` : `${ft}' ${inches}"`;
}

// ============================================================
// CORNER EDITING — independent floor + ceiling per corner
// ============================================================
function initCornersFromRoom(room) {
  corners = [];
  const poly = room.room_polygon_ft;
  const ceilH = room.wall_heights_ft || [];
  const floorH = room.floor_heights_ft || [];
  if (!poly || poly.length < 3) return;

  const avgCeil = ceilH.length ? ceilH.reduce((s,v)=>s+v,0)/ceilH.length : (room.ceiling_height_ft || 8);
  const defaultFloor = avgCeil - (room.ceiling_height_ft || 8);

  for (let i = 0; i < poly.length; i++) {
    corners.push({
      x: poly[i][0], z: poly[i][1],
      ceilingY: ceilH[i] || avgCeil,
      floorY: floorH[i] !== undefined ? floorH[i] : defaultFloor,
    });
  }
  selectedCornerIdx = -1;
  selectedIsFloor = false;
  cornersChanged = false;
  renderCornerVisuals();
}

function clearCornerVisuals() {
  cornerSpheres.forEach(s => scene.remove(s));
  cornerFloorSpheres.forEach(s => scene.remove(s));
  cornerLabels.forEach(l => { if (l.parent) l.parent.remove(l); });
  if (cornerEdgeLines) { scene.remove(cornerEdgeLines); cornerEdgeLines = null; }
  if (cornerVertLines) { scene.remove(cornerVertLines); cornerVertLines = null; }
  cornerSpheres = []; cornerFloorSpheres = []; cornerLabels = [];
}

function renderCornerVisuals() {
  clearCornerVisuals();
  if (corners.length === 0) return;

  const FT = 1 / 3.28084;
  const sphereGeom = new THREE.SphereGeometry(CORNER_RADIUS, 12, 12);

  for (let i = 0; i < corners.length; i++) {
    const c = corners[i];
    const wx = c.x*FT, wz = c.z*FT, wCY = c.ceilingY*FT, wFY = c.floorY*FT;

    // Ceiling sphere
    const isCeilSel = (i === selectedCornerIdx && !selectedIsFloor);
    const cmat = new THREE.MeshBasicMaterial({ color: isCeilSel ? CORNER_SELECTED : CORNER_COLOR, depthTest: false });
    const cs = new THREE.Mesh(sphereGeom, cmat);
    cs.position.set(wx, wCY, wz);
    cs.renderOrder = 10;
    cs.userData = { cornerIdx: i, isFloor: false };
    scene.add(cs);
    cornerSpheres.push(cs);

    // Floor sphere
    const isFloorSel = (i === selectedCornerIdx && selectedIsFloor);
    const fmat = new THREE.MeshBasicMaterial({ color: isFloorSel ? CORNER_SELECTED : CORNER_FLOOR_COLOR, depthTest: false });
    const fs = new THREE.Mesh(sphereGeom, fmat);
    fs.position.set(wx, wFY, wz);
    fs.renderOrder = 10;
    fs.userData = { cornerIdx: i, isFloor: true };
    scene.add(fs);
    cornerFloorSpheres.push(fs);

    // Label
    const div = document.createElement('div');
    div.className = 'measure-label';
    div.style.background = (i === selectedCornerIdx) ? '#e94560' : 'rgba(0,85,204,0.85)';
    div.textContent = `${i + 1}`;
    const label = new CSS2DObject(div);
    label.position.set(wx, wCY + 0.08, wz);
    scene.add(label);
    cornerLabels.push(label);
  }

  // Edge lines
  const ceilPts = [], floorPts = [];
  for (let i = 0; i < corners.length; i++) {
    const j = (i+1) % corners.length;
    const ci = corners[i], cj = corners[j];
    ceilPts.push(new THREE.Vector3(ci.x*FT, ci.ceilingY*FT, ci.z*FT), new THREE.Vector3(cj.x*FT, cj.ceilingY*FT, cj.z*FT));
    floorPts.push(new THREE.Vector3(ci.x*FT, ci.floorY*FT, ci.z*FT), new THREE.Vector3(cj.x*FT, cj.floorY*FT, cj.z*FT));
  }
  cornerEdgeLines = new THREE.Group();
  cornerEdgeLines.add(new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(ceilPts), new THREE.LineBasicMaterial({ color: CORNER_COLOR, depthTest: false })));
  cornerEdgeLines.add(new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(floorPts), new THREE.LineBasicMaterial({ color: CORNER_FLOOR_COLOR, depthTest: false })));
  cornerEdgeLines.renderOrder = 9;
  scene.add(cornerEdgeLines);

  // Vertical lines
  const vertPts = [];
  for (const c of corners) vertPts.push(new THREE.Vector3(c.x*FT, c.floorY*FT, c.z*FT), new THREE.Vector3(c.x*FT, c.ceilingY*FT, c.z*FT));
  cornerVertLines = new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(vertPts), new THREE.LineBasicMaterial({ color: 0x8e8ea0, depthTest: false }));
  cornerVertLines.renderOrder = 9;
  scene.add(cornerVertLines);
}

function findClosestEdge(point) {
  if (corners.length < 2) return -1;
  const FT = 1/3.28084;
  let bestDist = Infinity, bestEdge = -1;
  for (let i = 0; i < corners.length; i++) {
    const j = (i+1) % corners.length;
    const a = new THREE.Vector3(corners[i].x*FT, (corners[i].ceilingY+corners[i].floorY)/2*FT, corners[i].z*FT);
    const b = new THREE.Vector3(corners[j].x*FT, (corners[j].ceilingY+corners[j].floorY)/2*FT, corners[j].z*FT);
    const ab = b.clone().sub(a); const ap = point.clone().sub(a);
    let t = ap.dot(ab) / ab.dot(ab); t = Math.max(0, Math.min(1, t));
    const closest = a.clone().add(ab.clone().multiplyScalar(t));
    const dist = point.distanceTo(closest);
    if (dist < bestDist) { bestDist = dist; bestEdge = i; }
  }
  return bestDist < 0.15 ? bestEdge : -1;
}

function onCornerDown(e) {
  e.preventDefault(); e.stopPropagation();
  controls.enabled = false;
  pushUndo();

  const rect = renderer.domElement.getBoundingClientRect();
  ndc.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  ndc.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  ray.setFromCamera(ndc, camera);

  // Check ceiling spheres
  const ceilHits = ray.intersectObjects(cornerSpheres, false);
  if (ceilHits.length > 0) {
    selectedCornerIdx = ceilHits[0].object.userData.cornerIdx;
    selectedIsFloor = false;
    draggingCorner = true;
    renderCornerVisuals();
    return;
  }
  // Check floor spheres
  const floorHits = ray.intersectObjects(cornerFloorSpheres, false);
  if (floorHits.length > 0) {
    selectedCornerIdx = floorHits[0].object.userData.cornerIdx;
    selectedIsFloor = true;
    draggingCorner = true;
    renderCornerVisuals();
    return;
  }

  // Mesh click — insert on edge or append
  const meshHit = castFace(e);
  if (!meshHit) { undoStack.pop(); return; }

  const M2F = 3.28084;
  const hitFt = { x: Math.round(meshHit.pt.x*M2F*100)/100, z: Math.round(meshHit.pt.z*M2F*100)/100, y: Math.round(meshHit.pt.y*M2F*100)/100 };

  const edgeIdx = findClosestEdge(meshHit.pt);
  if (edgeIdx >= 0) {
    const ci = corners[edgeIdx], cj = corners[(edgeIdx+1)%corners.length];
    corners.splice(edgeIdx+1, 0, { x: hitFt.x, z: hitFt.z, ceilingY: hitFt.y, floorY: (ci.floorY+cj.floorY)/2 });
    selectedCornerIdx = edgeIdx+1; selectedIsFloor = false;
  } else {
    const defFloor = corners.length > 0 ? corners[0].floorY : 0;
    const nc = { x: hitFt.x, z: hitFt.z, ceilingY: hitFt.y, floorY: defFloor };
    if (selectedCornerIdx >= 0 && selectedCornerIdx < corners.length) {
      corners.splice(selectedCornerIdx+1, 0, nc);
      selectedCornerIdx++;
    } else {
      corners.push(nc);
      selectedCornerIdx = corners.length-1;
    }
    selectedIsFloor = false;
  }
  cornersChanged = true;
  renderCornerVisuals();
  rebuildMeasurementsFromCorners();
}

function onCornerMove(e) {
  if (!draggingCorner || selectedCornerIdx < 0) return;
  e.preventDefault();
  const meshHit = castFace(e);
  if (!meshHit) return;
  const M2F = 3.28084;
  const c = corners[selectedCornerIdx];
  c.x = Math.round(meshHit.pt.x*M2F*100)/100;
  c.z = Math.round(meshHit.pt.z*M2F*100)/100;
  if (selectedIsFloor) c.floorY = Math.round(meshHit.pt.y*M2F*100)/100;
  else c.ceilingY = Math.round(meshHit.pt.y*M2F*100)/100;
  cornersChanged = true;
  renderCornerVisuals();
}

function onCornerUp(e) {
  if (draggingCorner) { draggingCorner = false; rebuildMeasurementsFromCorners(); }
  controls.enabled = false;
}

function rebuildMeasurementsFromCorners() {
  if (corners.length < 3) return;
  const room = currentData?.rooms?.[activeRoomIndex];
  if (!room) return;
  room.room_polygon_ft = corners.map(c => [c.x, c.z]);
  room.wall_heights_ft = corners.map(c => c.ceilingY);
  room.floor_heights_ft = corners.map(c => c.floorY);

  const FT2M = 1/3.28084, SQM2SF = 10.7639;
  const cm = corners.map(c => [c.x*FT2M, c.z*FT2M]);
  const n = cm.length;
  let sa = 0;
  for (let i=0;i<n;i++){const j=(i+1)%n; sa += cm[i][0]*cm[j][1] - cm[j][0]*cm[i][1];}
  room.floor_area_sqft = Math.round(Math.abs(sa)/2*SQM2SF*10)/10;
  let pm = 0;
  for (let i=0;i<n;i++){const j=(i+1)%n; pm += Math.sqrt((cm[j][0]-cm[i][0])**2+(cm[j][1]-cm[i][1])**2);}
  room.perimeter_linear_ft = Math.round(pm*3.28084*10)/10;
  const wh = corners.map(c => c.ceilingY - c.floorY);
  room.ceiling_height_ft = Math.round(wh.reduce((s,v)=>s+v,0)/wh.length*100)/100;
  room.wall_area_sqft = Math.round(room.perimeter_linear_ft*room.ceiling_height_ft*10)/10;
  buildMeasurements(room);
  renderMetrics(room);
}

window.addEventListener('keydown', (e) => {
  if (mode !== 'corners' || selectedCornerIdx < 0) return;
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    e.preventDefault();
    if (corners.length <= 3) return;
    pushUndo();
    corners.splice(selectedCornerIdx, 1);
    selectedCornerIdx = Math.min(selectedCornerIdx, corners.length-1);
    cornersChanged = true;
    renderCornerVisuals();
    rebuildMeasurementsFromCorners();
  }
});

// ============================================================
// ============================================================
// FEATURES — doors, cabinets, openings, windows
// ============================================================
function renderAllFeatures() {
  // Clear all feature visuals
  for (const [id, vis] of featureMeshes) {
    vis.spheres.forEach(s => scene.remove(s));
    vis.lines.forEach(l => scene.remove(l));
    vis.labels.forEach(l => { if (l.parent) l.parent.remove(l); });
  }
  featureMeshes.clear();

  const FT = 1 / 3.28084;
  const sphereGeom = new THREE.SphereGeometry(FEATURE_SPHERE_RADIUS, 10, 10);

  for (let fi = 0; fi < features.length; fi++) {
    const feat = features[fi];
    const typeInfo = FEATURE_TYPES.find(t => t.key === feat.type) || FEATURE_TYPES[0];
    const isActive = (fi === activeFeatureIdx);
    const color = isActive ? 0xe94560 : typeInfo.color;

    const vis = { spheres: [], lines: [], labels: [] };

    // Points
    for (let pi = 0; pi < feat.points.length; pi++) {
      const p = feat.points[pi];
      const mat = new THREE.MeshBasicMaterial({ color, depthTest: false });
      const sphere = new THREE.Mesh(sphereGeom, mat);
      sphere.position.set(p.x * FT, p.y * FT, p.z * FT);
      sphere.renderOrder = 11;
      sphere.userData = { featureIdx: fi, pointIdx: pi };
      scene.add(sphere);
      vis.spheres.push(sphere);
    }

    // Edges
    for (const [a, b] of feat.edges) {
      if (a >= feat.points.length || b >= feat.points.length) continue;
      const pa = feat.points[a], pb = feat.points[b];
      const pts = [
        new THREE.Vector3(pa.x*FT, pa.y*FT, pa.z*FT),
        new THREE.Vector3(pb.x*FT, pb.y*FT, pb.z*FT),
      ];
      const line = new THREE.Line(
        new THREE.BufferGeometry().setFromPoints(pts),
        new THREE.LineBasicMaterial({ color, depthTest: false, linewidth: 2 })
      );
      line.renderOrder = 10;
      scene.add(line);
      vis.lines.push(line);
    }

    // Label with type name + measurements
    if (feat.points.length > 0) {
      const cx = feat.points.reduce((s,p) => s+p.x, 0) / feat.points.length * FT;
      const cy = feat.points.reduce((s,p) => s+p.y, 0) / feat.points.length * FT;
      const cz = feat.points.reduce((s,p) => s+p.z, 0) / feat.points.length * FT;

      let labelText = typeInfo.name;
      if (feat.points.length >= 2) {
        // Compute width and height
        const xs = feat.points.map(p => p.x), zs = feat.points.map(p => p.z), ys = feat.points.map(p => p.y);
        const w = Math.sqrt((Math.max(...xs)-Math.min(...xs))**2 + (Math.max(...zs)-Math.min(...zs))**2);
        const h = Math.max(...ys) - Math.min(...ys);
        if (w > 0.1 || h > 0.1) labelText += ` ${formatFtIn(w)}×${formatFtIn(h)}`;
      }

      const div = document.createElement('div');
      div.className = 'measure-label';
      div.style.background = `rgba(${(color>>16)&0xff}, ${(color>>8)&0xff}, ${color&0xff}, 0.85)`;
      div.textContent = labelText;
      const label = new CSS2DObject(div);
      label.position.set(cx, cy + 0.06, cz);
      scene.add(label);
      vis.labels.push(label);
    }

    featureMeshes.set(feat.id, vis);
  }
}

function onFeatureDown(e) {
  e.preventDefault(); e.stopPropagation();
  controls.enabled = false;
  pushUndo();

  const rect = renderer.domElement.getBoundingClientRect();
  ndc.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  ndc.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  ray.setFromCamera(ndc, camera);

  // Check if clicking an existing feature point
  const allSpheres = [];
  for (const [id, vis] of featureMeshes) allSpheres.push(...vis.spheres);
  const hits = ray.intersectObjects(allSpheres, false);

  if (hits.length > 0) {
    const { featureIdx, pointIdx } = hits[0].object.userData;
    activeFeatureIdx = featureIdx;

    if (featureDrawing && featureIdx === activeFeatureIdx) {
      // Clicking an existing point while drawing — create edge to it
      const feat = features[activeFeatureIdx];
      if (featureLastPointIdx >= 0 && featureLastPointIdx !== pointIdx) {
        const edgeExists = feat.edges.some(([a,b]) => (a===featureLastPointIdx&&b===pointIdx)||(a===pointIdx&&b===featureLastPointIdx));
        if (!edgeExists) {
          feat.edges.push([featureLastPointIdx, pointIdx]);
          featuresChanged = true;
        }
        // If connecting back to first point, close the feature
        if (pointIdx === 0 && feat.points.length >= 3) {
          feat.closed = true;
          featureDrawing = false;
          featureLastPointIdx = -1;
        } else {
          featureLastPointIdx = pointIdx;
        }
      }
    } else {
      // Select existing feature point
      featureLastPointIdx = pointIdx;
    }
    renderAllFeatures();
    renderFeatureList();
    return;
  }

  // Click on mesh — place new point
  const meshHit = castFace(e);
  if (!meshHit) { undoStack.pop(); return; }

  const M2F = 3.28084;
  const pt = {
    x: Math.round(meshHit.pt.x * M2F * 100) / 100,
    y: Math.round(meshHit.pt.y * M2F * 100) / 100,
    z: Math.round(meshHit.pt.z * M2F * 100) / 100,
  };

  if (featureDrawing && activeFeatureIdx >= 0) {
    // Add point to current feature
    const feat = features[activeFeatureIdx];
    feat.points.push(pt);
    const newIdx = feat.points.length - 1;
    // Create edge from last point
    if (featureLastPointIdx >= 0) {
      feat.edges.push([featureLastPointIdx, newIdx]);
    }
    featureLastPointIdx = newIdx;
    featuresChanged = true;
  } else {
    // Not drawing — this click doesn't start a feature (need to use Add Feature button)
    undoStack.pop();
    return;
  }

  renderAllFeatures();
  renderFeatureList();
}

function onFeatureMove(e) {
  // Could add dragging later — for now, no-op
}

function onFeatureUp(e) {
  // No-op for now
}

window.startFeature = function(typeKey) {
  const feat = {
    id: `feat_${nextFeatureId++}`,
    type: typeKey,
    points: [],
    edges: [],
    closed: false,
  };
  features.push(feat);
  activeFeatureIdx = features.length - 1;
  featureDrawing = true;
  featureLastPointIdx = -1;
  featuresChanged = true;
  setMode('features');
  renderAllFeatures();
  renderFeatureList();
};

window.finishFeature = function() {
  featureDrawing = false;
  featureLastPointIdx = -1;
  renderAllFeatures();
  renderFeatureList();
};

window.deleteFeature = function(idx) {
  if (idx < 0 || idx >= features.length) return;
  pushUndo();
  const feat = features[idx];
  const vis = featureMeshes.get(feat.id);
  if (vis) {
    vis.spheres.forEach(s => scene.remove(s));
    vis.lines.forEach(l => scene.remove(l));
    vis.labels.forEach(l => { if (l.parent) l.parent.remove(l); });
    featureMeshes.delete(feat.id);
  }
  features.splice(idx, 1);
  if (activeFeatureIdx >= features.length) activeFeatureIdx = features.length - 1;
  featuresChanged = true;
  featureDrawing = false;
  renderAllFeatures();
  renderFeatureList();
};

window.selectFeature = function(idx) {
  activeFeatureIdx = idx;
  featureDrawing = false;
  featureLastPointIdx = -1;
  renderAllFeatures();
  renderFeatureList();
};

function renderFeatureList() {
  const el = document.getElementById('feature-rows');
  if (!el) return;
  if (features.length === 0) {
    el.innerHTML = '<div class="ann-empty">No features. Click "Add Feature" below.</div>';
    return;
  }
  let h = '';
  for (let i = 0; i < features.length; i++) {
    const f = features[i];
    const typeInfo = FEATURE_TYPES.find(t => t.key === f.type) || { name: f.type };
    const act = i === activeFeatureIdx ? ' active' : '';
    const drawing = (i === activeFeatureIdx && featureDrawing) ? ' (drawing...)' : '';
    h += `<div class="ann-row${act}" onclick="selectFeature(${i})">
      <div class="swatch" style="background:#${(FEATURE_TYPES.find(t=>t.key===f.type)?.color||0x34a853).toString(16).padStart(6,'0')}"></div>
      <div class="ann-info">
        <div class="ann-name">${typeInfo.name}${drawing}</div>
        <div class="ann-meta"><span class="ann-faces">${f.points.length} pts, ${f.edges.length} edges${f.closed?' (closed)':''}</span></div>
      </div>
      <div class="ann-btns">
        ${(i === activeFeatureIdx && featureDrawing) ? '<button class="abtn" onclick="event.stopPropagation();finishFeature()" title="Finish">&#x2713;</button>' : ''}
        <button class="abtn" onclick="event.stopPropagation();deleteFeature(${i})" title="Delete">&times;</button>
      </div>
    </div>`;
  }
  el.innerHTML = h;
}

window.selectRoom = async function(index) {
  if (!currentData || !currentData.rooms[index]) return;

  // Save current before switching
  if (currentScanId && anns.size > 0) await window.doSave();

  // Clear state
  clearMesh();
  clearAnnotationsState();
  activeRoomIndex = index;

  document.querySelectorAll('.room-item').forEach((el, i) => el.classList.toggle('active', i === index));

  const room = currentData.rooms[index];
  currentScanId = room.scan_id;
  currentTextureUrls = room.texture_urls || {};
  document.getElementById('room-name').textContent = room.room_label || `Room ${index + 1}`;
  renderMetrics(room);

  // Reset HD state — default to standard (HD) if available
  isHD = !!currentTextureUrls.obj_standard;
  if (hdGroup) { scene.remove(hdGroup); hdGroup = null; }
  const hdBtn = document.getElementById('btn-hd');
  hdBtn.style.display = currentTextureUrls.obj_standard ? '' : 'none';
  hdBtn.classList.toggle('active', isHD);
  hdBtn.textContent = isHD ? 'HD On' : 'HD';

  // Show view mode button
  document.getElementById('btn-view-mode').style.display = room.room_polygon_ft ? '' : 'none';
  isBirdsEye = false;
  document.getElementById('btn-view-mode').classList.remove('active');
  document.getElementById('btn-view-mode').textContent = 'Birds Eye View';

  // Load mesh — prefer standard (HD) by default
  const textureUrls = currentTextureUrls;
  const objUrl = isHD ? textureUrls.obj_standard : textureUrls.obj;
  if (objUrl) {
    const spinner = document.getElementById('viewer-spinner');
    spinner.textContent = 'Loading...';
    spinner.style.display = 'block';
    loadMesh({ ...textureUrls, obj: objUrl }, isHD);
  } else if (textureUrls.obj) {
    isHD = false; hdBtn.classList.remove('active'); hdBtn.textContent = 'HD';
    const spinner = document.getElementById('viewer-spinner');
    spinner.textContent = 'Loading...';
    spinner.style.display = 'block';
    loadMesh(textureUrls, false);
  } else {
    const vl = document.getElementById('viewer-loading');
    vl.textContent = 'No OBJ mesh available for this room. Select another room.';
    vl.style.display = 'flex';
    vl.style.textAlign = 'center';
  }

  // Auto-collapse on mobile
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.add('collapsed');
    setTimeout(onResize, 350);
  }
};

// ============================================================
// MESH LOADING — from API (same as contractor view)
// ============================================================
function scanFilesBase(prefix) {
  const base = `${API_BASE}/api/rfqs/${currentRfqId}/scans/${currentScanId}/files/`;
  return prefix ? base + prefix + '/' : base;
}

function loadMesh(textureUrls, useStandard) {
  const resourcePath = scanFilesBase(useStandard ? 'standard' : null);
  const mtlUrl = resourcePath + 'textured.mtl';

  const mtlLoader = new MTLLoader();
  mtlLoader.setResourcePath(resourcePath);
  mtlLoader.setCrossOrigin('anonymous');
  mtlLoader.load(mtlUrl, (materials) => {
    materials.preload();
    Object.values(materials.materials).forEach(mat => {
      if (mat.map) { mat.map.colorSpace = THREE.SRGBColorSpace; mat.map.needsUpdate = true; }
      mat.transparent = false; mat.opacity = 1.0; mat.side = THREE.DoubleSide;
    });
    const objLoader = new OBJLoader();
    objLoader.setMaterials(materials);
    objLoader.load(textureUrls.obj, onMeshLoaded, undefined, (err) => {
      console.error('OBJ load failed:', err);
      document.getElementById('viewer-spinner').style.display = 'none';
    });
  }, undefined, (err) => {
    console.warn('MTL failed, loading OBJ with atlas:', err);
    const objLoader = new OBJLoader();
    objLoader.load(textureUrls.obj, (obj) => {
      if (textureUrls.atlas) {
        const tex = new THREE.TextureLoader().load(textureUrls.atlas);
        tex.colorSpace = THREE.SRGBColorSpace;
        const mat = new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide });
        obj.traverse(child => { if (child.isMesh) child.material = mat; });
      }
      onMeshLoaded(obj);
    });
  });
}

function onMeshLoaded(group) {
  meshGroup = group;
  scene.add(group);
  meshChildren = [];
  group.traverse(c => { if (c.isMesh) meshChildren.push(c); });

  // Position camera
  if (restoreCamAfterLoad) {
    camera.position.copy(restoreCamAfterLoad.pos);
    controls.target.copy(restoreCamAfterLoad.target);
    restoreCamAfterLoad = null;
  } else {
    const box = new THREE.Box3().setFromObject(group);
    const center = box.getCenter(new THREE.Vector3());
    camera.position.set(center.x, center.y, center.z);
    controls.target.set(center.x, center.y, center.z + 1);
  }
  controls.update();

  document.getElementById('viewer-spinner').style.display = 'none';

  const totalFaces = meshChildren.reduce((s, m) => s + faceCount(m), 0);
  console.log(`Loaded: ${meshChildren.length} sub-meshes, ${totalFaces} faces`);

  // Build measurements and initialize corners
  if (activeRoomIndex >= 0 && currentData?.rooms?.[activeRoomIndex]) {
    buildMeasurements(currentData.rooms[activeRoomIndex]);
    initCornersFromRoom(currentData.rooms[activeRoomIndex]);
  }

  // Build spatial indexes then load annotations
  setTimeout(() => {
    for (let ci = 0; ci < meshChildren.length; ci++) buildSpatialIndex(ci);
    loadAnnotations();
  }, 50);
}

function clearMesh() {
  if (meshGroup) {
    scene.remove(meshGroup);
    meshGroup.traverse(c => { if (c.isMesh) { c.geometry?.dispose(); if (Array.isArray(c.material)) c.material.forEach(m=>m.dispose()); else c.material?.dispose(); }});
    meshGroup = null; meshChildren = []; spatialIndexes.length = 0;
  }
  if (hdGroup) { scene.remove(hdGroup); hdGroup = null; }
  if (measurementGroup) { scene.remove(measurementGroup); measurementGroup = null; }
  // Clear corner visuals
  cornerSpheres.forEach(s => scene.remove(s)); cornerSpheres = [];
  cornerFloorSpheres.forEach(s => scene.remove(s)); cornerFloorSpheres = [];
  cornerLabels.forEach(l => { if (l.parent) l.parent.remove(l); }); cornerLabels = [];
  if (cornerEdgeLines) { scene.remove(cornerEdgeLines); cornerEdgeLines = null; }
  if (cornerVertLines) { scene.remove(cornerVertLines); cornerVertLines = null; }
  corners = []; selectedCornerIdx = -1; cornersChanged = false;
  // Clear features
  for (const [id, vis] of featureMeshes) { vis.spheres.forEach(s=>scene.remove(s)); vis.lines.forEach(l=>scene.remove(l)); vis.labels.forEach(l=>{if(l.parent)l.parent.remove(l);}); }
  featureMeshes.clear(); features = []; activeFeatureIdx = -1; featureDrawing = false; featuresChanged = false;
  if (hoverMesh) { scene.remove(hoverMesh); hoverMesh.geometry.dispose(); hoverMesh.material.dispose(); hoverMesh = null; }
}

// ============================================================
// FACE HELPERS
// ============================================================
function faceCount(mesh) {
  const g = mesh.geometry;
  return g.index ? g.index.count / 3 : g.attributes.position.count / 3;
}

function triVerts(mesh, fi) {
  const g = mesh.geometry, pos = g.attributes.position;
  const v0 = new THREE.Vector3(), v1 = new THREE.Vector3(), v2 = new THREE.Vector3();
  if (g.index) {
    v0.fromBufferAttribute(pos, g.index.getX(fi*3)); v1.fromBufferAttribute(pos, g.index.getX(fi*3+1)); v2.fromBufferAttribute(pos, g.index.getX(fi*3+2));
  } else {
    v0.fromBufferAttribute(pos, fi*3); v1.fromBufferAttribute(pos, fi*3+1); v2.fromBufferAttribute(pos, fi*3+2);
  }
  v0.applyMatrix4(mesh.matrixWorld); v1.applyMatrix4(mesh.matrixWorld); v2.applyMatrix4(mesh.matrixWorld);
  return [v0, v1, v2];
}

function triArea(v0, v1, v2) { return v1.clone().sub(v0).cross(v2.clone().sub(v0)).length() * 0.5; }

// ============================================================
// SPATIAL INDEX
// ============================================================
function buildSpatialIndex(ci) {
  const mesh = meshChildren[ci];
  const n = faceCount(mesh);
  const g = mesh.geometry, pos = g.attributes.position;
  const mat4 = mesh.matrixWorld;
  const centers = new Float32Array(n * 3);
  const v0 = new THREE.Vector3(), v1 = new THREE.Vector3(), v2 = new THREE.Vector3();
  for (let fi = 0; fi < n; fi++) {
    if (g.index) { v0.fromBufferAttribute(pos, g.index.getX(fi*3)); v1.fromBufferAttribute(pos, g.index.getX(fi*3+1)); v2.fromBufferAttribute(pos, g.index.getX(fi*3+2)); }
    else { v0.fromBufferAttribute(pos, fi*3); v1.fromBufferAttribute(pos, fi*3+1); v2.fromBufferAttribute(pos, fi*3+2); }
    v0.applyMatrix4(mat4); v1.applyMatrix4(mat4); v2.applyMatrix4(mat4);
    const off = fi * 3;
    centers[off] = (v0.x+v1.x+v2.x)/3; centers[off+1] = (v0.y+v1.y+v2.y)/3; centers[off+2] = (v0.z+v1.z+v2.z)/3;
  }
  const CELL = 0.25;
  const grid = new Map();
  for (let fi = 0; fi < n; fi++) {
    const off = fi*3;
    const key = `${Math.floor(centers[off]/CELL)},${Math.floor(centers[off+1]/CELL)},${Math.floor(centers[off+2]/CELL)}`;
    if (!grid.has(key)) grid.set(key, []);
    grid.get(key).push(fi);
  }
  spatialIndexes[ci] = { centers, grid, CELL, count: n };
}

function nearbyFaces(mesh, ci, seedFi, rWorld) {
  if (rWorld <= 0) return [{ ci, fi: seedFi }];
  const idx = spatialIndexes[ci];
  if (!idx) return [{ ci, fi: seedFi }];
  const off = seedFi*3, sx = idx.centers[off], sy = idx.centers[off+1], sz = idx.centers[off+2];
  const r2 = rWorld*rWorld, CELL = idx.CELL;
  const out = [];
  for (let ix = Math.floor((sx-rWorld)/CELL); ix <= Math.floor((sx+rWorld)/CELL); ix++)
    for (let iy = Math.floor((sy-rWorld)/CELL); iy <= Math.floor((sy+rWorld)/CELL); iy++)
      for (let iz = Math.floor((sz-rWorld)/CELL); iz <= Math.floor((sz+rWorld)/CELL); iz++) {
        const cell = idx.grid.get(`${ix},${iy},${iz}`);
        if (!cell) continue;
        for (const fi of cell) { const fo=fi*3, dx=idx.centers[fo]-sx, dy=idx.centers[fo+1]-sy, dz=idx.centers[fo+2]-sz; if (dx*dx+dy*dy+dz*dz<=r2) out.push({ci,fi}); }
      }
  return out;
}

// ============================================================
// RAYCASTING
// ============================================================
const ray = new THREE.Raycaster();
const ndc = new THREE.Vector2();
function castFace(e) {
  const rect = renderer.domElement.getBoundingClientRect();
  ndc.x = ((e.clientX-rect.left)/rect.width)*2-1;
  ndc.y = -((e.clientY-rect.top)/rect.height)*2+1;
  ray.setFromCamera(ndc, camera);
  const hits = ray.intersectObjects(meshChildren, false);
  if (hits.length > 0) { const h = hits[0]; return { ci: meshChildren.indexOf(h.object), fi: h.faceIndex, pt: h.point, mesh: h.object }; }
  return null;
}

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
let modeBeforeHold = null;
function onKeyDown(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') { keys[e.key.toLowerCase()] = true; return; }
  const k = e.key.toLowerCase();
  if (e.ctrlKey || e.metaKey) {
    if (k === 'z') { e.preventDefault(); doUndo(); return; }
    if (k === 'n') { e.preventDefault(); setMode('orbit'); return; }
    if (k === 'p') { e.preventDefault(); setMode('paint'); return; }
    if (k === 'e') { e.preventDefault(); setMode('erase'); return; }
    if (k === 'c') { e.preventDefault(); setMode('corners'); return; }
  }
  if (k === 'p' && mode !== 'paint') { modeBeforeHold = mode; setMode('paint'); return; }
  if (k === 'n' && mode !== 'orbit') { modeBeforeHold = mode; setMode('orbit'); return; }
  if (k === 'e' && mode !== 'erase' && !e.ctrlKey && !e.metaKey) { modeBeforeHold = mode; setMode('erase'); return; }
  if (k === 'c' && mode !== 'corners' && !e.ctrlKey && !e.metaKey) { modeBeforeHold = mode; setMode('corners'); return; }
  keys[k] = true;
}
function onKeyUp(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') { keys[e.key.toLowerCase()] = false; return; }
  const k = e.key.toLowerCase(); keys[k] = false;
  if (modeBeforeHold !== null && ((k==='p'&&mode==='paint')||(k==='n'&&mode==='orbit')||(k==='e'&&mode==='erase')||(k==='c'&&mode==='corners'))) { setMode(modeBeforeHold); modeBeforeHold = null; }
}

// ============================================================
// UNDO
// ============================================================
function pushUndo() {
  const annSnap = []; for (const [k,a] of anns) annSnap.push({k, faces: new Set(a.faces)});
  const cornerSnap = corners.map(c => ({...c}));
  const featSnap = JSON.parse(JSON.stringify(features));
  undoStack.push({ anns: annSnap, corners: cornerSnap, features: featSnap });
  if (undoStack.length > MAX_UNDO) undoStack.shift();
}
window.doUndo = doUndo;
function doUndo() {
  if (undoStack.length === 0) return;
  const snap = undoStack.pop();
  // Restore annotations
  for (const s of snap.anns) { const a = anns.get(s.k); if (a) { a.faces = s.faces; rebuildOverlay(a); } }
  // Restore corners
  corners = snap.corners.map(c => ({...c}));
  cornersChanged = true;
  renderCornerVisuals();
  rebuildMeasurementsFromCorners();
  // Restore features
  if (snap.features) { features = snap.features; featuresChanged = true; renderAllFeatures(); renderFeatureList(); }
  renderList(); updateFaces(); updateMetrics();
}

// ============================================================
// PAINTING
// ============================================================
function onDown(e) {
  if (mode === 'orbit') return;
  if (mode === 'corners') { onCornerDown(e); return; }
  if (mode === 'features') { onFeatureDown(e); return; }
  if (!activeKey) return;
  e.preventDefault(); e.stopPropagation();
  pushUndo(); painting = true; strokeDirty = false;
  paintAt(e);
}
function onMove(e) {
  if (mode === 'orbit') return;
  if (mode === 'corners') { onCornerMove(e); return; }
  if (mode === 'features') { onFeatureMove(e); return; }
  if (painting) { e.preventDefault(); paintAt(e); } else { showHover(e); }
}
function onUp(e) {
  if (mode === 'corners') { onCornerUp(e); return; }
  if (mode === 'features') { onFeatureUp(e); return; }
  if (!painting) return;
  painting = false;
  if (rebuildTimer) { clearTimeout(rebuildTimer); rebuildTimer = null; }
  for (const k of dirtyOverlays) { const a = anns.get(k); if (a) rebuildOverlay(a); }
  dirtyOverlays.clear();
  if (strokeDirty) { renderList(); updateMetrics(); } else { undoStack.pop(); }
  if (hoverMesh) hoverMesh.visible = false;
}

function scheduleRebuild() {
  if (rebuildTimer) return;
  rebuildTimer = setTimeout(() => { rebuildTimer = null; for (const k of dirtyOverlays) { const a = anns.get(k); if (a) rebuildOverlay(a); } dirtyOverlays.clear(); updateFaces(); }, REBUILD_INTERVAL);
}

function paintAt(e) {
  const hit = castFace(e);
  if (!hit || !activeKey) return;
  const a = anns.get(activeKey);
  if (!a) return;
  const erase = (mode === 'erase'), rWorld = brushCm * 0.01;
  const faces = nearbyFaces(hit.mesh, hit.ci, hit.fi, rWorld);
  let changed = false;
  for (const {ci,fi} of faces) {
    const fk = `${ci}:${fi}`;
    if (erase) { if (a.faces.has(fk)) { a.faces.delete(fk); changed = true; } }
    else {
      for (const [k,o] of anns) { if (k !== activeKey && o.faces.has(fk)) { o.faces.delete(fk); dirtyOverlays.add(k); } }
      if (!a.faces.has(fk)) { a.faces.add(fk); changed = true; }
    }
  }
  if (changed) { strokeDirty = true; dirtyOverlays.add(activeKey); scheduleRebuild(); }
}

function showHover(e) {
  const hit = castFace(e);
  if (!hit) { if (hoverMesh) hoverMesh.visible = false; return; }
  const [v0,v1,v2] = triVerts(hit.mesh, hit.fi);
  if (!hoverMesh) {
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute(new Float32Array(9), 3));
    hoverMesh = new THREE.Mesh(g, new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5, side: THREE.DoubleSide, depthWrite: false, polygonOffset: true, polygonOffsetFactor: -2, polygonOffsetUnits: -2 }));
    hoverMesh.renderOrder = 3; scene.add(hoverMesh);
  }
  const p = hoverMesh.geometry.attributes.position.array;
  p[0]=v0.x;p[1]=v0.y;p[2]=v0.z;p[3]=v1.x;p[4]=v1.y;p[5]=v1.z;p[6]=v2.x;p[7]=v2.y;p[8]=v2.z;
  hoverMesh.geometry.attributes.position.needsUpdate = true;
  hoverMesh.visible = true;
}

// ============================================================
// OVERLAY RENDERING
// ============================================================
function rebuildOverlay(a) {
  if (a.overlay) { scene.remove(a.overlay); a.overlay.geometry.dispose(); a.overlay.material.dispose(); a.overlay = null; }
  if (a.faces.size === 0) return;
  const positions = [];
  for (const fk of a.faces) { const [ci,fi] = fk.split(':').map(Number); const m = meshChildren[ci]; if (!m) continue; const [v0,v1,v2] = triVerts(m,fi); positions.push(v0.x,v0.y,v0.z,v1.x,v1.y,v1.z,v2.x,v2.y,v2.z); }
  if (!positions.length) return;
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  g.computeVertexNormals();
  a.overlay = new THREE.Mesh(g, new THREE.MeshBasicMaterial({ color: new THREE.Color(a.color), transparent: true, opacity: 0.45, side: THREE.DoubleSide, depthWrite: false, polygonOffset: true, polygonOffsetFactor: -1, polygonOffsetUnits: -1 }));
  a.overlay.renderOrder = 1; a.overlay.visible = a.visible; scene.add(a.overlay);
}

// ============================================================
// ANNOTATION STATE
// ============================================================
function addAnn(labelKey) {
  if (anns.has(labelKey)) { setActive(labelKey); return; }
  const info = FLAT[labelKey]; if (!info) return;
  const color = COLORS[colorIdx++ % COLORS.length];
  anns.set(labelKey, { name: info.name, unit: info.unit, cat: info.cat, color, faces: new Set(), qty: info.unit === 'EA' ? 1 : 0, visible: true, overlay: null });
  setActive(labelKey); renderList(); updateMetrics();
}

function removeAnn(k) {
  const a = anns.get(k); if (!a) return;
  if (a.overlay) { scene.remove(a.overlay); a.overlay.geometry.dispose(); a.overlay.material.dispose(); }
  anns.delete(k); if (activeKey === k) { activeKey = null; updateStatus(); }
  renderList(); updateMetrics();
}

function setActive(k) { activeKey = k; updateStatus(); renderList(); if (mode === 'orbit') setMode('paint'); }

function clearAnnotationsState() {
  for (const a of anns.values()) { if (a.overlay) { scene.remove(a.overlay); a.overlay.geometry.dispose(); a.overlay.material.dispose(); } }
  anns.clear(); activeKey = null; colorIdx = 0; undoStack.length = 0;
  renderList(); updateStatus();
}

function computeArea(a) {
  let total = 0;
  for (const fk of a.faces) { const [ci,fi] = fk.split(':').map(Number); const m = meshChildren[ci]; if (!m) continue; const [v0,v1,v2] = triVerts(m,fi); total += triArea(v0,v1,v2); }
  return total * 10.7639;
}

// ============================================================
// MODE
// ============================================================
window.setMode = function(m) {
  mode = m;
  document.getElementById('btn-orbit')?.classList.toggle('active', m === 'orbit');
  document.getElementById('btn-paint')?.classList.toggle('active', m === 'paint');
  document.getElementById('btn-erase')?.classList.toggle('active', m === 'erase');
  document.getElementById('btn-corners')?.classList.toggle('active', m === 'corners');
  document.getElementById('btn-features')?.classList.toggle('active', m === 'features');
  controls.enabled = (m === 'orbit');
  renderer.domElement.style.cursor = m === 'orbit' ? 'grab' : (m === 'corners' || m === 'features') ? 'copy' : m === 'paint' ? 'crosshair' : 'not-allowed';
  if (hoverMesh) hoverMesh.visible = false;
  updateStatus();
};

window.setBrush = function(v) { brushCm = parseInt(v); document.getElementById('brush-lbl').textContent = brushCm === 0 ? '1px' : `${brushCm}cm`; };

// ============================================================
// PICKER UI
// ============================================================
function buildPicker() {
  const list = document.getElementById('plist'); if (!list) return;
  let h = '';
  TAXONOMY.forEach(c => {
    h += `<div class="pg"><div class="pg-label">${c.cat}</div>`;
    c.items.forEach(i => { h += `<div class="pi" data-k="${i.key}" onclick="pick('${i.key}')"><span>${i.name}</span><span class="u">${i.unit}</span></div>`; });
    h += '</div>';
  });
  list.innerHTML = h;
}
window.openPicker = () => document.getElementById('plist')?.classList.add('open');
window.filterPicker = function(q) {
  q = q.toLowerCase();
  document.querySelectorAll('.pi').forEach(el => { el.style.display = el.textContent.toLowerCase().includes(q) ? '' : 'none'; });
  document.querySelectorAll('.pg').forEach(g => { g.style.display = [...g.querySelectorAll('.pi')].some(el => el.style.display !== 'none') ? '' : 'none'; });
};
window.pick = function(k) { addAnn(k); document.getElementById('plist')?.classList.remove('open'); const s = document.getElementById('psearch'); if (s) { s.value = ''; filterPicker(''); } };
document.addEventListener('click', e => { if (!e.target.closest('.picker')) document.getElementById('plist')?.classList.remove('open'); });

// ============================================================
// ANNOTATION LIST UI
// ============================================================
function renderList() {
  const el = document.getElementById('ann-rows'); if (!el) return;
  if (anns.size === 0) { el.innerHTML = '<div class="ann-empty">Paint components onto the mesh</div>'; return; }
  let h = '';
  for (const [k, a] of anns) {
    const act = k === activeKey ? ' active' : '';
    h += `<div class="ann-row${act}" onclick="clickAnn('${k}')">
      <div class="swatch" style="background:${a.color}"></div>
      <div class="ann-info">
        <div class="ann-name">${esc(a.name)}</div>
        <div class="ann-meta">
          <input class="ann-qty" type="number" step="any" value="${a.qty}" onclick="event.stopPropagation()" onchange="chgQty('${k}',this.value)">
          <span class="ann-unit">${a.unit}</span>
          <span class="ann-faces">${a.faces.size}f</span>
        </div>
      </div>
      <div class="ann-btns">
        ${(a.unit==='SF'||a.unit==='LF') ? `<button class="abtn" onclick="event.stopPropagation();autoCalc('${k}')" title="Auto-compute area">&#x1F4D0;</button>` : ''}
        <button class="abtn${a.visible?'':' off'}" onclick="event.stopPropagation();togVis('${k}')">${a.visible?'\u25C9':'\u25CB'}</button>
        <button class="abtn" onclick="event.stopPropagation();removeAnn('${k}')">&times;</button>
      </div>
    </div>`;
  }
  el.innerHTML = h;
}

window.clickAnn = k => setActive(k);
window.chgQty = (k, v) => { const a = anns.get(k); if (a) { a.qty = parseFloat(v) || 0; updateMetrics(); } };
window.togVis = function(k) { const a = anns.get(k); if (!a) return; a.visible = !a.visible; if (a.overlay) a.overlay.visible = a.visible; renderList(); };
window.removeAnn = removeAnn;
window.autoCalc = function(k) { const a = anns.get(k); if (!a) return; a.qty = Math.round(computeArea(a)*10)/10; renderList(); updateMetrics(); };
window.doClear = function() { if (anns.size && !confirm('Clear all annotations?')) return; clearAnnotationsState(); updateMetrics(); };
window.toggleSidebar = function() { document.getElementById('sidebar').classList.toggle('collapsed'); setTimeout(onResize, 350); };
window.toggleDesc = function() { const d = document.getElementById('job-desc'); if (d) d.classList.toggle('truncated'); };

function updateFaces() { const a = activeKey ? anns.get(activeKey) : null; document.getElementById('sfaces').textContent = a ? `${a.faces.size} faces` : '0 faces'; }
function updateStatus() {
  const names = { orbit: 'Navigate', paint: 'Paint', erase: 'Erase' };
  document.getElementById('smode').textContent = names[mode] || '';
  document.getElementById('sdot').className = `dot ${mode === 'orbit' ? 'dot-orbit' : 'dot-paint'}`;
  const lbl = document.getElementById('slabel');
  if (activeKey) { const a = anns.get(activeKey); lbl.style.display = ''; lbl.textContent = a ? `Active: ${a.name}` : ''; } else { lbl.style.display = 'none'; }
  updateFaces();
}
function updateMetrics() { if (activeRoomIndex >= 0 && currentData?.rooms?.[activeRoomIndex]) renderMetrics(currentData.rooms[activeRoomIndex]); }
function esc(s) { const el = document.createElement('span'); el.textContent = s || ''; return el.innerHTML; }

// ============================================================
// SAVE/LOAD — API + localStorage fallback
// ============================================================
function serializeAnnotations() { const data = []; for (const [k,a] of anns) data.push({ k, color: a.color, faces: [...a.faces], qty: a.qty, visible: a.visible }); return data; }

function deserializeAnnotations(data) {
  clearAnnotationsState();
  for (const item of data) { const info = FLAT[item.k]; if (!info) continue; const a = { name:info.name, unit:info.unit, cat:info.cat, color:item.color||COLORS[colorIdx++%COLORS.length], faces:new Set(item.faces||[]), qty:item.qty||0, visible:item.visible!==false, overlay:null }; anns.set(item.k, a); rebuildOverlay(a); }
  renderList(); updateMetrics();
}

window.doExport = function() {
  if (anns.size === 0) { alert('No annotations to export.'); return; }
  const payload = { rfq_id: currentRfqId, scan_id: currentScanId, annotations: [] };
  for (const [k,a] of anns) payload.annotations.push({ label_key:k, display_name:a.name, unit:a.unit, category:a.cat, color:a.color, faces:[...a.faces], quantity:a.qty });
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob); const link = document.createElement('a');
  link.href = url; link.download = `annotations_${currentScanId || 'export'}.json`; link.click(); URL.revokeObjectURL(url);
};

window.doSave = async function() {
  const data = serializeAnnotations();
  const btn = document.getElementById('btn-save');
  const storeKey = `admin_ann_${currentRfqId}_${currentScanId}`;
  localStorage.setItem(storeKey, JSON.stringify(data));
  if (authToken && currentRfqId && currentScanId) {
    try {
      if (btn) btn.textContent = 'Saving...';
      const resp = await fetch(`${API_BASE}/api/admin/rfqs/${currentRfqId}/scans/${currentScanId}/annotations`, { method: 'PUT', headers: { 'Authorization': `Bearer ${authToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      // Save features to GCS
      if (featuresChanged && features.length > 0) {
        await fetch(`${API_BASE}/api/admin/rfqs/${currentRfqId}/scans/${currentScanId}/features`, {
          method: 'PUT', headers: { 'Authorization': `Bearer ${authToken}`, 'Content-Type': 'application/json' },
          body: JSON.stringify(features),
        });
        featuresChanged = false;
      }
      // Also save polygon if corners were edited
      if (cornersChanged && corners.length >= 3) {
        const polyResp = await fetch(`${API_BASE}/api/admin/rfqs/${currentRfqId}/scans/${currentScanId}/polygon`, {
          method: 'PUT',
          headers: { 'Authorization': `Bearer ${authToken}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            room_polygon_ft: corners.map(c => [c.x, c.z]),
            wall_heights_ft: corners.map(c => c.ceilingY),
            floor_heights_ft: corners.map(c => c.floorY),
          }),
        });
        if (polyResp.ok) cornersChanged = false;
      }
      if (btn) { btn.textContent = 'Saved!'; btn.classList.add('ok'); }
    } catch (e) { console.error('API save failed:', e); if (btn) { btn.textContent = 'Saved (local)'; btn.classList.add('ok'); } }
  } else { if (btn) { btn.textContent = 'Saved (local)'; btn.classList.add('ok'); } }
  setTimeout(() => { if (btn) { btn.textContent = 'Save'; btn.classList.remove('ok'); } }, 1500);
};

async function loadAnnotations() {
  if (authToken && currentRfqId && currentScanId) {
    try {
      const resp = await fetch(`${API_BASE}/api/admin/rfqs/${currentRfqId}/scans/${currentScanId}/annotations`, { headers: { 'Authorization': `Bearer ${authToken}` } });
      if (resp.ok) { const data = await resp.json(); if (data?.length > 0) { deserializeAnnotations(data); return; } }
    } catch (e) { console.warn('API load failed:', e); }
  }
  const storeKey = `admin_ann_${currentRfqId}_${currentScanId}`;
  const raw = localStorage.getItem(storeKey);
  if (raw) { try { deserializeAnnotations(JSON.parse(raw)); } catch (e) {} }

  // Load features
  if (authToken && currentRfqId && currentScanId) {
    try {
      const resp = await fetch(`${API_BASE}/api/admin/rfqs/${currentRfqId}/scans/${currentScanId}/features`, { headers: { 'Authorization': `Bearer ${authToken}` } });
      if (resp.ok) { const data = await resp.json(); if (data?.length > 0) { features = data; nextFeatureId = Math.max(...features.map(f => parseInt(f.id?.replace('feat_','') || 0))) + 1; renderAllFeatures(); renderFeatureList(); } }
    } catch (e) { console.warn('Features load failed:', e); }
  }
}

// ============================================================
// AUTH + INIT
// ============================================================
function getRfqId() {
  const parts = window.location.pathname.split('/');
  const idx = parts.indexOf('rfq');
  return (idx >= 0 && parts[idx + 1]) ? parts[idx + 1] : new URLSearchParams(window.location.search).get('rfq');
}

function showAuthModal() {
  let modal = document.getElementById('auth-modal');
  if (!modal) { modal = document.createElement('div'); modal.id = 'auth-modal'; modal.className = 'modal-overlay'; document.body.appendChild(modal); }
  modal.innerHTML = `
    <div class="modal-content">
      <h2>Admin Sign In</h2>
      <p class="auth-subtitle">Sign in to access the annotator</p>
      <input type="email" id="auth-email" placeholder="Email" autocomplete="email">
      <input type="password" id="auth-password" placeholder="Password" autocomplete="current-password">
      <div id="auth-error" class="auth-error"></div>
      <button class="btn-full btn-primary" id="auth-submit" onclick="handleAuth()">Sign In</button>
      <div style="color:#8e8e93;font-size:11px;margin:12px 0 8px;text-align:center;">or</div>
      <button class="btn-full" onclick="handleGoogleSignIn()" style="background:#4285f4;color:#fff;">Sign In with Google</button>
    </div>`;
  modal.style.display = 'flex';
}

window.handleAuth = async function() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const errorEl = document.getElementById('auth-error');
  const btn = document.getElementById('auth-submit');
  if (!email || !password) { errorEl.textContent = 'Email and password required.'; return; }
  btn.disabled = true; btn.textContent = 'Signing in...';
  try { await firebase.auth().signInWithEmailAndPassword(email, password); document.getElementById('auth-modal').style.display = 'none'; }
  catch (e) { errorEl.textContent = e.code === 'auth/wrong-password' ? 'Incorrect password.' : e.code === 'auth/user-not-found' ? 'No account with this email.' : 'Sign-in failed.'; btn.disabled = false; btn.textContent = 'Sign In'; }
};

window.handleGoogleSignIn = async function() {
  try { await firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider()); document.getElementById('auth-modal').style.display = 'none'; }
  catch (e) { const err = document.getElementById('auth-error'); if (err) err.textContent = e.code === 'auth/unauthorized-domain' ? 'Domain not authorized in Firebase.' : e.message; }
};

async function init() {
  currentRfqId = getRfqId();
  if (!currentRfqId) { document.getElementById('viewer-loading').textContent = 'No RFQ ID. Navigate to /admin/rfq/{rfq_id}'; return; }

  firebase.auth().onAuthStateChanged(async (user) => {
    if (!user) { showAuthModal(); return; }
    authToken = await user.getIdToken();
    document.getElementById('viewer-loading').textContent = 'Loading project...';

    try {
      const resp = await fetch(`${API_BASE}/api/rfqs/${currentRfqId}/contractor-view`);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      currentData = await resp.json();

      initThree();
      renderSidebar(currentData);

      if (currentData.rooms?.length > 0) {
        // Auto-select the first room that has an OBJ mesh
        const firstWithMesh = currentData.rooms.findIndex(r => r.texture_urls?.obj);
        selectRoom(firstWithMesh >= 0 ? firstWithMesh : 0);
      } else {
        document.getElementById('viewer-loading').textContent = 'No rooms in this RFQ.';
      }
    } catch (e) { document.getElementById('viewer-loading').textContent = `Failed to load: ${e.message}`; }
  });
}

init();

</script>
