function buildMeasurements(room) {
  // Fully clean up old measurement group
  if (measurementGroup) {
    measurementGroup.traverse(c => { if (c.isCSS2DObject && c.element) c.element.remove(); });
    scene.remove(measurementGroup);
    measurementGroup = null;
  }
  measurementGroup = new THREE.Group();
  measurementGroup.visible = measurementsVisible;

  if (!room.room_polygon_ft || room.room_polygon_ft.length < 3) { scene.add(measurementGroup); return; }

  const FT_TO_M = 1/3.28084;
  const rp = getRoomPolygonFeature();
  if (!rp) { scene.add(measurementGroup); return; }
  const rpVerts = rp.vertices;
  const cx = rpVerts.reduce((s,v) => s+v.x, 0) / rpVerts.length * FT_TO_M;
  const cz = rpVerts.reduce((s,v) => s+v.z, 0) / rpVerts.length * FT_TO_M;

  // LABELS ONLY — lines are rendered by renderAllFeatures for the room polygon
  // Wall length labels at ceiling midpoint per edge
  const wallSegments = computeWallSegments();

  for (let i = 0; i < rpVerts.length; i++) {
    const j = (i + 1) % rpVerts.length;
    const pi = rpVerts[i], pj = rpVerts[j];
    const x0 = pi.x*FT_TO_M, z0 = pi.z*FT_TO_M, x1 = pj.x*FT_TO_M, z1 = pj.z*FT_TO_M;
    // Label Y at edge height (floor level) with small offset above
    const h0 = pi.y*FT_TO_M + 0.04, h1 = pj.y*FT_TO_M + 0.04;
    const wallLen = Math.sqrt((pj.x-pi.x)**2 + (pj.z-pi.z)**2);

    const edgeSegs = wallSegments.find(ws => ws.edgeIdx === i);
    const hasSegments = edgeSegs && edgeSegs.segments.length > 1;

    if (hasSegments) {
      for (const seg of edgeSegs.segments) {
        if (seg.length > 1.0) {
          const sx0 = x0 + (x1-x0)*seg.tStart, sz0 = z0 + (z1-z0)*seg.tStart;
          const sx1 = x0 + (x1-x0)*seg.tEnd, sz1 = z0 + (z1-z0)*seg.tEnd;
          const smx = (sx0+sx1)/2, smz = (sz0+sz1)/2, smy = (h0+h1)/2;
          if (seg.type === 'wall') {
            addLabel(formatFtIn(seg.length), new THREE.Vector3(smx, smy, smz));
          } else {
            const typeInfo = FEATURE_TYPES.find(t => t.key === seg.type);
            addLabel(`${(typeInfo?.name||seg.type)} ${formatFtIn(seg.length)}`, new THREE.Vector3(smx, smy, smz), 'opening');
          }
        }
      }
    } else if (wallLen > 1.0) {
      const mx = (x0+x1)/2, mz = (z0+z1)/2, my = (h0+h1)/2;
      addLabel(formatFtIn(wallLen), new THREE.Vector3(mx, my, mz));
    }
  }

  // Height labels: pair floor vertices with nearest ceiling vertex
  const rc = getRoomCeilingFeature();
  const avgFloorY = rpVerts.reduce((s,v) => s+v.y, 0) / rpVerts.length * FT_TO_M;
  if (rc) {
    for (const fv of rpVerts) {
      let best = rc.vertices[0], bestDist = Infinity;
      for (const cv of rc.vertices) {
        const d = (cv.x - fv.x)**2 + (cv.z - fv.z)**2;
        if (d < bestDist) { bestDist = d; best = cv; }
      }
      if (bestDist < 4) {
        const h = best.y - fv.y;
        if (h > 0.5) {
          const midY = (fv.y + best.y) / 2 * FT_TO_M;
          addLabel(formatFtIn(h), new THREE.Vector3(fv.x * FT_TO_M, midY, fv.z * FT_TO_M), 'height');
        }
      }
    }
  }

  // Floor area label
  if (room.floor_area_sqft) {
    addLabel(`${Math.round(room.floor_area_sqft)} SF`, new THREE.Vector3(cx, avgFloorY + 0.05, cz), 'area');
  }

  scene.add(measurementGroup);
}

function addLabel(text, position, cls) {
  const div = document.createElement('div');
  div.className = 'measure-label' + (cls ? ' ' + cls : '');
  div.textContent = text;
  const label = new CSS2DObject(div);
  label.position.copy(position);
  measurementGroup.add(label);
}

function formatFtIn(totalFt) {
  const ft = Math.floor(totalFt);
  const inches = Math.round((totalFt - ft) * 12);
  return inches === 0 ? `${ft}'` : `${ft}' ${inches}"`;
}

// ============================================================
// ROOM POLYGON — created from DB corners, lives in features[]
// ============================================================
function getRoomFloorFeature() { return features.find(f => f.type === 'room_floor'); }
function getRoomCeilingFeature() { return features.find(f => f.type === 'room_ceiling'); }
// Backward compat helper — wall segments and snap use the floor feature
function getRoomPolygonFeature() { return getRoomFloorFeature(); }

function initRoomPolygonFeature(room) {
  features = features.filter(f => f.type !== 'room_floor' && f.type !== 'room_ceiling' && f.type !== 'room_polygon');
  const poly = room.room_polygon_ft;
  const ceilH = room.wall_heights_ft || [];
  const floorH = room.floor_heights_ft || [];
  if (!poly || poly.length < 3) return;

  const avgCeil = ceilH.length ? ceilH.reduce((s,v)=>s+v,0)/ceilH.length : (room.ceiling_height_ft || 8);
  const defaultFloor = avgCeil - (room.ceiling_height_ft || 8);

  const floorVerts = [], floorEdges = [];
  const ceilVerts = [], ceilEdges = [];
  for (let i = 0; i < poly.length; i++) {
    floorVerts.push({ x: poly[i][0], z: poly[i][1], y: floorH[i] !== undefined ? floorH[i] : defaultFloor, snap: null });
    floorEdges.push([i, (i + 1) % poly.length]);
    ceilVerts.push({ x: poly[i][0], z: poly[i][1], y: ceilH[i] || avgCeil, snap: null });
    ceilEdges.push([i, (i + 1) % poly.length]);
  }
  features.unshift(
    { id: 'room_ceiling', type: 'room_ceiling', vertices: ceilVerts, edges: ceilEdges, faces: [] },
    { id: 'room_floor', type: 'room_floor', vertices: floorVerts, edges: floorEdges, faces: [] },
  );
  cornersChanged = false;
  renderAllFeatures();
  renderFeatureList();
}

function syncRoomPolygonToRoom() {
  const room = currentData?.rooms?.[activeRoomIndex];
  const rf = getRoomFloorFeature();
  const rc = getRoomCeilingFeature();
  if (!room || !rf || rf.vertices.length < 3) return;
  // Use floor polygon for room shape (XZ positions)
  room.room_polygon_ft = rf.vertices.map(v => [v.x, v.z]);
  room.floor_heights_ft = rf.vertices.map(v => v.y);
  // Ceiling heights: for each floor vertex, find nearest ceiling vertex Y
  // (since they may have different vertex counts after independent edits)
  room.wall_heights_ft = rf.vertices.map(fv => {
    if (!rc || rc.vertices.length === 0) return (room.ceiling_height_ft || 8);
    let best = rc.vertices[0], bestDist = Infinity;
    for (const cv of rc.vertices) {
      const d = (cv.x - fv.x) ** 2 + (cv.z - fv.z) ** 2;
      if (d < bestDist) { bestDist = d; best = cv; }
    }
    return best.y;
  });

  const FT2M = 1/3.28084, SQM2SF = 10.7639;
  const cm = rf.vertices.map(v => [v.x*FT2M, v.z*FT2M]);
  const n = cm.length;
  let sa = 0;
  for (let i=0;i<n;i++){const j=(i+1)%n; sa += cm[i][0]*cm[j][1] - cm[j][0]*cm[i][1];}
  room.floor_area_sqft = Math.round(Math.abs(sa)/2*SQM2SF*10)/10;
  let pm = 0;
  for (let i=0;i<n;i++){const j=(i+1)%n; pm += Math.sqrt((cm[j][0]-cm[i][0])**2+(cm[j][1]-cm[i][1])**2);}
  room.perimeter_linear_ft = Math.round(pm*3.28084*10)/10;
  const avgFloor = rf.vertices.reduce((s,v) => s+v.y, 0) / rf.vertices.length;
  const avgCeil = rc ? rc.vertices.reduce((s,v) => s+v.y, 0) / rc.vertices.length : avgFloor + 8;
  room.ceiling_height_ft = Math.round((avgCeil - avgFloor)*100)/100;
  room.wall_area_sqft = Math.round(room.perimeter_linear_ft*room.ceiling_height_ft*10)/10;
}

// Delete vertex handler (works for any feature type in annotate mode)
window.addEventListener('keydown', (e) => {
  if (mode !== 'annotate' || featureLastPointIdx < 0 || activeFeatureIdx < 0) return;
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    e.preventDefault();
    const feat = features[activeFeatureIdx];
    if (!feat) return;
    // Room polygon: minimum 3 vertices
    if ((feat.type === 'room_floor' || feat.type === 'room_ceiling') && feat.vertices.length <= 3) return;
    pushUndo();
    const delIdx = featureLastPointIdx;
    // Remove vertex and merge edges that referenced it
    const edgesToRemove = [];
    let mergeA = -1, mergeB = -1;
    for (let ei = 0; ei < feat.edges.length; ei++) {
      const [a, b] = feat.edges[ei];
      if (a === delIdx) { mergeB = b; edgesToRemove.push(ei); }
      else if (b === delIdx) { mergeA = a; edgesToRemove.push(ei); }
    }
    // Create merged edge if both sides existed
    if (mergeA >= 0 && mergeB >= 0 && mergeA !== mergeB) {
      feat.edges.push([mergeA, mergeB]);
    }
    // Remove old edges (reverse order to preserve indices)
    edgesToRemove.sort((a,b) => b - a).forEach(ei => feat.edges.splice(ei, 1));
    // Remove vertex
    feat.vertices.splice(delIdx, 1);
    // Update all edge indices > delIdx
    for (const edge of feat.edges) {
      if (edge[0] > delIdx) edge[0]--;
      if (edge[1] > delIdx) edge[1]--;
    }
    // Update face indices
    feat.faces = feat.faces.filter(f => !f.includes(delIdx)).map(f => f.map(vi => vi > delIdx ? vi - 1 : vi));
    featureLastPointIdx = Math.min(delIdx, feat.vertices.length - 1);
    featuresChanged = true;
    if (feat.type === 'room_floor' || feat.type === 'room_ceiling') cornersChanged = true;
    renderAllFeatures();
    renderFeatureList();
    rebuildMeasurementsAfterFeatureChange();
  }
});

// ============================================================
// WALL SNAP — auto-snap feature vertices to nearby wall edges
// ============================================================
function snapToWallEdge(ptFt) {
  // ptFt = {x, y, z} in feet. Returns {x, y, z, snap} with snap info if within threshold.
  const rp = getRoomPolygonFeature();
  if (!rp || rp.vertices.length < 2) return { ...ptFt, snap: null };
  const rpVerts = rp.vertices;
  let bestDist = Infinity, bestEdge = -1, bestT = 0, bestProjX = 0, bestProjZ = 0;
  for (let i = 0; i < rpVerts.length; i++) {
    const j = (i + 1) % rpVerts.length;
    const ax = rpVerts[i].x, az = rpVerts[i].z, bx = rpVerts[j].x, bz = rpVerts[j].z;
    const dx = bx - ax, dz = bz - az;
    const len2 = dx * dx + dz * dz;
    if (len2 < 0.001) continue;
    let t = ((ptFt.x - ax) * dx + (ptFt.z - az) * dz) / len2;
    t = Math.max(0, Math.min(1, t));
    const projX = ax + t * dx, projZ = az + t * dz;
    const dist = Math.sqrt((ptFt.x - projX) ** 2 + (ptFt.z - projZ) ** 2);
    if (dist < bestDist) { bestDist = dist; bestEdge = i; bestT = t; bestProjX = projX; bestProjZ = projZ; }
  }
  if (bestDist < 0.5) { // ~6 inches in feet
    const j = (bestEdge + 1) % rpVerts.length;
    return {
      x: Math.round(bestProjX * 100) / 100,
      y: ptFt.y,
      z: Math.round(bestProjZ * 100) / 100,
      snap: { wallEdge: [bestEdge, j], t: Math.round(bestT * 1000) / 1000 },
    };
  }
  return { ...ptFt, snap: null };
}

// Migrate old features format (points → vertices)
function migrateFeature(feat) {
  if (feat.points && !feat.vertices) {
    feat.vertices = feat.points.map(p => ({ x: p.x, y: p.y, z: p.z, snap: null }));
    delete feat.points;
  }
  if (!feat.faces) feat.faces = [];
  if (!feat.vertices) feat.vertices = [];
  return feat;
}

// After room polygon edits, recompute snaps on other features
function recomputeFeatureSnaps() {
  for (const feat of features) {
    if (feat.type === 'room_floor' || feat.type === 'room_ceiling') continue;
    for (const v of feat.vertices) {
      if (!v.snap) continue;
      const snapped = snapToWallEdge(v);
      v.snap = snapped.snap;
    }
  }
}

// ============================================================
// WALL SEGMENTS — derived from room polygon + snapped feature vertices
// ============================================================
function computeWallSegments() {
  const rp = getRoomPolygonFeature();
  if (!rp || rp.vertices.length < 2) return [];
  const rpVerts = rp.vertices;
  const segments = [];
  for (let i = 0; i < rpVerts.length; i++) {
    const j = (i + 1) % rpVerts.length;
    const edgeLen = Math.sqrt((rpVerts[j].x - rpVerts[i].x) ** 2 + (rpVerts[j].z - rpVerts[i].z) ** 2);

    // Collect all snapped vertex pairs on this edge
    const interruptions = [];
    for (const feat of features) {
      const snapped = feat.vertices
        .filter(v => v.snap && v.snap.wallEdge[0] === i && v.snap.wallEdge[1] === j)
        .sort((a, b) => a.snap.t - b.snap.t);
      if (snapped.length >= 2) {
        interruptions.push({
          tStart: snapped[0].snap.t,
          tEnd: snapped[snapped.length - 1].snap.t,
          featureId: feat.id,
          type: feat.type,
        });
      }
    }
    interruptions.sort((a, b) => a.tStart - b.tStart);

    // Build: wall-gap-wall-gap-wall
    const segs = [];
    let cursor = 0;
    for (const intr of interruptions) {
      if (intr.tStart > cursor + 0.001)
        segs.push({ type: 'wall', tStart: cursor, tEnd: intr.tStart, length: (intr.tStart - cursor) * edgeLen });
      segs.push({ type: intr.type, tStart: intr.tStart, tEnd: intr.tEnd, length: (intr.tEnd - intr.tStart) * edgeLen, featureId: intr.featureId });
      cursor = intr.tEnd;
    }
    if (cursor < 1 - 0.001)
      segs.push({ type: 'wall', tStart: cursor, tEnd: 1, length: (1 - cursor) * edgeLen });

    segments.push({ edgeIdx: i, totalLength: edgeLen, segments: segs });
  }
  return segments;
}

const OPENING_TYPES = ['door_frame', 'cased_opening'];

function computeTrimLF() {
  const wallSegs = computeWallSegments();
  let gross = 0, deductions = 0;
  for (const edge of wallSegs) {
    gross += edge.totalLength;
    for (const seg of edge.segments)
      if (OPENING_TYPES.includes(seg.type)) deductions += seg.length;
  }
  return { gross: Math.round(gross * 10) / 10, deductions: Math.round(deductions * 10) / 10, net: Math.round((gross - deductions) * 10) / 10 };
}

// ============================================================
// FEATURES — doors, cabinets, openings, windows
// ============================================================
function renderAllFeatures() {
  faceMeshes = []; // reset face mesh tracking for raycasting
  // Clear all feature visuals — must remove DOM elements for CSS2DObject labels
  for (const [id, vis] of featureMeshes) {
    vis.spheres.forEach(s => scene.remove(s));
    vis.lines.forEach(l => scene.remove(l));
    vis.labels.forEach(l => { if (l.element) l.element.remove(); if (l.parent) l.parent.remove(l); scene.remove(l); });
  }
  featureMeshes.clear();

  const FT = 1 / 3.28084;
  const sphereGeom = new THREE.SphereGeometry(FEATURE_SPHERE_RADIUS, 10, 10);

  for (let fi = 0; fi < features.length; fi++) {
    const feat = features[fi];
    const isActive = (fi === activeFeatureIdx);
    const vis = { spheres: [], lines: [], labels: [] };
    const verts = feat.vertices;

    // ---- Room floor / ceiling: rendered as normal features with room-specific colors + vertical lines ----
    if (feat.type === 'room_floor' || feat.type === 'room_ceiling') {
      const isFloor = feat.type === 'room_floor';
      const rpColor = isFloor ? CORNER_FLOOR_COLOR : CORNER_COLOR;
      const rpSphereGeom = new THREE.SphereGeometry(CORNER_RADIUS, 12, 12);
      const isSel = (pi) => (fi === activeFeatureIdx && pi === featureLastPointIdx);

      for (let pi = 0; pi < verts.length; pi++) {
        const p = verts[pi];
        const mat = new THREE.MeshBasicMaterial({ color: isSel(pi) ? CORNER_SELECTED : rpColor, depthTest: false });
        const s = new THREE.Mesh(rpSphereGeom, mat);
        s.position.set(p.x*FT, p.y*FT, p.z*FT);
        s.renderOrder = 11;
        s.userData = { featureIdx: fi, pointIdx: pi };
        scene.add(s); vis.spheres.push(s);
      }

      for (let ei = 0; ei < feat.edges.length; ei++) {
        const [a, b] = feat.edges[ei];
        if (a >= verts.length || b >= verts.length) continue;
        const pa = verts[a], pb = verts[b];
        const line = new THREE.Line(
          new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(pa.x*FT, pa.y*FT, pa.z*FT),
            new THREE.Vector3(pb.x*FT, pb.y*FT, pb.z*FT),
          ]),
          new THREE.LineBasicMaterial({ color: rpColor, depthTest: false })
        );
        line.renderOrder = 9; line.userData = { featureIdx: fi, edgeIdx: ei };
        scene.add(line); vis.lines.push(line);
      }

      // Vertical lines: only drawn by the floor feature, connecting to nearest ceiling vertex
      if (isFloor) {
        const rc = getRoomCeilingFeature();
        if (rc) {
          for (const fv of verts) {
            // Find nearest ceiling vertex
            let best = rc.vertices[0], bestDist = Infinity;
            for (const cv of rc.vertices) {
              const d = (cv.x - fv.x)**2 + (cv.z - fv.z)**2;
              if (d < bestDist) { bestDist = d; best = cv; }
            }
            if (bestDist < 4) { // within 2ft — reasonable pairing
              const vLine = new THREE.Line(
                new THREE.BufferGeometry().setFromPoints([
                  new THREE.Vector3(fv.x*FT, fv.y*FT, fv.z*FT),
                  new THREE.Vector3(best.x*FT, best.y*FT, best.z*FT),
                ]),
                new THREE.LineBasicMaterial({ color: 0x8e8ea0, depthTest: false })
              );
              vLine.renderOrder = 9; scene.add(vLine); vis.lines.push(vLine);
            }
          }
        }
      }

      // Faces (for extruded room polygon edges) — trackable for S-key surface selection
      for (let fci = 0; fci < feat.faces.length; fci++) {
        const face = feat.faces[fci];
        if (face.length < 3) continue;
        const faceVerts = face.map(vi => verts[vi]).filter(Boolean);
        if (faceVerts.length < 3) continue;
        const geom = new THREE.BufferGeometry();
        const positions = [];
        for (let fi2 = 1; fi2 < faceVerts.length - 1; fi2++) {
          positions.push(faceVerts[0].x*FT, faceVerts[0].y*FT, faceVerts[0].z*FT);
          positions.push(faceVerts[fi2].x*FT, faceVerts[fi2].y*FT, faceVerts[fi2].z*FT);
          positions.push(faceVerts[fi2+1].x*FT, faceVerts[fi2+1].y*FT, faceVerts[fi2+1].z*FT);
        }
        geom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        geom.computeVertexNormals();
        const isSelected = selectedFaces.has(`${fi}-${fci}`);
        const faceColor = isSelected ? 0xffff00 : rpColor;
        const faceOpacity = isSelected ? 0.3 : 0.15;
        const fm = new THREE.Mesh(geom, new THREE.MeshBasicMaterial({
          color: faceColor, transparent: true, opacity: faceOpacity, side: THREE.DoubleSide, depthTest: false,
        }));
        fm.renderOrder = 9; fm.userData = { featureIdx: fi, faceIdx: fci };
        scene.add(fm); vis.lines.push(fm);
        faceMeshes.push({ mesh: fm, featureIdx: fi, faceIdx: fci });
      }

      featureMeshes.set(feat.id, vis);
      continue;
    }

    // ---- Normal features ----
    const typeInfo = FEATURE_TYPES.find(t => t.key === feat.type) || FEATURE_TYPES[0];
    const color = isActive ? 0xe94560 : typeInfo.color;

    // Vertices (points)
    for (let pi = 0; pi < verts.length; pi++) {
      const p = verts[pi];
      const isSnapped = !!p.snap;
      const isSel = (fi === activeFeatureIdx && pi === featureLastPointIdx);
      const mat = new THREE.MeshBasicMaterial({ color: isSel ? CORNER_SELECTED : color, depthTest: false });
      const sphere = new THREE.Mesh(sphereGeom, mat);
      sphere.position.set(p.x * FT, p.y * FT, p.z * FT);
      sphere.renderOrder = 11;
      sphere.userData = { featureIdx: fi, pointIdx: pi };
      scene.add(sphere);
      vis.spheres.push(sphere);

      // Snap halo indicator
      if (isSnapped) {
        const haloGeom = new THREE.SphereGeometry(FEATURE_SPHERE_RADIUS * 2, 10, 10);
        const haloMat = new THREE.MeshBasicMaterial({ color: CORNER_COLOR, transparent: true, opacity: 0.3, depthTest: false });
        const halo = new THREE.Mesh(haloGeom, haloMat);
        halo.position.set(p.x * FT, p.y * FT, p.z * FT);
        halo.renderOrder = 10;
        scene.add(halo);
        vis.spheres.push(halo);
      }
    }

    // Edges
    for (let ei = 0; ei < feat.edges.length; ei++) {
      const [a, b] = feat.edges[ei];
      if (a >= verts.length || b >= verts.length) continue;
      const pa = verts[a], pb = verts[b];
      const pts = [
        new THREE.Vector3(pa.x*FT, pa.y*FT, pa.z*FT),
        new THREE.Vector3(pb.x*FT, pb.y*FT, pb.z*FT),
      ];
      const line = new THREE.Line(
        new THREE.BufferGeometry().setFromPoints(pts),
        new THREE.LineBasicMaterial({ color, depthTest: false, linewidth: 2 })
      );
      line.renderOrder = 10;
      line.userData = { featureIdx: fi, edgeIdx: ei };
      scene.add(line);
      vis.lines.push(line);
    }

    // Faces (semi-transparent quads) — trackable for S-key surface selection
    for (let fci = 0; fci < feat.faces.length; fci++) {
      const face = feat.faces[fci];
      if (face.length < 3) continue;
      const faceVerts = face.map(vi => verts[vi]).filter(Boolean);
      if (faceVerts.length < 3) continue;
      const geom = new THREE.BufferGeometry();
      const positions = [];
      for (let fi2 = 1; fi2 < faceVerts.length - 1; fi2++) {
        positions.push(faceVerts[0].x*FT, faceVerts[0].y*FT, faceVerts[0].z*FT);
        positions.push(faceVerts[fi2].x*FT, faceVerts[fi2].y*FT, faceVerts[fi2].z*FT);
        positions.push(faceVerts[fi2+1].x*FT, faceVerts[fi2+1].y*FT, faceVerts[fi2+1].z*FT);
      }
      geom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      geom.computeVertexNormals();
      const isSelected = selectedFaces.has(`${fi}-${fci}`);
      const faceColor = isSelected ? 0xffff00 : color;
      const faceOpacity = isSelected ? 0.3 : 0.15;
      const faceMesh = new THREE.Mesh(geom, new THREE.MeshBasicMaterial({
        color: faceColor, transparent: true, opacity: faceOpacity, side: THREE.DoubleSide, depthTest: false,
      }));
      faceMesh.renderOrder = 9;
      faceMesh.userData = { featureIdx: fi, faceIdx: fci };
      scene.add(faceMesh);
      vis.lines.push(faceMesh);
      faceMeshes.push({ mesh: faceMesh, featureIdx: fi, faceIdx: fci });
    }

    // Label with type name + measurements
    if (verts.length > 0) {
      const cx = verts.reduce((s,p) => s+p.x, 0) / verts.length * FT;
      const cy = verts.reduce((s,p) => s+p.y, 0) / verts.length * FT;
      const cz = verts.reduce((s,p) => s+p.z, 0) / verts.length * FT;

      let labelText = typeInfo.name;
      if (verts.length >= 2) {
        // Compute width and height
        const xs = verts.map(p => p.x), zs = verts.map(p => p.z), ys = verts.map(p => p.y);
        const w = Math.sqrt((Math.max(...xs)-Math.min(...xs))**2 + (Math.max(...zs)-Math.min(...zs))**2);
        const h = Math.max(...ys) - Math.min(...ys);
        if (w > 0.1 || h > 0.1) labelText += ` ${formatFtIn(w)}×${formatFtIn(h)}`;
      }

      const div = document.createElement('div');
      div.className = 'measure-label';
      div.style.background = `rgba(${(color>>16)&0xff}, ${(color>>8)&0xff}, ${color&0xff}, 0.85)`;
      div.textContent = labelText;
      const label = new CSS2DObject(div);
      label.position.set(cx, cy + 0.06, cz);
      scene.add(label);
      vis.labels.push(label);
    }

    featureMeshes.set(feat.id, vis);
  }
}

// Screen-space edge proximity detection (Three.js line raycast is unreliable)
function findClosestFeatureEdge(e) {
  const rect = renderer.domElement.getBoundingClientRect();
  const mouseX = e.clientX - rect.left;
  const mouseY = e.clientY - rect.top;
  const FT = 1 / 3.28084;

  let bestDist = Infinity, bestFeatIdx = -1, bestEdgeIdx = -1;
  for (let fi = 0; fi < features.length; fi++) {
    const feat = features[fi];
    for (let ei = 0; ei < feat.edges.length; ei++) {
      const [a, b] = feat.edges[ei];
      if (a >= feat.vertices.length || b >= feat.vertices.length) continue;
      const pa = feat.vertices[a], pb = feat.vertices[b];
      const va = new THREE.Vector3(pa.x * FT, pa.y * FT, pa.z * FT).project(camera);
      const vb = new THREE.Vector3(pb.x * FT, pb.y * FT, pb.z * FT).project(camera);
      // Skip edges behind camera
      if (va.z > 1 || vb.z > 1) continue;
      const sx0 = (va.x + 1) / 2 * rect.width, sy0 = (-va.y + 1) / 2 * rect.height;
      const sx1 = (vb.x + 1) / 2 * rect.width, sy1 = (-vb.y + 1) / 2 * rect.height;
      const dist = distPtSeg2D(mouseX, mouseY, sx0, sy0, sx1, sy1);
      if (dist < bestDist) { bestDist = dist; bestFeatIdx = fi; bestEdgeIdx = ei; }
    }
  }
  return bestDist < 12 ? { featureIdx: bestFeatIdx, edgeIdx: bestEdgeIdx } : null; // 12px threshold
}

function distPtSeg2D(px, py, x0, y0, x1, y1) {
  const dx = x1 - x0, dy = y1 - y0, len2 = dx * dx + dy * dy;
  if (len2 < 0.001) return Math.sqrt((px - x0) ** 2 + (py - y0) ** 2);
  let t = ((px - x0) * dx + (py - y0) * dy) / len2;
  t = Math.max(0, Math.min(1, t));
  return Math.sqrt((px - x0 - t * dx) ** 2 + (py - y0 - t * dy) ** 2);
}

// Detect a face when edge [a,b] closes a cycle. Returns vertex index array or null.
function findFaceFromEdge(feat, a, b) {
  // Build adjacency from edges (excluding the edge [a,b] itself)
  const adj = new Map();
  for (const [u, v] of feat.edges) {
    if ((u === a && v === b) || (u === b && v === a)) continue;
    if (!adj.has(u)) adj.set(u, []);
    if (!adj.has(v)) adj.set(v, []);
    adj.get(u).push(v);
    adj.get(v).push(u);
  }
  // BFS from b to a (shortest path = smallest face)
  const visited = new Map(); // vertex → parent
  const queue = [b];
  visited.set(b, -1);
  while (queue.length > 0) {
    const cur = queue.shift();
    if (cur === a) {
      // Reconstruct path: a ← ... ← b, then add a→b
      const path = [a];
      let node = a;
      while (node !== b) { node = visited.get(node); path.push(node); }
      // path is [a, ..., b]. The face is this cycle.
      if (path.length >= 3 && path.length <= 12) return path;
      return null;
    }
    for (const next of (adj.get(cur) || [])) {
      if (!visited.has(next)) {
        visited.set(next, cur);
        queue.push(next);
      }
    }
  }
  return null;
}

// Check if a face (vertex index array) already exists in feat.faces
function faceExists(feat, faceVerts) {
  const key = [...faceVerts].sort().join(',');
  return feat.faces.some(f => [...f].sort().join(',') === key);
}

// Snap a point to the nearest edge across all features (within threshold in feet).
// Returns {x, y, z, snappedFeatureIdx, snappedEdgeIdx} or null if nothing nearby.
function snapPointToNearestEdge(ptFt, thresholdFt, excludeFeatureIdx, excludeVertIndices) {
  let bestDist = Infinity, bestPt = null, bestFi = -1, bestEi = -1;
  for (let fi = 0; fi < features.length; fi++) {
    const feat = features[fi];
    for (let ei = 0; ei < feat.edges.length; ei++) {
      const [a, b] = feat.edges[ei];
      if (a >= feat.vertices.length || b >= feat.vertices.length) continue;
      // Skip edges that connect to the vertices we're moving
      if (fi === excludeFeatureIdx && excludeVertIndices && (excludeVertIndices.includes(a) || excludeVertIndices.includes(b))) continue;
      const pa = feat.vertices[a], pb = feat.vertices[b];
      const dx = pb.x - pa.x, dy = pb.y - pa.y, dz = pb.z - pa.z;
      const len2 = dx*dx + dy*dy + dz*dz;
      if (len2 < 0.001) continue;
      let t = ((ptFt.x-pa.x)*dx + (ptFt.y-pa.y)*dy + (ptFt.z-pa.z)*dz) / len2;
      t = Math.max(0, Math.min(1, t));
      const proj = { x: pa.x+t*dx, y: pa.y+t*dy, z: pa.z+t*dz };
      const dist = Math.sqrt((ptFt.x-proj.x)**2 + (ptFt.y-proj.y)**2 + (ptFt.z-proj.z)**2);
      if (dist < bestDist) { bestDist = dist; bestPt = proj; bestFi = fi; bestEi = ei; }
    }
  }
  if (bestDist > thresholdFt || !bestPt) return null;
  return { x: Math.round(bestPt.x*100)/100, y: Math.round(bestPt.y*100)/100, z: Math.round(bestPt.z*100)/100, snappedFeatureIdx: bestFi, snappedEdgeIdx: bestEi };
}

// Merge vertex at srcIdx into the nearest existing vertex within threshold (in feet).
// Replaces all edge/face references to srcIdx with the target, then removes srcIdx.
function mergeNearbyVertex(feat, srcIdx, thresholdFt) {
  if (srcIdx < 0 || srcIdx >= feat.vertices.length) return false;
  const sv = feat.vertices[srcIdx];
  let bestIdx = -1, bestDist = Infinity;
  for (let i = 0; i < feat.vertices.length; i++) {
    if (i === srcIdx) continue;
    const v = feat.vertices[i];
    const d = Math.sqrt((v.x - sv.x)**2 + (v.y - sv.y)**2 + (v.z - sv.z)**2);
    if (d < bestDist) { bestDist = d; bestIdx = i; }
  }
  if (bestIdx < 0 || bestDist > thresholdFt) return false;

  // Replace all references to srcIdx with bestIdx
  for (const edge of feat.edges) {
    if (edge[0] === srcIdx) edge[0] = bestIdx;
    if (edge[1] === srcIdx) edge[1] = bestIdx;
  }
  for (const face of feat.faces) {
    for (let i = 0; i < face.length; i++) {
      if (face[i] === srcIdx) face[i] = bestIdx;
    }
  }
  // Remove duplicate edges (same vertex on both ends, or duplicate pairs)
  feat.edges = feat.edges.filter(([a,b]) => a !== b);
  const edgeSet = new Set();
  feat.edges = feat.edges.filter(([a,b]) => {
    const key = a < b ? `${a}-${b}` : `${b}-${a}`;
    if (edgeSet.has(key)) return false;
    edgeSet.add(key);
    return true;
  });

  // Remove the merged vertex and shift all indices
  feat.vertices.splice(srcIdx, 1);
  for (const edge of feat.edges) {
    if (edge[0] > srcIdx) edge[0]--;
    if (edge[1] > srcIdx) edge[1]--;
  }
  for (const face of feat.faces) {
    for (let i = 0; i < face.length; i++) {
      if (face[i] > srcIdx) face[i]--;
    }
  }
  return true; // merged
}

function onFeatureDown(e) {
  e.preventDefault(); e.stopPropagation();
  controls.enabled = false;
  pushUndo();

  const rect = renderer.domElement.getBoundingClientRect();
  ndc.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  ndc.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  ray.setFromCamera(ndc, camera);

  // 0. S-key: surface mode (select or extrude)
  if (keys['s'] && faceMeshes.length > 0) {
    const faceObjs = faceMeshes.map(fm => fm.mesh);
    const faceHits = ray.intersectObjects(faceObjs, false);
    if (faceHits.length > 0) {
      const { featureIdx, faceIdx } = faceHits[0].object.userData;

      if (keys['e']) {
        // S+E+click = start surface extrude
        const feat = features[featureIdx];
        const face = feat.faces[faceIdx];
        const FT = 1/3.28084;

        // Compute face normal
        const fvs = face.map(vi => feat.vertices[vi]);
        const v0 = new THREE.Vector3(fvs[0].x, fvs[0].y, fvs[0].z);
        const v1 = new THREE.Vector3(fvs[1].x, fvs[1].y, fvs[1].z);
        const v2 = new THREE.Vector3(fvs[2].x, fvs[2].y, fvs[2].z);
        const normal = new THREE.Vector3().crossVectors(
          v1.clone().sub(v0), v2.clone().sub(v0)
        ).normalize();

        // Duplicate face vertices
        const newVertIndices = [];
        const origPositions = [];
        for (const vi of face) {
          const ov = feat.vertices[vi];
          const nv = { x: ov.x, y: ov.y, z: ov.z, snap: null };
          const ni = feat.vertices.length;
          feat.vertices.push(nv);
          newVertIndices.push(ni);
          origPositions.push({ x: ov.x, y: ov.y, z: ov.z });
        }

        // Create side faces + side edges connecting old and new vertices
        for (let i = 0; i < face.length; i++) {
          const j = (i + 1) % face.length;
          feat.faces.push([face[i], face[j], newVertIndices[j], newVertIndices[i]]);
          feat.edges.push([face[i], newVertIndices[i]]);
        }
        // Create top face (new vertices) + top edges
        feat.faces.push([...newVertIndices]);
        for (let i = 0; i < newVertIndices.length; i++) {
          feat.edges.push([newVertIndices[i], newVertIndices[(i+1) % newVertIndices.length]]);
        }

        extrudingSurface = true;
        extrudeSurfaceFeat = feat;
        extrudeSurfaceNewVerts = newVertIndices;
        extrudeSurfaceOrigPos = origPositions;
        extrudeSurfaceNormal = normal;
        featuresChanged = true;
        renderAllFeatures();
        return;
      }

      // S+click (no E) = select + start face drag
      const key = `${featureIdx}-${faceIdx}`;
      selectedFaces.set(key, true);
      // Start face drag
      const dragFeat = features[featureIdx];
      const dragFace = dragFeat.faces[faceIdx];
      const meshHitF = castFace(e);
      draggingVertex = {
        featureIdx, vertexIdx: -1, // -1 = face drag mode
        faceVertIndices: [...dragFace],
        origPositions: dragFace.map(vi => ({ x: dragFeat.vertices[vi].x, y: dragFeat.vertices[vi].y, z: dragFeat.vertices[vi].z })),
        startHit: meshHitF ? { x: meshHitF.pt.x * 3.28084, y: meshHitF.pt.y * 3.28084, z: meshHitF.pt.z * 3.28084 } : null,
      };
      renderAllFeatures();
      return;
    }
    undoStack.pop();
    return;
  }

  // 1. Check if clicking an existing vertex → start drag
  const allSpheres = [];
  for (const [id, vis] of featureMeshes) {
    for (const s of vis.spheres) { if (s.userData.pointIdx !== undefined) allSpheres.push(s); }
  }
  const hits = ray.intersectObjects(allSpheres, false);

  if (hits.length > 0) {
    const ud = hits[0].object.userData;

    if (keys['e'] && featureLastPointIdx >= 0) {
      // Hold E + click vertex → create edge to this vertex
      if (activeFeatureIdx === ud.featureIdx && featureLastPointIdx !== ud.pointIdx) {
        // Same feature — direct edge
        const feat = features[ud.featureIdx];
        const edgeExists = feat.edges.some(([a,b]) => (a===featureLastPointIdx&&b===ud.pointIdx)||(a===ud.pointIdx&&b===featureLastPointIdx));
        if (!edgeExists) {
          feat.edges.push([featureLastPointIdx, ud.pointIdx]);
          const face = findFaceFromEdge(feat, featureLastPointIdx, ud.pointIdx);
          if (face && !faceExists(feat, face)) feat.faces.push(face);
          featuresChanged = true;
          if (feat.type === 'room_floor' || feat.type === 'room_ceiling') cornersChanged = true;
        }
        featureLastPointIdx = ud.pointIdx;
      } else if (activeFeatureIdx >= 0 && activeFeatureIdx !== ud.featureIdx) {
        // Cross-feature — copy target vertex position into active feature, create edge
        const srcFeat = features[ud.featureIdx];
        const srcVert = srcFeat.vertices[ud.pointIdx];
        const destFeat = features[activeFeatureIdx];
        const newVert = { x: srcVert.x, y: srcVert.y, z: srcVert.z, snap: null };
        const newIdx = destFeat.vertices.length;
        destFeat.vertices.push(newVert);
        destFeat.edges.push([featureLastPointIdx, newIdx]);
        const face = findFaceFromEdge(destFeat, featureLastPointIdx, newIdx);
        if (face && !faceExists(destFeat, face)) destFeat.faces.push(face);
        featureLastPointIdx = newIdx;
        featuresChanged = true;
      }
      renderAllFeatures();
      renderFeatureList();
      rebuildMeasurementsAfterFeatureChange();
      return;
    }

    activeFeatureIdx = ud.featureIdx;
    featureLastPointIdx = ud.pointIdx;
    // Start vertex drag
    draggingVertex = { featureIdx: ud.featureIdx, vertexIdx: ud.pointIdx };
    renderAllFeatures();
    renderFeatureList();
    return;
  }

  // 2. Check if clicking near a feature edge — hold E = extrude, otherwise drag edge
  const edgeHit = findClosestFeatureEdge(e);
  if (edgeHit && !keys['e']) {
    // Edge drag — move both vertices together
    const { featureIdx, edgeIdx } = edgeHit;
    const feat = features[featureIdx];
    activeFeatureIdx = featureIdx;
    const [v0, v1] = feat.edges[edgeIdx];
    const p0 = feat.vertices[v0], p1 = feat.vertices[v1];
    const meshHit = castFace(e);
    draggingEdge = {
      featureIdx, edgeIdx,
      v0Idx: v0, v1Idx: v1,
      origVerts: [{ x: p0.x, y: p0.y, z: p0.z, ceilingY: p0.ceilingY }, { x: p1.x, y: p1.y, z: p1.z, ceilingY: p1.ceilingY }],
      startHit: meshHit ? { x: meshHit.pt.x * 3.28084, y: meshHit.pt.y * 3.28084, z: meshHit.pt.z * 3.28084 } : null,
    };
    renderAllFeatures();
    return;
  }
  if (edgeHit && keys['e']) {
    const { featureIdx, edgeIdx } = edgeHit;
    const feat = features[featureIdx];
    activeFeatureIdx = featureIdx;
    const [v0, v1] = feat.edges[edgeIdx];
    const p0 = feat.vertices[v0], p1 = feat.vertices[v1];

    // For room features, also copy ceilingY to new verts if present
    const nv0 = { x: p0.x, y: p0.y, z: p0.z, snap: null };
    const nv1 = { x: p1.x, y: p1.y, z: p1.z, snap: null };
    if (p0.ceilingY !== undefined) nv0.ceilingY = p0.ceilingY;
    if (p1.ceilingY !== undefined) nv1.ceilingY = p1.ceilingY;
    const ni0 = feat.vertices.length;
    const ni1 = ni0 + 1;
    feat.vertices.push(nv0, nv1);
    // Remove the original edge (leaves a gap at the bottom)
    feat.edges.splice(edgeIdx, 1);
    // Add two side edges + new top edge
    feat.edges.push([v0, ni0], [v1, ni1], [ni0, ni1]);
    feat.faces.push([v0, v1, ni1, ni0]);

    extruding = true;
    extrudeFeat = feat;
    extrudeEdgeIdx = -1; // original edge was removed
    extrudeNewVerts = [ni0, ni1];
    extrudeOrigPos = [{ x: p0.x, y: p0.y, z: p0.z }, { x: p1.x, y: p1.y, z: p1.z }];
    // Store original edge vertex indices for click-to-subdivide fallback
    extrudeFeat._extOrigV0 = v0;
    extrudeFeat._extOrigV1 = v1;
    extrudeMouseStart = { x: e.clientX, y: e.clientY };
    featuresChanged = true;
    featureDrawing = false;
    featureLastPointIdx = -1;

    renderAllFeatures();
    renderFeatureList();
    return;
  }

  // 3. Click on mesh — check if near an edge to subdivide, else place new vertex
  const meshHit = castFace(e);
  if (!meshHit) { undoStack.pop(); return; }

  const M2F = 3.28084;
  const rawPt = {
    x: Math.round(meshHit.pt.x * M2F * 100) / 100,
    y: Math.round(meshHit.pt.y * M2F * 100) / 100,
    z: Math.round(meshHit.pt.z * M2F * 100) / 100,
  };

  // Near a feature edge? Subdivide it (works uniformly for all feature types including room polygon)
  const nearEdge = findClosestFeatureEdge(e);
  if (nearEdge) {
    const { featureIdx, edgeIdx } = nearEdge;
    const feat = features[featureIdx];
    const [v0Idx, v1Idx] = feat.edges[edgeIdx];
    const p0 = feat.vertices[v0Idx], p1 = feat.vertices[v1Idx];
    const dx = p1.x - p0.x, dz = p1.z - p0.z;
    const len2 = dx * dx + dz * dz;
    let t = len2 > 0.001 ? ((rawPt.x - p0.x) * dx + (rawPt.z - p0.z) * dz) / len2 : 0.5;
    t = Math.max(0.05, Math.min(0.95, t));
    const newVert = {
      x: Math.round((p0.x + t * dx) * 100) / 100,
      y: Math.round((p0.y + t * (p1.y - p0.y)) * 100) / 100,
      z: Math.round((p0.z + t * dz) * 100) / 100,
      snap: null,
    };
    // Interpolate ceilingY for room polygon vertices
    if (p0.ceilingY !== undefined && p1.ceilingY !== undefined) {
      newVert.ceilingY = Math.round((p0.ceilingY + t * (p1.ceilingY - p0.ceilingY)) * 100) / 100;
    }
    const newIdx = feat.vertices.length;
    feat.vertices.push(newVert);
    feat.edges[edgeIdx] = [v0Idx, newIdx];
    feat.edges.push([newIdx, v1Idx]);
    activeFeatureIdx = featureIdx;
    featureLastPointIdx = newIdx;
    featuresChanged = true;
    if (feat.type === 'room_floor' || feat.type === 'room_ceiling') cornersChanged = true;
    renderAllFeatures();
    renderFeatureList();
    rebuildMeasurementsAfterFeatureChange();
    return;
  }

  // No edge nearby — place free vertex with wall snap
  const pt = snapToWallEdge(rawPt);

  // Auto-create a feature if none active or not drawing
  if (activeFeatureIdx < 0 || !featureDrawing || features[activeFeatureIdx]?.type === 'room_floor' || features[activeFeatureIdx]?.type === 'room_ceiling') {
    const typeKey = document.getElementById('feature-type-select')?.value || 'annotation';
    const feat = {
      id: `feat_${nextFeatureId++}`,
      type: typeKey,
      vertices: [],
      edges: [],
      faces: [],
    };
    features.push(feat);
    activeFeatureIdx = features.length - 1;
    featureDrawing = true;
    featureLastPointIdx = -1;
    featuresChanged = true;
  }

  const feat = features[activeFeatureIdx];
  feat.vertices.push(pt);
  const newIdx = feat.vertices.length - 1;
  if (featureLastPointIdx >= 0) {
    feat.edges.push([featureLastPointIdx, newIdx]);
  }
  featureLastPointIdx = newIdx;
  featuresChanged = true;

  renderAllFeatures();
  renderFeatureList();
  rebuildMeasurementsAfterFeatureChange();
}

function rebuildMeasurementsAfterFeatureChange() {
  syncRoomPolygonToRoom();
  const room = currentData?.rooms?.[activeRoomIndex];
  if (room) { buildMeasurements(room); renderMetrics(room); }
}

function updateFeatureHover(e) {
  if (hoverEdgeObj) { scene.remove(hoverEdgeObj); hoverEdgeObj = null; }
  if (hoverVertObj) { scene.remove(hoverVertObj); hoverVertObj = null; }
  if (hoverFaceObj) { scene.remove(hoverFaceObj); hoverFaceObj = null; }
  const FT = 1 / 3.28084;

  const rect = renderer.domElement.getBoundingClientRect();
  ndc.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  ndc.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  ray.setFromCamera(ndc, camera);

  // S-key: surface hover mode
  if (keys['s'] && faceMeshes.length > 0) {
    const faceObjs = faceMeshes.map(fm => fm.mesh);
    const faceHits = ray.intersectObjects(faceObjs, false);
    if (faceHits.length > 0) {
      const hitMesh = faceHits[0].object;
      const { featureIdx, faceIdx } = hitMesh.userData;
      const key = `${featureIdx}-${faceIdx}`;
      const isAlreadySelected = selectedFaces.has(key);
      // Clone geometry for hover highlight
      const hoverGeom = hitMesh.geometry.clone();
      hoverFaceObj = new THREE.Mesh(hoverGeom, new THREE.MeshBasicMaterial({
        color: isAlreadySelected ? 0xffff00 : 0x4488ff, transparent: true, opacity: 0.35, side: THREE.DoubleSide, depthTest: false,
      }));
      hoverFaceObj.renderOrder = 18;
      scene.add(hoverFaceObj);
      renderer.domElement.style.cursor = 'pointer';
      return;
    }
    renderer.domElement.style.cursor = 'copy';
    return;
  }

  // Normal hover: check vertex first, then edge
  const allSpheres = [];
  for (const [id, vis] of featureMeshes) {
    for (const s of vis.spheres) { if (s.userData.pointIdx !== undefined) allSpheres.push(s); }
  }
  const vertHits = ray.intersectObjects(allSpheres, false);
  if (vertHits.length > 0) {
    const pos = vertHits[0].object.position;
    const haloGeom = new THREE.SphereGeometry(CORNER_RADIUS * 1.8, 12, 12);
    hoverVertObj = new THREE.Mesh(haloGeom, new THREE.MeshBasicMaterial({ color: 0xffff00, transparent: true, opacity: 0.5, depthTest: false }));
    hoverVertObj.position.copy(pos);
    hoverVertObj.renderOrder = 20;
    scene.add(hoverVertObj);
    renderer.domElement.style.cursor = 'grab';
    return;
  }

  // Check edge hover
  const edgeHit = findClosestFeatureEdge(e);
  if (edgeHit) {
    const feat = features[edgeHit.featureIdx];
    const [v0, v1] = feat.edges[edgeHit.edgeIdx];
    const p0 = feat.vertices[v0], p1 = feat.vertices[v1];
    const pts = [
      new THREE.Vector3(p0.x*FT, p0.y*FT, p0.z*FT),
      new THREE.Vector3(p1.x*FT, p1.y*FT, p1.z*FT),
    ];
    hoverEdgeObj = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({ color: keys['e'] ? 0xff6600 : 0xffff00, depthTest: false, linewidth: 3 })
    );
    hoverEdgeObj.renderOrder = 20;
    scene.add(hoverEdgeObj);
    renderer.domElement.style.cursor = keys['e'] ? 'ns-resize' : 'pointer';
    return;
  }

  renderer.domElement.style.cursor = 'copy';
}

function onFeatureMove(e) {
  // Edge dragging — move both vertices by same delta
  if (draggingEdge && draggingEdge.startHit) {
    e.preventDefault();
    const meshHit = castFace(e);
    if (!meshHit) return;
    const M2F = 3.28084;
    const hitFt = { x: meshHit.pt.x * M2F, y: meshHit.pt.y * M2F, z: meshHit.pt.z * M2F };
    const dx = hitFt.x - draggingEdge.startHit.x;
    const dy = hitFt.y - draggingEdge.startHit.y;
    const dz = hitFt.z - draggingEdge.startHit.z;
    const feat = features[draggingEdge.featureIdx];
    const v0 = feat.vertices[draggingEdge.v0Idx], v1 = feat.vertices[draggingEdge.v1Idx];
    const o0 = draggingEdge.origVerts[0], o1 = draggingEdge.origVerts[1];
    v0.x = Math.round((o0.x + dx) * 100) / 100;
    v0.y = Math.round((o0.y + dy) * 100) / 100;
    v0.z = Math.round((o0.z + dz) * 100) / 100;
    v1.x = Math.round((o1.x + dx) * 100) / 100;
    v1.y = Math.round((o1.y + dy) * 100) / 100;
    v1.z = Math.round((o1.z + dz) * 100) / 100;
    if (v0.ceilingY !== undefined) v0.ceilingY = Math.round((o0.ceilingY + dy) * 100) / 100;
    if (v1.ceilingY !== undefined) v1.ceilingY = Math.round((o1.ceilingY + dy) * 100) / 100;
    if (feat.type === 'room_floor' || feat.type === 'room_ceiling') cornersChanged = true;
    featuresChanged = true;
    renderAllFeatures();
    return;
  }

  // Vertex or face dragging — with edge/vertex snapping
  if (draggingVertex) {
    e.preventDefault();
    if (hoverEdgeObj) { scene.remove(hoverEdgeObj); hoverEdgeObj = null; }
    if (hoverVertObj) { scene.remove(hoverVertObj); hoverVertObj = null; }
    const meshHit = castFace(e);
    if (!meshHit) return;
    const M2F = 3.28084;
    const FT = 1/3.28084;
    const feat = features[draggingVertex.featureIdx];

    // Face drag mode (vertexIdx === -1)
    if (draggingVertex.vertexIdx === -1 && draggingVertex.startHit) {
      const hitFt = { x: meshHit.pt.x * M2F, y: meshHit.pt.y * M2F, z: meshHit.pt.z * M2F };
      const dx = hitFt.x - draggingVertex.startHit.x;
      const dy = hitFt.y - draggingVertex.startHit.y;
      const dz = hitFt.z - draggingVertex.startHit.z;
      for (let i = 0; i < draggingVertex.faceVertIndices.length; i++) {
        const vi = draggingVertex.faceVertIndices[i];
        const op = draggingVertex.origPositions[i];
        const fv = feat.vertices[vi];
        fv.x = Math.round((op.x + dx) * 100) / 100;
        fv.y = Math.round((op.y + dy) * 100) / 100;
        fv.z = Math.round((op.z + dz) * 100) / 100;
      }
      if (feat.type === 'room_floor' || feat.type === 'room_ceiling') cornersChanged = true;
      featuresChanged = true;
      renderAllFeatures();
      return;
    }

    const v = feat.vertices[draggingVertex.vertexIdx];
    v.x = Math.round(meshHit.pt.x * M2F * 100) / 100;
    v.z = Math.round(meshHit.pt.z * M2F * 100) / 100;
    v.y = Math.round(meshHit.pt.y * M2F * 100) / 100;

    // Shift = constrain to edge (keep straight along connected edge)
    if (keys['shift'] && draggingVertex.vertexIdx >= 0) {
      // Find edges connected to this vertex
      const vi = draggingVertex.vertexIdx;
      const connEdges = feat.edges.filter(([a,b]) => a === vi || b === vi);
      if (connEdges.length >= 1) {
        // Find the two neighbors and project onto the line between them
        const neighbors = connEdges.map(([a,b]) => a === vi ? b : a);
        if (neighbors.length >= 2) {
          const n0 = feat.vertices[neighbors[0]], n1 = feat.vertices[neighbors[1]];
          const dx = n1.x - n0.x, dz = n1.z - n0.z, dy = n1.y - n0.y;
          const len2 = dx*dx + dy*dy + dz*dz;
          if (len2 > 0.001) {
            let t = ((v.x-n0.x)*dx + (v.y-n0.y)*dy + (v.z-n0.z)*dz) / len2;
            t = Math.max(0, Math.min(1, t));
            v.x = Math.round((n0.x + t*dx)*100)/100;
            v.y = Math.round((n0.y + t*dy)*100)/100;
            v.z = Math.round((n0.z + t*dz)*100)/100;
          }
        }
      }
    }

    // Try vertex snap first (closest vertex within 0.5ft)
    let snapped = false;
    let bestVertDist = Infinity, bestVert = null;
    for (let fi2 = 0; fi2 < features.length; fi2++) {
      for (let vi2 = 0; vi2 < features[fi2].vertices.length; vi2++) {
        if (fi2 === draggingVertex.featureIdx && vi2 === draggingVertex.vertexIdx) continue;
        const ov = features[fi2].vertices[vi2];
        const d = Math.sqrt((ov.x-v.x)**2 + (ov.y-v.y)**2 + (ov.z-v.z)**2);
        if (d < bestVertDist) { bestVertDist = d; bestVert = ov; }
      }
    }
    if (bestVertDist < 0.5 && bestVert) {
      v.x = bestVert.x; v.y = bestVert.y; v.z = bestVert.z;
      const haloGeom = new THREE.SphereGeometry(CORNER_RADIUS * 2, 12, 12);
      hoverVertObj = new THREE.Mesh(haloGeom, new THREE.MeshBasicMaterial({ color: 0x00ff88, transparent: true, opacity: 0.5, depthTest: false }));
      hoverVertObj.position.set(v.x*FT, v.y*FT, v.z*FT);
      hoverVertObj.renderOrder = 20;
      scene.add(hoverVertObj);
      snapped = true;
    }

    // Try edge snap if no vertex snap
    if (!snapped) {
      const edgeSnap = snapPointToNearestEdge(v, 0.5, draggingVertex.featureIdx, [draggingVertex.vertexIdx]);
      if (edgeSnap) {
        v.x = edgeSnap.x; v.y = edgeSnap.y; v.z = edgeSnap.z;
        const sf = features[edgeSnap.snappedFeatureIdx];
        const [sa, sb] = sf.edges[edgeSnap.snappedEdgeIdx];
        const spa = sf.vertices[sa], spb = sf.vertices[sb];
        hoverEdgeObj = new THREE.Line(
          new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(spa.x*FT, spa.y*FT, spa.z*FT),
            new THREE.Vector3(spb.x*FT, spb.y*FT, spb.z*FT),
          ]),
          new THREE.LineBasicMaterial({ color: 0x00ff88, depthTest: false, linewidth: 3 })
        );
        hoverEdgeObj.renderOrder = 20;
        scene.add(hoverEdgeObj);
      }
    }

    if (feat.type === 'room_floor' || feat.type === 'room_ceiling') cornersChanged = true;
    featuresChanged = true;
    renderAllFeatures();
    return;
  }

  // Surface extrude dragging — move new verts along face normal
  if (extrudingSurface && extrudeSurfaceFeat) {
    e.preventDefault();
    const meshHit = castFace(e);
    if (!meshHit) return;
    const M2F = 3.28084;
    const hitFt = { x: meshHit.pt.x * M2F, y: meshHit.pt.y * M2F, z: meshHit.pt.z * M2F };
    // Project mouse delta onto face normal
    const origCenter = extrudeSurfaceOrigPos.reduce((s, p) => ({ x: s.x+p.x, y: s.y+p.y, z: s.z+p.z }), {x:0,y:0,z:0});
    origCenter.x /= extrudeSurfaceOrigPos.length; origCenter.y /= extrudeSurfaceOrigPos.length; origCenter.z /= extrudeSurfaceOrigPos.length;
    const n = extrudeSurfaceNormal;
    const delta = (hitFt.x - origCenter.x) * n.x + (hitFt.y - origCenter.y) * n.y + (hitFt.z - origCenter.z) * n.z;
    for (let i = 0; i < extrudeSurfaceNewVerts.length; i++) {
      const nv = extrudeSurfaceFeat.vertices[extrudeSurfaceNewVerts[i]];
      const op = extrudeSurfaceOrigPos[i];
      nv.x = Math.round((op.x + n.x * delta) * 100) / 100;
      nv.y = Math.round((op.y + n.y * delta) * 100) / 100;
      nv.z = Math.round((op.z + n.z * delta) * 100) / 100;
    }
    renderAllFeatures();
    return;
  }

  // Edge extrude dragging — with edge snapping
  if (extruding && extrudeFeat) {
    e.preventDefault();
    if (hoverEdgeObj) { scene.remove(hoverEdgeObj); hoverEdgeObj = null; }
    const meshHit = castFace(e);
    if (!meshHit) return;
    const M2F = 3.28084;
    const hitFt = { x: meshHit.pt.x * M2F, y: meshHit.pt.y * M2F, z: meshHit.pt.z * M2F };
    const orig0 = extrudeOrigPos[0], orig1 = extrudeOrigPos[1];
    const midX = (orig0.x + orig1.x) / 2, midY = (orig0.y + orig1.y) / 2, midZ = (orig0.z + orig1.z) / 2;
    let dx = hitFt.x - midX, dy = hitFt.y - midY, dz = hitFt.z - midZ;

    // Shift = constrain extrude perpendicular to original edge
    if (keys['shift']) {
      const edgeDx = orig1.x - orig0.x, edgeDy = orig1.y - orig0.y, edgeDz = orig1.z - orig0.z;
      const edgeLen2 = edgeDx*edgeDx + edgeDy*edgeDy + edgeDz*edgeDz;
      if (edgeLen2 > 0.001) {
        // Remove component along edge direction
        const proj = (dx*edgeDx + dy*edgeDy + dz*edgeDz) / edgeLen2;
        dx -= proj * edgeDx; dy -= proj * edgeDy; dz -= proj * edgeDz;
      }
    }

    const nv0 = extrudeFeat.vertices[extrudeNewVerts[0]];
    const nv1 = extrudeFeat.vertices[extrudeNewVerts[1]];
    nv0.x = Math.round((orig0.x + dx) * 100) / 100;
    nv0.y = Math.round((orig0.y + dy) * 100) / 100;
    nv0.z = Math.round((orig0.z + dz) * 100) / 100;
    nv1.x = Math.round((orig1.x + dx) * 100) / 100;
    nv1.y = Math.round((orig1.y + dy) * 100) / 100;
    nv1.z = Math.round((orig1.z + dz) * 100) / 100;

    // Try to snap each extruded vertex to a nearby edge
    const extFi = features.indexOf(extrudeFeat);
    const snap0 = snapPointToNearestEdge(nv0, 0.5, extFi, extrudeNewVerts);
    const snap1 = snapPointToNearestEdge(nv1, 0.5, extFi, extrudeNewVerts);
    if (snap0) { nv0.x = snap0.x; nv0.y = snap0.y; nv0.z = snap0.z; }
    if (snap1) { nv1.x = snap1.x; nv1.y = snap1.y; nv1.z = snap1.z; }

    // Show hover highlight on snapped edges
    const snapTarget = snap0 || snap1;
    if (snapTarget) {
      const FT = 1/3.28084;
      const sf = features[snapTarget.snappedFeatureIdx];
      const [sa, sb] = sf.edges[snapTarget.snappedEdgeIdx];
      const spa = sf.vertices[sa], spb = sf.vertices[sb];
      hoverEdgeObj = new THREE.Line(
        new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(spa.x*FT, spa.y*FT, spa.z*FT),
          new THREE.Vector3(spb.x*FT, spb.y*FT, spb.z*FT),
        ]),
        new THREE.LineBasicMaterial({ color: 0x00ff88, depthTest: false, linewidth: 3 })
      );
      hoverEdgeObj.renderOrder = 20;
      scene.add(hoverEdgeObj);
    }

    renderAllFeatures();
    return;
  }

  // Hover highlighting
  updateFeatureHover(e);
}

function onFeatureUp(e) {
  // Finish edge drag — if barely moved, subdivide instead
  if (draggingEdge) {
    const feat = features[draggingEdge.featureIdx];
    const v0 = feat.vertices[draggingEdge.v0Idx], v1 = feat.vertices[draggingEdge.v1Idx];
    const o0 = draggingEdge.origVerts[0], o1 = draggingEdge.origVerts[1];
    const moved = Math.abs(v0.x - o0.x) + Math.abs(v0.z - o0.z) + Math.abs(v1.x - o1.x) + Math.abs(v1.z - o1.z);

    if (moved < 0.05) {
      // Restore original positions — this was a click, not a drag
      v0.x = o0.x; v0.y = o0.y; v0.z = o0.z;
      v1.x = o1.x; v1.y = o1.y; v1.z = o1.z;
      if (v0.ceilingY !== undefined) v0.ceilingY = o0.ceilingY;
      if (v1.ceilingY !== undefined) v1.ceilingY = o1.ceilingY;

      // Subdivide the edge (uniform for all feature types)
      const edgeIdx = draggingEdge.edgeIdx;
      const p0 = o0, p1 = o1;
      const meshHit = castFace(e);
      if (meshHit) {
        const M2F = 3.28084;
        const hitX = meshHit.pt.x * M2F, hitZ = meshHit.pt.z * M2F;
        const dx = p1.x - p0.x, dz = p1.z - p0.z, len2 = dx * dx + dz * dz;
        let t = len2 > 0.001 ? ((hitX - p0.x) * dx + (hitZ - p0.z) * dz) / len2 : 0.5;
        t = Math.max(0.05, Math.min(0.95, t));
        const newVert = {
          x: Math.round((p0.x + t * dx) * 100) / 100,
          y: Math.round((p0.y + t * (p1.y - p0.y)) * 100) / 100,
          z: Math.round((p0.z + t * dz) * 100) / 100,
          snap: null,
        };
        if (p0.ceilingY !== undefined && p1.ceilingY !== undefined) {
          newVert.ceilingY = Math.round((p0.ceilingY + t * (p1.ceilingY - p0.ceilingY)) * 100) / 100;
        }
        const newIdx = feat.vertices.length;
        feat.vertices.push(newVert);
        feat.edges[edgeIdx] = [draggingEdge.v0Idx, newIdx];
        feat.edges.push([newIdx, draggingEdge.v1Idx]);
        activeFeatureIdx = draggingEdge.featureIdx;
        featureLastPointIdx = newIdx;
        if (feat.type === 'room_floor' || feat.type === 'room_ceiling') cornersChanged = true;
        featuresChanged = true;
      }
    }

    draggingEdge = null;
    renderAllFeatures();
    renderFeatureList();
    rebuildMeasurementsAfterFeatureChange();
    return;
  }

  // Finish surface extrude — snap new vertices to edges/vertices
  if (extrudingSurface && extrudeSurfaceFeat) {
    const feat = extrudeSurfaceFeat;
    const extFi = features.indexOf(feat);
    // Snap each new vertex to nearby edges/vertices
    for (let i = extrudeSurfaceNewVerts.length - 1; i >= 0; i--) {
      const ni = extrudeSurfaceNewVerts[i];
      mergeNearbyVertex(feat, ni, 0.5);
    }
    // Clean up duplicate edges
    feat.edges = feat.edges.filter(([a,b]) => a !== b);
    const edgeSet = new Set();
    feat.edges = feat.edges.filter(([a,b]) => {
      const key = a < b ? `${a}-${b}` : `${b}-${a}`;
      if (edgeSet.has(key)) return false;
      edgeSet.add(key);
      return true;
    });
    extrudingSurface = false;
    extrudeSurfaceFeat = null;
    extrudeSurfaceNewVerts = [];
    extrudeSurfaceOrigPos = [];
    extrudeSurfaceNormal = null;
    featuresChanged = true;
    renderAllFeatures();
    renderFeatureList();
    rebuildMeasurementsAfterFeatureChange();
    return;
  }

  // Finish vertex drag — merge if snapped to another vertex
  if (draggingVertex) {
    const feat = features[draggingVertex.featureIdx];
    mergeNearbyVertex(feat, draggingVertex.vertexIdx, 0.5);
    draggingVertex = null;
    renderAllFeatures();
    renderFeatureList();
    rebuildMeasurementsAfterFeatureChange();
    return;
  }

  // Finish extrude — commit, auto-snap new vertices, merge nearby
  if (extruding) {
    const nv0 = extrudeFeat.vertices[extrudeNewVerts[0]];
    const nv1 = extrudeFeat.vertices[extrudeNewVerts[1]];
    const snapped0 = snapToWallEdge(nv0);
    const snapped1 = snapToWallEdge(nv1);
    Object.assign(nv0, snapped0);
    Object.assign(nv1, snapped1);
    delete extrudeFeat._extOrigV0;
    delete extrudeFeat._extOrigV1;

    // Merge extruded vertices with nearby existing vertices (~6 inches)
    // Merge higher index first so the lower index isn't shifted
    const [mi0, mi1] = extrudeNewVerts[0] > extrudeNewVerts[1]
      ? [extrudeNewVerts[0], extrudeNewVerts[1]]
      : [extrudeNewVerts[1], extrudeNewVerts[0]];
    const merged0 = mergeNearbyVertex(extrudeFeat, mi0, 0.5);
    // If mi0 was removed and mi1 was above it, shift mi1 down
    const adjustedMi1 = (merged0 && mi1 > mi0) ? mi1 - 1 : mi1;
    mergeNearbyVertex(extrudeFeat, adjustedMi1, 0.5);

    extruding = false;
    extrudeFeat = null;
    extrudeEdgeIdx = -1;
    extrudeNewVerts = [-1, -1];
    extrudeOrigPos = null;
    extrudeMouseStart = null;
    featuresChanged = true;
    renderAllFeatures();
    renderFeatureList();
    rebuildMeasurementsAfterFeatureChange();
  }
}

window.startFeature = function(typeKey) {
  const feat = {
    id: `feat_${nextFeatureId++}`,
    type: typeKey,
    vertices: [],
    edges: [],
    faces: [],
  };
  features.push(feat);
  activeFeatureIdx = features.length - 1;
  featureDrawing = true;
  featureLastPointIdx = -1;
  featuresChanged = true;
  setMode('features');
  renderAllFeatures();
  renderFeatureList();
};

window.finishFeature = function() {
  featureDrawing = false;
  featureLastPointIdx = -1;
  renderAllFeatures();
  renderFeatureList();
};

window.deleteFeature = function(idx) {
  if (idx < 0 || idx >= features.length) return;
  pushUndo();
  const feat = features[idx];
  const vis = featureMeshes.get(feat.id);
  if (vis) {
    vis.spheres.forEach(s => scene.remove(s));
    vis.lines.forEach(l => scene.remove(l));
    vis.labels.forEach(l => { if (l.parent) l.parent.remove(l); });
    featureMeshes.delete(feat.id);
  }
  features.splice(idx, 1);
  if (activeFeatureIdx >= features.length) activeFeatureIdx = features.length - 1;
  featuresChanged = true;
  featureDrawing = false;
  renderAllFeatures();
  renderFeatureList();
  rebuildMeasurementsAfterFeatureChange();
};

window.selectFeature = function(idx) {
  activeFeatureIdx = idx;
  featureDrawing = false;
  featureLastPointIdx = -1;
  renderAllFeatures();
  renderFeatureList();
};

function renderFeatureList() {
  const el = document.getElementById('feature-rows');
  if (!el) return;
  const nonPoly = features.filter(f => f.type !== 'room_floor' && f.type !== 'room_ceiling');
  if (nonPoly.length === 0) {
    el.innerHTML = '<div class="ann-empty">Switch to Annotate mode to add geometry.</div>';
    return;
  }
  let h = '';
  for (let i = 0; i < features.length; i++) {
    const f = features[i];
    if (f.type === 'room_floor' || f.type === 'room_ceiling') continue; // don't show in list
    const typeInfo = FEATURE_TYPES.find(t => t.key === f.type) || { name: f.type || 'Annotation' };
    const act = i === activeFeatureIdx ? ' active' : '';
    const drawing = (i === activeFeatureIdx && featureDrawing) ? ' (drawing...)' : '';
    h += `<div class="ann-row${act}" onclick="selectFeature(${i})">
      <div class="swatch" style="background:#${(FEATURE_TYPES.find(t=>t.key===f.type)?.color||0x34a853).toString(16).padStart(6,'0')}"></div>
      <div class="ann-info">
        <div class="ann-name">${typeInfo.name}${drawing}</div>
        <div class="ann-meta"><span class="ann-faces">${f.vertices.length} pts, ${f.edges.length} edges, ${f.faces.length} faces</span></div>
      </div>
      <div class="ann-btns">
        ${(i === activeFeatureIdx && featureDrawing) ? '<button class="abtn" onclick="event.stopPropagation();finishFeature()" title="Finish">&#x2713;</button>' : ''}
        <button class="abtn" onclick="event.stopPropagation();deleteFeature(${i})" title="Delete">&times;</button>
      </div>
    </div>`;
  }
  el.innerHTML = h;
}

function renderMetrics(room) {
  const panel = document.getElementById('metrics-panel');
  if (!panel) return;

  if (room.wall_area_sqft) html += metricRow('Wall Area', `${room.wall_area_sqft} sq ft`);
  if (room.ceiling_height_ft) html += metricRow('Ceiling Height', `${room.ceiling_height_ft} ft`);
  if (room.perimeter_linear_ft) html += metricRow('Perimeter', `${room.perimeter_linear_ft} ft`);

  // Trim LF with opening deductions
  const trim = computeTrimLF();
  if (trim.deductions > 0) {
    html += '<h3 style="margin-top:12px">Trim Estimate</h3>';
    html += metricRow('Gross Perimeter', `${trim.gross} ft`);
    html += metricRow('Opening Deductions', `−${trim.deductions} ft`);
    html += metricRow('Net Baseboard LF', `<strong>${trim.net} ft</strong>`);
  }

  // Detected materials — show with unit and quantity from annotations
  const annList = [];
  for (const [k, a] of anns) {
    annList.push({ label: a.name, qty: a.qty, unit: a.unit });
  }
  if (annList.length > 0) {
    html += '<h3 style="margin-top:12px">Detected Materials</h3>';
    annList.forEach(item => {
      const val = item.qty ? `${item.qty} ${item.unit}` : item.unit;
      html += metricRow(item.label, val);
    });
  }

  if (room.scope) {
    const scopeItems = room.scope?.items || [];
    const scopeNotes = room.scope?.notes || '';
    if (scopeItems.length > 0 || scopeNotes) {
      html += '<h3 style="margin-top:12px">Scope of Work</h3>';
      scopeItems.forEach(item => {
        const label = item.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        html += `<div class="metric-row"><span class="label">${esc(label)}</span></div>`;

      if (scopeNotes) html += `<div style="color:#6e6e73;font-size:12px;margin-top:6px;line-height:1.4;font-style:italic">${esc(scopeNotes)}</div>`;
    }
  }
  panel.innerHTML = html;
}

function metricRow(label, value) {
  return `<div class="metric-row"><span class="label">${label}</span><span class="value">${value}</span></div>`;
}

window.selectRoom = async function(index) {

  // Clear state
  clearMesh();
  clearAnnotationsState();
  activeRoomIndex = index;
