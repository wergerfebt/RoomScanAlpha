<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>RoomScan - Room Scan Viewer</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<meta property="og:title" content="RoomScan - Room Viewer">
<meta property="og:description" content="3D room scan with measurements and floor plan">
<meta property="og:image" content="/og-image.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f2f4f8; color: #1d1d1f; overflow: hidden; height: 100vh; }

  /* Layout — sidebar overlays viewer as a slide-out drawer */
  .app { position: relative; height: 100vh; }
  .main-panel { width: 100%; height: 100%; display: flex; flex-direction: column; }
  .viewer-container { flex: 1; position: relative; background: #e8ecf0; }
  .viewer-container canvas { display: block; }

  /* Sidebar drawer */
  .sidebar { position: absolute; top: 0; left: 0; z-index: 50; width: 320px; height: 100%;
             background: #fff; border-right: 1px solid #e0e4ea; display: flex; flex-direction: column;
             overflow-y: auto; box-shadow: 2px 0 12px rgba(0,0,0,0.1);
             transition: transform 0.3s ease; transform: translateX(0);
             padding-top: env(safe-area-inset-top, 0px); }
  .sidebar.collapsed { transform: translateX(-100%); box-shadow: none; }

  /* Expand tab — visible when sidebar is collapsed */
  .sidebar-tab { position: absolute; top: 50%; left: 0; z-index: 49; transform: translateY(-50%);
                 background: #fff; border: 1px solid #e0e4ea; border-left: none;
                 border-radius: 0 8px 8px 0; padding: 12px 6px; cursor: pointer;
                 box-shadow: 2px 0 8px rgba(0,0,0,0.08); transition: opacity 0.3s, left 0.3s;
                 opacity: 0; pointer-events: none; }
  .sidebar-tab svg { display: block; width: 20px; height: 20px; fill: #0055cc; }
  .sidebar.collapsed ~ .sidebar-tab { opacity: 1; pointer-events: auto; }

  /* Close button inside sidebar */
  .sidebar-close { position: absolute; top: 12px; right: 12px; z-index: 51; background: none; border: none;
                   cursor: pointer; padding: 4px; border-radius: 4px; color: #8e8e93; }
  .sidebar-close:hover { background: #f0f3f8; color: #1d1d1f; }
  .sidebar-close svg { width: 18px; height: 18px; fill: currentColor; }

  /* Virtual joystick — touch/mobile only, bottom-left of viewer */
  .joystick-zone { display: none; position: absolute; bottom: 24px; left: 16px; z-index: 20;
                   width: 80px; height: 80px; touch-action: none; }
  .joystick-base { width: 80px; height: 80px; border-radius: 50%;
                   background: rgba(0,80,200,0.12); border: 2px solid rgba(0,80,200,0.35); }
  .joystick-knob { position: absolute; width: 32px; height: 32px; border-radius: 50%;
                   background: rgba(0,80,200,0.45); top: 24px; left: 24px;
                   pointer-events: none; transition: none; }
  @media (hover: none) and (pointer: coarse) {
    .joystick-zone { display: block; }
  }
  @media (max-width: 768px) {
    .joystick-zone { display: block; bottom: 80px; }
  }

  /* Sidebar sections */
  .sidebar-header { padding: 16px; border-bottom: 1px solid #e0e4ea; }
  .sidebar-header h1 { font-size: 18px; font-weight: 700; color: #0055cc; }
  .sidebar-header .subtitle { color: #8e8e93; font-size: 12px; margin-top: 2px; }
  .job-info { padding: 12px 16px; border-bottom: 1px solid #e0e4ea; }
  .job-info .project-title { font-size: 16px; font-weight: 700; }
  .job-info .address { color: #6e6e73; font-size: 12px; margin-top: 3px; }
  .job-info .description { color: #8e8e93; font-size: 12px; margin-top: 6px; line-height: 1.4; }
  .job-info .description.truncated { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .job-info .desc-toggle { color: #0055cc; font-size: 11px; font-weight: 600; cursor: pointer; margin-top: 2px; display: inline-block; }

  /* Floor plan */
  .floor-plan-section { padding: 12px; border-bottom: 1px solid #e0e4ea; }
  .floor-plan-section .fp-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .floor-plan-section h3 { font-size: 12px; font-weight: 600; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; margin: 0; }
  .fp-expand-btn { background: none; border: none; color: #0055cc; font-size: 11px; font-weight: 600; cursor: pointer; padding: 2px 6px; border-radius: 4px; }
  .fp-expand-btn:hover { background: #e8f0fe; }
  .floor-plan-canvas-wrap { background: #f7f8fa; border-radius: 8px; aspect-ratio: 4/3; position: relative; cursor: pointer; border: 1px solid #e0e4ea; }
  .floor-plan-canvas-wrap canvas { width: 100%; height: 100%; border-radius: 8px; }

  /* Fullscreen floor plan overlay */
  .fp-fullscreen { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 40;
                   background: #fff; flex-direction: column; }
  .fp-fullscreen.active { display: flex; }
  .fp-fullscreen-header { display: flex; align-items: center; padding: 10px 16px; border-bottom: 1px solid #e0e4ea; }
  .fp-fullscreen-header h3 { flex: 1; font-size: 15px; font-weight: 600; }
  .fp-fullscreen-close { background: none; border: none; font-size: 13px; font-weight: 600; color: #0055cc; cursor: pointer; padding: 4px 10px; border-radius: 6px; }
  .fp-fullscreen-close:hover { background: #e8f0fe; }
  .fp-fullscreen canvas { flex: 1; width: 100%; touch-action: none; }
  .fp-fullscreen .fp-hint { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
                            background: rgba(0,0,0,0.5); color: #fff; font-size: 11px; padding: 4px 12px;
                            border-radius: 4px; pointer-events: none; }

  /* Room list */
  .room-list { padding: 8px; }
  .room-list h3 { font-size: 12px; font-weight: 600; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; padding: 4px 8px; }
  .room-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; margin: 2px 0; transition: background 0.15s; border: 1px solid transparent; }
  .room-item:hover { background: #f0f3f8; }
  .room-item.active { background: #e8f0fe; border-color: #0055cc; }
  .room-item .name { font-size: 14px; font-weight: 500; }
  .room-item .detail { font-size: 11px; color: #8e8e93; margin-top: 2px; }

  /* Metrics panel */
  .metrics-section { padding: 12px 16px; border-top: 1px solid #e0e4ea; }
  .metrics-section h3 { font-size: 12px; font-weight: 600; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .metric-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
  .metric-row .label { color: #6e6e73; }
  .metric-row .value { font-weight: 600; font-variant-numeric: tabular-nums; }
  .rfq-id-section { padding: 12px 16px; border-top: 1px solid #e0e4ea; color: #b0b3ba; font-size: 10px;
                    font-family: monospace; word-break: break-all; margin-top: auto; }

  /* Top bar */
  .top-bar { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: #fff; border-bottom: 1px solid #e0e4ea; }
  .top-bar .room-name { font-size: 16px; font-weight: 600; flex: 1; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: background 0.15s; }
  .btn-toggle { background: #e8f0fe; color: #0055cc; }
  .btn-toggle:hover { background: #d0e2fc; }
  .btn-toggle.active { background: #0055cc; color: #fff; }
  .btn-primary { background: #0055cc; color: #fff; text-decoration: none; }
  .btn-primary:hover { background: #004ab5; }

  /* Loading / error */
  .loading { display: flex; align-items: center; justify-content: center; height: 100%; color: #8e8e93; font-size: 16px; }
  .viewer-spinner { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
                    z-index: 25; background: rgba(0,0,0,0.55); color: #fff; padding: 12px 20px;
                    border-radius: 8px; font-size: 13px; font-weight: 600; pointer-events: none; }
  .viewer-spinner::before { content: ''; display: inline-block; width: 14px; height: 14px;
                            border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
                            border-radius: 50%; animation: spin 0.8s linear infinite;
                            vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { text-align: center; padding: 60px; }
  .error h2 { font-size: 20px; margin-bottom: 8px; }
  .error p { color: #8e8e93; }

  /* Measurement labels (CSS2D) */
  .measure-label { background: rgba(0,85,204,0.85); color: #fff; padding: 2px 6px; border-radius: 3px; font-size: 11px; font-weight: 600; font-family: -apple-system, monospace; white-space: nowrap; pointer-events: none; }
  .measure-label.area { background: rgba(52,168,83,0.9); font-size: 13px; }
  .measure-label.height { background: rgba(234,134,0,0.9); }

  /* Mini corner thumbnail (shows iso when in 3D, shows 3D when in iso fullscreen) */
  .corner-thumb { position: absolute; bottom: 16px; right: 16px; z-index: 15;
                  width: 160px; height: 120px; border-radius: 8px; overflow: hidden;
                  border: 2px solid rgba(0,85,204,0.3); background: #1a1a1a; cursor: pointer;
                  box-shadow: 0 2px 8px rgba(0,0,0,0.15); display: none; }
  .corner-thumb:hover { border-color: #0055cc; }
  .corner-thumb canvas { width: 100%; height: 100%; display: block; }
  .corner-thumb .thumb-label { position: absolute; bottom: 4px; left: 0; right: 0; text-align: center;
                               font-size: 9px; font-weight: 600; color: rgba(255,255,255,0.6); pointer-events: none; }
  @media (max-width: 768px) {
    .corner-thumb { bottom: auto; top: 56px; right: 8px; width: 100px; height: 75px; }
  }

  /* Fullscreen isometric overlay — below corner-thumb (z:15) so thumb stays clickable */
  .iso-fullscreen { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 14;
                    background: #1a1a1a; }
  .iso-fullscreen.active { display: block; }
  .iso-fullscreen canvas { width: 100%; height: 100%; display: block; }

  /* WASD key indicator — desktop only, bottom-left */
  .wasd-keys { position: absolute; bottom: 16px; left: 16px; z-index: 15; display: grid;
               grid-template-columns: repeat(3, 28px); grid-template-rows: repeat(2, 28px); gap: 3px;
               pointer-events: none; }
  .wasd-key { width: 28px; height: 28px; border-radius: 4px; display: flex; align-items: center;
              justify-content: center; font-size: 11px; font-weight: 700; font-family: monospace;
              background: rgba(0,0,0,0.25); color: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.15); }
  .wasd-key.active { background: rgba(0,85,204,0.7); color: #fff; border-color: rgba(0,85,204,0.9); }
  .wasd-key.blank { visibility: hidden; }
  @media (max-width: 768px) {
    .wasd-keys { display: none; }
  }

  /* Mobile responsive */
  @media (max-width: 768px) {
    .sidebar { width: 280px; }
    .top-bar { padding: 6px 12px; }
    .top-bar .room-name { font-size: 14px; }
    .btn { padding: 5px 10px; font-size: 12px; }
    .floor-plan-section { display: none; }
    #btn-hd { display: none !important; }
  }

  /* Toast / snackbar */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #333;
           color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 500;
           z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }

  /* Modal overlay */
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
                   z-index: 100; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
  .modal-content { background: #fff; border-radius: 12px; padding: 32px; max-width: 400px; width: 90%;
                   position: relative; max-height: 90vh; overflow-y: auto; }
  .modal-close { position: absolute; top: 12px; right: 16px; background: none; border: none;
                 font-size: 24px; color: #8e8e93; cursor: pointer; }
  .modal-close:hover { color: #1d1d1f; }
  .modal-content h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .modal-content .auth-subtitle { color: #8e8e93; font-size: 13px; margin-bottom: 20px; }
  .modal-content input[type="email"],
  .modal-content input[type="password"],
  .modal-content input[type="number"],
  .modal-content textarea { width: 100%; padding: 12px; border: 1px solid #e0e4ea; border-radius: 8px;
                            font-size: 14px; margin-bottom: 12px; font-family: inherit; }
  .modal-content input:focus,
  .modal-content textarea:focus { outline: none; border-color: #0055cc; }
  .form-label { font-size: 12px; font-weight: 600; color: #6e6e73; margin-bottom: 4px; display: block; }
  .price-input-wrap { position: relative; }
  .price-prefix { position: absolute; left: 12px; top: 50%; transform: translateY(-70%); color: #6e6e73;
                  font-size: 14px; font-weight: 600; }
  .price-input-wrap input { padding-left: 28px; }
  .auth-error { color: #ff3b30; font-size: 13px; min-height: 20px; margin-bottom: 8px; }
  .btn-full { width: 100%; justify-content: center; padding: 12px; font-size: 15px; }
  .btn-link { background: none; border: none; color: #0055cc; font-size: 13px; cursor: pointer;
              display: block; margin-top: 8px; text-align: center; width: 100%; }
  .btn-link:hover { text-decoration: underline; }
</style>

{
  "imports": {

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
import { MTLLoader } from 'three/addons/loaders/MTLLoader.js';

const API_BASE = window.location.origin;
let scene, camera, renderer, cssRenderer, controls;
let measurementGroup = null;
let measurementsVisible = true;
let currentData = null;
let activeRoomIndex = -1;
let isHD = false;
let currentTextureUrls = null;
let currentScanId = null;
let loadedMeshGroup = null;
let isBirdsEye = false;
let savedInteriorCamPos = null;
let savedInteriorCamTarget = null;
let savedInteriorFov = 75;
let currentRoomPolygonM = null; // [[x,z], ...] in meters for wall collision

// Room cache: { contentGroup, measureGroup, camPos, camTarget, isHD, hdGroup } per room index
// contentGroup contains the preview mesh (OBJ or quads). hdGroup is the HD mesh (separate).
const roomCache = {};
let activeContentGroup = null; // the THREE.Group currently visible for room content

// --- Init ---

function getRfqId() {
  const parts = window.location.pathname.split('/');
  const idx = parts.indexOf('quote');
  return idx >= 0 && parts[idx + 1] ? parts[idx + 1] : null;
}

async function init() {
  const rfqId = getRfqId();
  if (!rfqId) { showError('Invalid link', 'No project ID found.'); return; }

  try {
    const resp = await fetch(`${API_BASE}/api/rfqs/${rfqId}/contractor-view`);
    if (resp.status === 404) { showError('Not found', 'This project does not exist.'); return; }
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    currentData = await resp.json();
    renderSidebar(currentData);
    renderQuoteSection();
    if (currentData.rooms?.length > 0) loadRoom(0);
  } catch (e) { showError('Failed to load', e.message); }
}

function showError(title, msg) {
  document.getElementById('sidebar-content').innerHTML = `<div class="error"><h2>${title}</h2><p>${msg}</p></div>`;
}

// --- Sidebar ---

function renderSidebar(data) {
  let html = '';

  // Project info: title, address, description
  const title = data.title || data.project_scope || 'Project';
  html += '<div class="job-info">';
  html += `<div class="project-title">${esc(title)}</div>`;
  if (data.address) html += `<div class="address">${esc(data.address)}</div>`;
  if (data.job_description) {
    html += `<div class="description truncated" id="job-desc">${esc(data.job_description)}</div>`;
    if (data.job_description.length > 60) {
      html += `<span class="desc-toggle" id="desc-toggle" onclick="window._toggleDesc()">Show more</span>`;
    }
  }
  html += '</div>';

  // Floor plan with expand button
  if (data.rooms?.some(r => r.room_polygon_ft)) {
    html += `<div class="floor-plan-section"><div class="fp-header"><h3>Floor Plan</h3><button class="fp-expand-btn" onclick="openFpFullscreen()">Expand</button></div><div class="floor-plan-canvas-wrap"><canvas id="fp-canvas"></canvas></div></div>`;
  }

  // Room list
  html += '<div class="room-list"><h3>Rooms</h3>';
  (data.rooms || []).forEach((room, i) => {
    const area = room.floor_area_sqft ? `${Math.round(room.floor_area_sqft)} sq ft` : '';
    html += `<div class="room-item" id="room-${i}" onclick="window._selectRoom(${i})">
      <div class="name">${esc(room.room_label || `Room ${i + 1}`)}</div>
      <div class="detail">${area}${area && room.ceiling_height_ft ? ' · ' : ''}${room.ceiling_height_ft ? room.ceiling_height_ft + ' ft ceiling' : ''}</div>
    </div>`;
  });
  html += '</div>';

  // Metrics (filled when room selected)
  html += '<div class="metrics-section" id="metrics-panel"></div>';

  // RFQ ID at bottom
  html += `<div class="rfq-id-section">RFQ: ${esc(data.rfq_id || '')}</div>`;

  document.getElementById('sidebar-content').innerHTML = html;

  // Draw floor plan after DOM update
  requestAnimationFrame(() => drawFloorPlan(data, 'fp-canvas'));
}

// Floor plan zoom/pan state for fullscreen canvas
const fpTransform = { panX: 0, panY: 0, zoom: 1 };
let fpDrag = null; // { startX, startY, startPanX, startPanY }
let fpDidDrag = false; // true if pointer moved during drag — suppresses click
let fpPinchDist = null;
let fpLastOpts = null;

function resetFpTransform() { fpTransform.panX = 0; fpTransform.panY = 0; fpTransform.zoom = 1; }

function setupFpInteraction() {
  const canvas = document.getElementById('fp-canvas-full');
  if (!canvas || canvas._fpSetup) return;
  canvas._fpSetup = true;

  function redraw() {
    if (currentData && fpLastOpts) drawFloorPlan(currentData, 'fp-canvas-full', fpLastOpts);
  }

  // Wheel zoom
  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    fpTransform.zoom = Math.max(0.3, Math.min(5, fpTransform.zoom * delta));
    redraw();
  }, { passive: false });

  // Mouse drag to pan
  canvas.addEventListener('mousedown', (e) => {
    fpDrag = { startX: e.clientX, startY: e.clientY, startPanX: fpTransform.panX, startPanY: fpTransform.panY };
    fpDidDrag = false;
  });
  window.addEventListener('mousemove', (e) => {
    if (!fpDrag) return;
    const dx = e.clientX - fpDrag.startX, dy = e.clientY - fpDrag.startY;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) fpDidDrag = true;
    fpTransform.panX = fpDrag.startPanX + dx;
    fpTransform.panY = fpDrag.startPanY + dy;
    redraw();
  });
  window.addEventListener('mouseup', () => { fpDrag = null; });

  // Touch drag + pinch zoom
  canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      fpDrag = { startX: e.touches[0].clientX, startY: e.touches[0].clientY, startPanX: fpTransform.panX, startPanY: fpTransform.panY };
      fpDidDrag = false;
    } else if (e.touches.length === 2) {
      fpDrag = null;
      fpDidDrag = true; // pinch counts as drag (no click)
      fpPinchDist = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY);
    }
  }, { passive: true });
  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 1 && fpDrag) {
      const dx = e.touches[0].clientX - fpDrag.startX, dy = e.touches[0].clientY - fpDrag.startY;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) fpDidDrag = true;
      fpTransform.panX = fpDrag.startPanX + dx;
      fpTransform.panY = fpDrag.startPanY + dy;
      redraw();
    } else if (e.touches.length === 2 && fpPinchDist) {
      const dist = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY);
      fpTransform.zoom = Math.max(0.3, Math.min(5, fpTransform.zoom * (dist / fpPinchDist)));
      fpPinchDist = dist;
      redraw();
    }
  }, { passive: false });
  canvas.addEventListener('touchend', () => { fpDrag = null; fpPinchDist = null; });
}

function drawFloorPlan(data, canvasId, opts) {
  const canvas = document.getElementById(canvasId || 'fp-canvas');
  if (!canvas) return;
  const singleRoom = opts?.singleRoom;
  const showMeasurements = opts?.showMeasurements || false;
  const isFullscreen = (canvasId === 'fp-canvas-full');
  if (isFullscreen) { fpLastOpts = opts; setupFpInteraction(); }

  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const w = rect.width, h = rect.height;

  // Apply zoom/pan for fullscreen
  if (isFullscreen) {
    ctx.translate(fpTransform.panX, fpTransform.panY);
    ctx.translate(w/2, h/2);
    ctx.scale(fpTransform.zoom, fpTransform.zoom);
    ctx.translate(-w/2, -h/2);
  }

  // Collect rooms to show
  const GAP_FT = 3;
  const roomPolys = [];
  let cursorX = 0;
  (data.rooms || []).forEach((r, i) => {
    if (singleRoom !== undefined && i !== singleRoom) return;
    if (!r.room_polygon_ft || r.room_polygon_ft.length < 3) return;
    const poly = r.room_polygon_ft;
    let rMinX = Infinity, rMaxX = -Infinity, rMinY = Infinity, rMaxY = -Infinity;
    poly.forEach(([x, y]) => { rMinX = Math.min(rMinX, x); rMaxX = Math.max(rMaxX, x); rMinY = Math.min(rMinY, y); rMaxY = Math.max(rMaxY, y); });
    const offX = cursorX - rMinX;
    const offY = -rMinY;
    const offsetPoly = poly.map(([x, y]) => [x + offX, y + offY]);
    roomPolys.push({ poly: offsetPoly, roomIdx: i });
    cursorX += (rMaxX - rMinX) + GAP_FT;
  });
  if (roomPolys.length === 0) return;

  let allPts = [];
  roomPolys.forEach(rp => rp.poly.forEach(p => allPts.push(p)));

  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  allPts.forEach(([x, y]) => { minX = Math.min(minX, x); maxX = Math.max(maxX, x); minY = Math.min(minY, y); maxY = Math.max(maxY, y); });
  const polyW = maxX - minX || 1, polyH = maxY - minY || 1;
  const pad = showMeasurements ? 0.18 : 0.12; // more padding for measurement labels
  const scale = Math.min(w * (1 - 2*pad) / polyW, h * (1 - 2*pad) / polyH);
  const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
  const tx = x => w/2 + (x - cx) * scale;
  const ty = y => h/2 + (y - cy) * scale;

  roomPolys.forEach(rp => { data.rooms[rp.roomIdx]._offsetPoly = rp.poly; });

  roomPolys.forEach(({ poly, roomIdx: i }) => {
    const room = data.rooms[i];
    const isActive = i === activeRoomIndex;
    const isSingle = singleRoom !== undefined;

    // Fill + stroke
    ctx.beginPath();
    ctx.moveTo(tx(poly[0][0]), ty(poly[0][1]));
    poly.slice(1).forEach(([x, y]) => ctx.lineTo(tx(x), ty(y)));
    ctx.closePath();
    ctx.fillStyle = (isActive || isSingle) ? 'rgba(0,85,204,0.1)' : 'rgba(0,0,0,0.03)';
    ctx.fill();
    ctx.strokeStyle = (isActive || isSingle) ? '#0055cc' : '#c0c4cc';
    ctx.lineWidth = (isActive || isSingle) ? 2 : 1;
    ctx.stroke();

    // Wall measurements
    if (showMeasurements || isSingle) {
      for (let j = 0; j < poly.length; j++) {
        const k = (j + 1) % poly.length;
        const [x0, y0] = poly[j];
        const [x1, y1] = poly[k];
        const wallFt = Math.sqrt((x1-x0)**2 + (y1-y0)**2);
        if (wallFt < 0.5) continue; // skip tiny walls

        const mx = (tx(x0) + tx(x1)) / 2;
        const my = (ty(y0) + ty(y1)) / 2;

        // Offset label outward from room center
        const pcx = poly.reduce((s, p) => s + p[0], 0) / poly.length;
        const pcy = poly.reduce((s, p) => s + p[1], 0) / poly.length;
        const nx = my - (ty(y0) + ty(y1)) / 2; // not needed, use perpendicular
        const dx = tx(x1) - tx(x0), dy = ty(y1) - ty(y0);
        const len = Math.sqrt(dx*dx + dy*dy) || 1;
        // Perpendicular pointing away from room center
        let px = -dy/len, py = dx/len;
        const toCenter = (tx(pcx) - mx) * px + (ty(pcy) - my) * py;
        if (toCenter > 0) { px = -px; py = -py; } // flip to point outward
        const labelOffset = 14;

        ctx.save();
        ctx.font = 'bold 11px -apple-system, sans-serif';
        ctx.fillStyle = '#0055cc';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(formatFtIn(wallFt), mx + px * labelOffset, my + py * labelOffset);
        ctx.restore();
      }

      // Floor area at center
      if (room.floor_area_sqft) {
        const pcx = poly.reduce((s, p) => s + p[0], 0) / poly.length;
        const pcy = poly.reduce((s, p) => s + p[1], 0) / poly.length;
        ctx.save();
        ctx.font = 'bold 13px -apple-system, sans-serif';
        ctx.fillStyle = '#34a853';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(`${Math.round(room.floor_area_sqft)} SF`, tx(pcx), ty(pcy) + 14);
        ctx.restore();
      }
    }

    // Room label
    const lx = poly.reduce((s, p) => s + p[0], 0) / poly.length;
    const ly = poly.reduce((s, p) => s + p[1], 0) / poly.length;
    ctx.font = `${(isActive || isSingle) ? 'bold ' : ''}${isSingle ? '14' : '11'}px -apple-system, sans-serif`;
    ctx.fillStyle = (isActive || isSingle) ? '#0055cc' : '#8e8e93';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(room.room_label || `Room ${i+1}`, tx(lx), ty(ly) - (showMeasurements ? 6 : 0));
  });

  // Click handler (accounts for zoom/pan on fullscreen canvas)
  canvas.onclick = (e) => {
    // Don't register click if the user was dragging/panning
    if (fpDidDrag) return;
    const br = canvas.getBoundingClientRect();
    let mx = (e.clientX - br.left), my = (e.clientY - br.top);
    // Reverse zoom/pan transform for fullscreen
    if (isFullscreen) {
      mx = (mx - fpTransform.panX - w/2) / fpTransform.zoom + w/2;
      my = (my - fpTransform.panY - h/2) / fpTransform.zoom + h/2;
    }
    const fpx = (mx - w/2) / scale + cx, fpy = (my - h/2) / scale + cy;
    for (let i = 0; i < data.rooms.length; i++) {
      const poly = data.rooms[i]._offsetPoly;
      if (poly && pointInPoly(fpx, fpy, poly)) { window._selectRoom(i); return; }
    }
    // Clicked outside all rooms — in expanded view, show all rooms with measurements
    if (isFullscreen) {
      resetFpTransform();
      drawFloorPlan(data, canvasId, { showMeasurements: true });
    }
  };
}

function pointInPoly(x, y, poly) {
  let inside = false;
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    if ((poly[i][1] > y) !== (poly[j][1] > y) &&
        x < (poly[j][0] - poly[i][0]) * (y - poly[i][1]) / (poly[j][1] - poly[i][1]) + poly[i][0])
      inside = !inside;
  }
  return inside;
}

// --- Room Selection ---

window._selectRoom = function(index) {
  if (!currentData || !currentData.rooms[index]) return;
  activeRoomIndex = index;

  // Update active state in room list
  document.querySelectorAll('.room-item').forEach((el, i) => el.classList.toggle('active', i === index));

  const room = currentData.rooms[index];
  document.getElementById('room-name').textContent = room.room_label || `Room ${index + 1}`;
  renderMetrics(room);
  loadRoom(index);

  // Auto-collapse sidebar on mobile after room selection
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.add('collapsed');
    setTimeout(onResize, 350);
  }

  // Redraw floor plan with highlight
  drawFloorPlan(currentData, 'fp-canvas');
  // Also update fullscreen floor plan if open
  if (document.getElementById('fp-fullscreen').classList.contains('active')) {
    const opts = { singleRoom: index, showMeasurements: true };
    requestAnimationFrame(() => drawFloorPlan(currentData, 'fp-canvas-full', opts));
  }
};

function renderMetrics(room) {
  const panel = document.getElementById('metrics-panel');
  if (!panel) return;
  let html = '<h3>Dimensions</h3>';
  if (room.floor_area_sqft) html += metricRow('Floor Area', `${room.floor_area_sqft} sq ft`);
  if (room.wall_area_sqft) html += metricRow('Wall Area', `${room.wall_area_sqft} sq ft`);
  if (room.ceiling_height_ft) html += metricRow('Ceiling Height', `${room.ceiling_height_ft} ft`);
  if (room.perimeter_linear_ft) html += metricRow('Perimeter', `${room.perimeter_linear_ft} ft`);

  if (room.detected_components) {
    const dc = room.detected_components;
    const items = Array.isArray(dc) ? dc : dc.detected || [];
    const details = dc.details || {};
    if (items.length > 0) {
      html += '<h3 style="margin-top:12px">Detected Materials</h3>';
      items.forEach(c => {
        const label = c.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        const d = details[c];
        const val = d ? `${d.qty} ${d.unit}` : '';
        html += metricRow(esc(label), val);
      });
    }
  }

  if (room.scope) {
    const scopeItems = room.scope.items || [];
    const scopeNotes = room.scope.notes || '';
    if (scopeItems.length > 0 || scopeNotes) {
      html += '<h3 style="margin-top:12px">Scope of Work</h3>';
      scopeItems.forEach(item => {
        const label = item.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        html += `<div class="metric-row"><span class="label">${esc(label)}</span></div>`;
      });
      if (scopeNotes) {
        html += `<div style="color:#6e6e73;font-size:12px;margin-top:6px;line-height:1.4;font-style:italic">${esc(scopeNotes)}</div>`;
      }
    }
  }
  panel.innerHTML = html;
}

function metricRow(label, value) {
  return `<div class="metric-row"><span class="label">${label}</span><span class="value">${value}</span></div>`;
}

async function handleAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const errorEl = document.getElementById('auth-error');
  const submitBtn = document.getElementById('auth-submit');
  const isCreate = document.getElementById('auth-modal')._isCreateMode;

  if (!email || !password) { errorEl.textContent = 'Email and password required.'; return; }

  submitBtn.disabled = true;
  submitBtn.textContent = isCreate ? 'Creating...' : 'Signing in...';
  errorEl.textContent = '';

  try {
    if (isCreate) {
      await firebase.auth().createUserWithEmailAndPassword(email, password);
    } else {
      await firebase.auth().signInWithEmailAndPassword(email, password);
    }
    closeModal('auth-modal');
  } catch (e) {
    errorEl.textContent = friendlyAuthError(e.code);
    submitBtn.disabled = false;
    submitBtn.textContent = isCreate ? 'Create Account' : 'Sign In';
  }
}

async function handleForgotPassword() {
  const email = document.getElementById('auth-email').value.trim();
  const errorEl = document.getElementById('auth-error');
  if (!email) { errorEl.textContent = 'Enter your email first.'; return; }
  try {
    await firebase.auth().sendPasswordResetEmail(email);
    errorEl.style.color = '#34a853';
    errorEl.textContent = 'Reset link sent — check your email.';
  } catch (e) {
    errorEl.textContent = friendlyAuthError(e.code);
  }
}

function friendlyAuthError(code) {
  const map = {
    'auth/email-already-in-use': 'An account with this email already exists.',
    'auth/wrong-password': 'Incorrect password.',
    'auth/user-not-found': 'No account found with this email.',
    'auth/weak-password': 'Password must be at least 6 characters.',
    'auth/invalid-email': 'Please enter a valid email address.',
    'auth/too-many-requests': 'Too many attempts. Try again later.',
  };
  return map[code] || 'Authentication failed. Please try again.';
}

window.handleGoogleSignIn = handleGoogleSignIn;

async function handleBidSubmit() {
  const priceStr = document.getElementById('bid-price').value;
  const description = document.getElementById('bid-description').value.trim();
  const pdfInput = document.getElementById('bid-pdf');
  const errorEl = document.getElementById('bid-error');
  const submitBtn = document.getElementById('bid-submit');

  const price = parseFloat(priceStr);
  if (!price || price <= 0) { errorEl.textContent = 'Enter a valid price.'; return; }
  if (!description) { errorEl.textContent = 'Description is required.'; return; }

  const priceCents = Math.round(price * 100);

  submitBtn.disabled = true;
  submitBtn.textContent = 'Submitting...';
  errorEl.textContent = '';

  try {
    await refreshToken();

    const formData = new FormData();
    formData.append('price_cents', priceCents);
    formData.append('description', description);
    if (pdfInput.files[0]) {
      formData.append('pdf', pdfInput.files[0]);
    }

    const rfqId = getRfqId();
    const resp = await fetch(`${API_BASE}/api/rfqs/${rfqId}/bids`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${currentContractor.token}` },
      body: formData,
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.detail || `HTTP ${resp.status}`);
    }

    const bid = await resp.json();
    closeModal('bid-modal');

    const el = document.getElementById('quote-section');
    el.innerHTML = `<span class="btn btn-primary" style="opacity:0.7;cursor:default;">Quote Submitted</span>`;
  } catch (e) {
    errorEl.textContent = e.message;
    submitBtn.disabled = false;
    submitBtn.textContent = 'Submit Quote';
  }
}

// --- Three.js Scene ---

function initThree() {
  const container = document.getElementById('viewer-container');
  const loading = document.getElementById('viewer-loading');
  if (loading) loading.style.display = 'none';

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a1a);

  camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.05, 100);
  camera.position.set(0, 1.5, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  container.appendChild(renderer.domElement);

  // CSS2D renderer for measurement labels
  cssRenderer = new CSS2DRenderer();
  cssRenderer.setSize(container.clientWidth, container.clientHeight);
  cssRenderer.domElement.style.position = 'absolute';
  cssRenderer.domElement.style.top = '0';
  cssRenderer.domElement.style.pointerEvents = 'none';
  container.appendChild(cssRenderer.domElement);

  // Interior look-around: OrbitControls locked to camera position (rotate only, no pan/zoom)
  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.1;
  controls.enableZoom = false;
  controls.enablePan = false;
  controls.rotateSpeed = -0.3; // Invert for natural drag-to-look
  controls.target.set(0, 1.5, -0.01); // Look slightly forward from camera

  // Bright ambient light so textures/colors are clearly visible
  scene.add(new THREE.AmbientLight(0xffffff, 1.0));
  const dir = new THREE.DirectionalLight(0xffffff, 0.3);
  dir.position.set(0, 2, 0);
  scene.add(dir);

  window.addEventListener('resize', onResize);
  new ResizeObserver(() => onResize()).observe(container);

  // Auto-collapse sidebar when user touches/clicks the 3D viewer
  renderer.domElement.addEventListener('pointerdown', () => {
    const sidebar = document.getElementById('sidebar');
    if (!sidebar.classList.contains('collapsed')) {
      sidebar.classList.add('collapsed');
      setTimeout(onResize, 350);
    }
  });

  animate();
}

function onResize() {
  const container = document.getElementById('viewer-container');
  if (!container || !camera) return;
  const w = container.clientWidth, h = container.clientHeight;
  if (w === 0 || h === 0) return;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  cssRenderer.setSize(w, h);
}

    const t = e.changedTouches[0];
    touchId = t.identifier;
    baseRect = base.getBoundingClientRect();
    _joystick.active = true;
    onMove(e);
    e.preventDefault();
  }
  function onMove(e) {
    if (touchId === null) return;
    for (const t of e.changedTouches) {
      if (t.identifier !== touchId) continue;
      const cx = baseRect.left + baseRect.width / 2;
      const cy = baseRect.top + baseRect.height / 2;
      let dx = t.clientX - cx;
      let dy = t.clientY - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > RADIUS) { dx *= RADIUS / dist; dy *= RADIUS / dist; }
      knob.style.left = (24 + dx) + 'px';
      knob.style.top = (24 + dy) + 'px';
      // Normalize to -1..1
      _joystick.dx = dx / RADIUS;
      _joystick.dz = dy / RADIUS;
    }
    e.preventDefault();
  }
  function onEnd(e) {
    for (const t of e.changedTouches) {
      if (t.identifier !== touchId) continue;
      touchId = null;
      _joystick.active = false;
      _joystick.dx = 0;
      _joystick.dz = 0;
      knob.style.left = '24px';
      knob.style.top = '24px';
    }
  }
  zone.addEventListener('touchstart', onStart, { passive: false });
  zone.addEventListener('touchmove', onMove, { passive: false });
  zone.addEventListener('touchend', onEnd);
  zone.addEventListener('touchcancel', onEnd);
}

// Point-in-polygon test (ray casting). poly: [[x,z], ...]
function pointInPolygon(px, pz, poly) {
  if (!poly || poly.length < 3) return true; // no polygon = no constraint
  let inside = false;
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    const [xi, zi] = poly[i], [xj, zj] = poly[j];
    if ((zi > pz) !== (zj > pz) && px < (xj - xi) * (pz - zi) / (zj - zi) + xi) {
      inside = !inside;
    }
  }
  return inside;
}

function animate() {
  requestAnimationFrame(animate);

  // Movement: WASD (desktop) + virtual joystick (mobile)
  if (camera && controls) {
    const forward = new THREE.Vector3();
    camera.getWorldDirection(forward);
    forward.y = 0;
    forward.normalize();
    const right = new THREE.Vector3().crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();
    const delta = new THREE.Vector3();
    // Desktop arrow keys
    if (_keys['arrowup']) delta.add(forward.clone().multiplyScalar(MOVE_SPEED));
    if (_keys['arrowdown']) delta.add(forward.clone().multiplyScalar(-MOVE_SPEED));
    if (_keys['arrowleft']) delta.add(right.clone().multiplyScalar(-MOVE_SPEED));
    if (_keys['arrowright']) delta.add(right.clone().multiplyScalar(MOVE_SPEED));
    // Mobile joystick (dz = forward/back, dx = strafe)
    if (_joystick.active) {
      delta.add(forward.clone().multiplyScalar(-_joystick.dz * MOVE_SPEED));
      delta.add(right.clone().multiplyScalar(_joystick.dx * MOVE_SPEED));
    }
    if (delta.lengthSq() > 0) {
      // In 360 Tour mode, only allow movement if new position is inside the room polygon
      if (!isBirdsEye && currentRoomPolygonM) {
        const newX = camera.position.x + delta.x;
        const newZ = camera.position.z + delta.z;
        if (!pointInPolygon(newX, newZ, currentRoomPolygonM)) {
          delta.x = 0;
          delta.z = 0;
        }
      }
      if (delta.lengthSq() > 0) {
        camera.position.add(delta);
        controls.target.add(delta);
      }
    }
  }

  // Update arrow key indicator
  for (const k of ['arrowup','arrowleft','arrowdown','arrowright']) {
    const el = document.getElementById('key-' + k);
    if (el) el.classList.toggle('active', !!_keys[k]);
  }

  controls.update();
  renderer.render(scene, camera);
  cssRenderer.render(scene, camera);
  renderIso();
}

// --- Load Room ---

async function loadRoom(index) {
  const room = currentData.rooms[index];
  if (!scene) initThree();

  // Save camera state for outgoing room
  if (activeRoomIndex >= 0 && roomCache[activeRoomIndex]) {
    roomCache[activeRoomIndex].camPos = camera.position.clone();
    roomCache[activeRoomIndex].camTarget = controls.target.clone();
  }

  // Hide everything currently visible
  Object.values(roomCache).forEach(c => {
    if (c.contentGroup) c.contentGroup.visible = false;
    if (c.measureGroup) c.measureGroup.visible = false;
    if (c.hdGroup) c.hdGroup.visible = false;
  });
  if (activeContentGroup) { activeContentGroup.visible = false; activeContentGroup = null; }
  loadedMeshGroup = null;
  measurementGroup = null;

  const textureUrls = room.texture_urls || {};
  currentTextureUrls = textureUrls;
  currentScanId = room.scan_id;
  const hasOBJ = textureUrls.obj && textureUrls.mtl;

  const hdBtn = document.getElementById('btn-hd');
  hdBtn.style.display = (hasOBJ && textureUrls.obj_standard) ? '' : 'none';

  // Show view mode toggle and reset to 360 Tour when switching rooms
  document.getElementById('btn-view-mode').style.display = '';
  if (isBirdsEye) {
    isBirdsEye = false;
    const vmBtn = document.getElementById('btn-view-mode');
    vmBtn.classList.remove('active');
    vmBtn.textContent = 'Birds Eye View';
    controls.enableZoom = false;
    controls.enablePan = false;
    controls.rotateSpeed = -0.3;
  }

  // Store room polygon for wall collision
  const polyFt = room.room_polygon_ft;
  if (polyFt && polyFt.length >= 3) {
    const FT = 1 / 3.28084;
    currentRoomPolygonM = polyFt.map(([x, z]) => [x * FT, z * FT]);
  } else {
    currentRoomPolygonM = null;
  }

  // --- Cached room: show instantly ---
  if (roomCache[index]) {
    const cached = roomCache[index];
    isHD = cached.isHD || false;
    hdBtn.classList.toggle('active', isHD);
    hdBtn.textContent = isHD ? 'HD On' : 'HD';

    if (isHD && cached.hdGroup) {
      cached.hdGroup.visible = true;
      activeContentGroup = cached.hdGroup;
    } else {
      cached.contentGroup.visible = true;
      activeContentGroup = cached.contentGroup;
    }
    loadedMeshGroup = activeContentGroup;
    cached.measureGroup.visible = measurementsVisible;
    measurementGroup = cached.measureGroup;

    camera.position.copy(cached.camPos);
    controls.target.copy(cached.camTarget);
    controls.update();
    updateIsoView(room);
    return;
  }

  // --- Fresh room: build from scratch ---
  isHD = false;
  hdBtn.classList.remove('active');
  hdBtn.textContent = 'HD';

  const polygon = room.room_polygon_ft;
  if (!polygon || polygon.length < 3) return;

  const FT_TO_M = 1 / 3.28084;
  const cornersM = polygon.map(([x, z]) => [x * FT_TO_M, z * FT_TO_M]);
  const ceilingHeightM = (room.ceiling_height_ft || 8) * FT_TO_M;
  const cornersYM = (room.wall_heights_ft || []).map(h => h * FT_TO_M);
  const avgCeilingY = cornersYM.length > 0 ? cornersYM.reduce((s, v) => s + v, 0) / cornersYM.length : ceilingHeightM;
  const floorY = avgCeilingY - ceilingHeightM;
  const cx = cornersM.reduce((s, p) => s + p[0], 0) / cornersM.length;
  const cz = cornersM.reduce((s, p) => s + p[1], 0) / cornersM.length;

  // Create a group to hold all this room's preview content
  const contentGroup = new THREE.Group();
  scene.add(contentGroup);
  activeContentGroup = contentGroup;

  if (hasOBJ) {
    loadOBJMesh(textureUrls.obj, textureUrls.atlas, true, contentGroup, false);
  } else {
    buildQuadRoom(contentGroup);
  }

  function buildQuadRoom(group) {
  for (let i = 0; i < cornersM.length; i++) {
    const j = (i + 1) % cornersM.length;
    const [x0, z0] = cornersM[i];
    const [x1, z1] = cornersM[j];
    const h0 = cornersYM[i] || (floorY + ceilingHeightM);
    const h1 = cornersYM[j] || (floorY + ceilingHeightM);

    const vertices = new Float32Array([
      x0, floorY, z0,   x0, h0, z0,   x1, h1, z1,
      x0, floorY, z0,   x1, h1, z1,   x1, floorY, z1,
    ]);
    const uvs = new Float32Array([
      0, 0,   0, 1,   1, 1,
      0, 0,   1, 1,   1, 0,
    ]);

    const geom = new THREE.BufferGeometry();
    geom.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
    geom.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));

    let mat;
    const texUrl = textureUrls[`wall_${i}`];
    if (texUrl) {
      const loader = new THREE.TextureLoader();
      loader.crossOrigin = 'anonymous';
      const tex = loader.load(texUrl);
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.flipY = false;
      mat = new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide });
    } else {
      mat = new THREE.MeshBasicMaterial({ color: 0xd8d0c8, side: THREE.DoubleSide });
    }
    group.add(new THREE.Mesh(geom, mat));
  }
  group.add(buildPolygonSurface(cornersM, floorY, textureUrls.floor, 0x8b7355, true));
  group.add(buildPolygonSurface(cornersM, avgCeilingY, textureUrls.ceiling, 0xe8e4e0, false));
  } // end buildQuadRoom

  // Position camera
  const eyeHeight = floorY + Math.min(1.6, ceilingHeightM * 0.65);
  camera.position.set(cx, eyeHeight, cz);
  const [wx0, wz0] = cornersM[0];
  const [wx1, wz1] = cornersM[1];
  const lookX = (wx0 + wx1) / 2;
  const lookZ = (wz0 + wz1) / 2;
  const dx = lookX - cx, dz = lookZ - cz;
  const lookDist = Math.sqrt(dx * dx + dz * dz) || 1;
  controls.target.set(cx + dx / lookDist * 0.01, eyeHeight, cz + dz / lookDist * 0.01);
  controls.update();

  // Build measurements
  buildMeasurements(room, cornersM, floorY, avgCeilingY, ceilingHeightM);

  // Build features (doors, openings, etc.)
  const featGrp = buildFeatures(room);
  if (featGrp.children.length > 0) {
    featGrp.visible = measurementsVisible;
    contentGroup.add(featGrp);
  }

  // Isometric mini-view
  updateIsoView(room);

  // Cache
  roomCache[index] = {
    contentGroup,
    measureGroup: measurementGroup,
    camPos: camera.position.clone(),
    camTarget: controls.target.clone(),
    isHD: false,
    hdGroup: null,
  };
  loadedMeshGroup = contentGroup;

  // Auto-enable HD on desktop; show toast on mobile
  if (hasOBJ && textureUrls.obj_standard) {
    if (!isMobile) {
      // Small delay so preview renders first, then HD loads over it
      setTimeout(() => { if (activeRoomIndex === index && !isHD) toggleHD(); }, 100);
    } else {
      showToast('HD mode available on browser only');
    }
  }
}

// Build a horizontal polygon surface at a given Y height using fan triangulation.
// cornersM: [[x,z], ...] in meters. normalUp: true = floor (normal +Y), false = ceiling (normal -Y).
function buildPolygonSurface(cornersM, y, textureUrl, fallbackColor, normalUp) {
  const n = cornersM.length;
  // Fan triangulation from centroid to avoid non-convex issues
  const cx = cornersM.reduce((s, p) => s + p[0], 0) / n;
  const cz = cornersM.reduce((s, p) => s + p[1], 0) / n;

  // Compute bounding box for UV mapping
  let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
  cornersM.forEach(([x, z]) => { minX = Math.min(minX, x); maxX = Math.max(maxX, x); minZ = Math.min(minZ, z); maxZ = Math.max(maxZ, z); });
  const rangeX = maxX - minX || 1;
  const rangeZ = maxZ - minZ || 1;

  const verts = [];
  const uvs = [];
  for (let i = 0; i < n; i++) {
    const j = (i + 1) % n;
    const [x0, z0] = cornersM[i];
    const [x1, z1] = cornersM[j];

    if (normalUp) {
      // Floor: centroid, corner i, corner j (CCW when viewed from above = +Y)
      verts.push(cx, y, cz, x0, y, z0, x1, y, z1);
    } else {
      // Ceiling: centroid, corner j, corner i (reversed winding so normal faces down)
      verts.push(cx, y, cz, x1, y, z1, x0, y, z0);
    }

    // UVs based on XZ bounding box
    uvs.push((cx - minX) / rangeX, (cz - minZ) / rangeZ);
    if (normalUp) {
      uvs.push((x0 - minX) / rangeX, (z0 - minZ) / rangeZ);
      uvs.push((x1 - minX) / rangeX, (z1 - minZ) / rangeZ);
    } else {
      uvs.push((x1 - minX) / rangeX, (z1 - minZ) / rangeZ);
      uvs.push((x0 - minX) / rangeX, (z0 - minZ) / rangeZ);
    }
  }

  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  geom.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));

  let mat;
  if (textureUrl) {
    const loader = new THREE.TextureLoader();
    loader.crossOrigin = 'anonymous';
    const tex = loader.load(textureUrl,
      () => { console.log(`${normalUp ? 'floor' : 'ceiling'} texture loaded`); },
      undefined,
      (err) => { console.error(`${normalUp ? 'floor' : 'ceiling'} texture FAILED`, err); }
    );
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.flipY = false; // Projected texture row 0 = UV V=0, no flip needed
    mat = new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide });
  } else {
    mat = new THREE.MeshBasicMaterial({ color: fallbackColor, side: THREE.DoubleSide });
  }
  return new THREE.Mesh(geom, mat);
}

function clearScene() {
  // Only used for full teardown — room switching uses show/hide via cache
  if (!scene) return;
  const toRemove = [];
  scene.traverse(obj => {
    if (obj.isMesh || obj.isCSS2DObject || obj.isLine) toRemove.push(obj);
  });
  toRemove.forEach(obj => {
    obj.parent?.remove(obj);
    obj.geometry?.dispose();
    if (obj.material) {
      if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
      else obj.material.dispose();
    }
  });
  measurementGroup = null;
  loadedMeshGroup = null;
}

// --- Measurements ---

// Render features (doors, openings, cabinets) as 3D geometry
let featureGroup = null;
function buildFeatures(room) {
  if (featureGroup) { featureGroup.parent?.remove(featureGroup); }
  featureGroup = new THREE.Group();
  const feats = room.features || [];
  if (feats.length === 0) return featureGroup;

  const FT = 1 / 3.28084;
  const FEATURE_COLORS = {
    door_frame: 0x34a853, cased_opening: 0x8BC34A, window: 0x00BCD4, cabinet_outline: 0xFF9800,
  };

  for (const feat of feats) {
    // Migrate old format
    const verts = feat.vertices || (feat.points ? feat.points.map(p => ({...p, snap: null})) : []);
    const edges = feat.edges || [];
    const faces = feat.faces || [];
    const color = FEATURE_COLORS[feat.type] || 0x34a853;

    // Render edges
    for (const [a, b] of edges) {
      if (a >= verts.length || b >= verts.length) continue;
      const pa = verts[a], pb = verts[b];
      const line = new THREE.Line(
        new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(pa.x*FT, pa.y*FT, pa.z*FT),
          new THREE.Vector3(pb.x*FT, pb.y*FT, pb.z*FT),
        ]),
        new THREE.LineBasicMaterial({ color, depthTest: false })
      );
      line.renderOrder = 10;
      featureGroup.add(line);
    }

    // Render vertices
    const sphereGeom = new THREE.SphereGeometry(0.02, 8, 8);
    for (const p of verts) {
      const sphere = new THREE.Mesh(sphereGeom, new THREE.MeshBasicMaterial({ color, depthTest: false }));
      sphere.position.set(p.x*FT, p.y*FT, p.z*FT);
      sphere.renderOrder = 11;
      featureGroup.add(sphere);
    }

    // Render faces
    for (const face of faces) {
      if (face.length < 3) continue;
      const faceVerts = face.map(vi => verts[vi]).filter(Boolean);
      if (faceVerts.length < 3) continue;
      const geom = new THREE.BufferGeometry();
      const positions = [];
      for (let i = 1; i < faceVerts.length - 1; i++) {
        positions.push(faceVerts[0].x*FT, faceVerts[0].y*FT, faceVerts[0].z*FT);
        positions.push(faceVerts[i].x*FT, faceVerts[i].y*FT, faceVerts[i].z*FT);
        positions.push(faceVerts[i+1].x*FT, faceVerts[i+1].y*FT, faceVerts[i+1].z*FT);
      }
      geom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      geom.computeVertexNormals();
      const faceMesh = new THREE.Mesh(geom, new THREE.MeshBasicMaterial({
        color, transparent: true, opacity: 0.2, side: THREE.DoubleSide, depthTest: false,
      }));
      faceMesh.renderOrder = 9;
      featureGroup.add(faceMesh);
    }

    // Label
    if (verts.length >= 2) {
      const cx = verts.reduce((s,p)=>s+p.x,0)/verts.length * FT;
      const cy = verts.reduce((s,p)=>s+p.y,0)/verts.length * FT;
      const cz = verts.reduce((s,p)=>s+p.z,0)/verts.length * FT;
      const xs = verts.map(p=>p.x), zs = verts.map(p=>p.z), ys = verts.map(p=>p.y);
      const w = Math.sqrt((Math.max(...xs)-Math.min(...xs))**2 + (Math.max(...zs)-Math.min(...zs))**2);
      const h = Math.max(...ys) - Math.min(...ys);
      const FEATURE_NAMES = { door_frame:'Door Frame', cased_opening:'Cased Opening', window:'Window', cabinet_outline:'Cabinet' };
      const name = FEATURE_NAMES[feat.type] || feat.type || 'Feature';
      const formatFt = (ft) => { const f=Math.floor(ft), i=Math.round((ft-f)*12); return i===0?`${f}'`:`${f}' ${i}"`; };
      let text = name;
      if (w > 0.1 || h > 0.1) text += ` ${formatFt(w)}×${formatFt(h)}`;
      const div = document.createElement('div');
      div.className = 'measure-label';
      div.style.background = `rgba(${(color>>16)&0xff},${(color>>8)&0xff},${color&0xff},0.85)`;
      div.textContent = text;
      const label = new CSS2DObject(div);
      label.position.set(cx, cy + 0.04, cz);
      featureGroup.add(label);
    }
  }
  return featureGroup;
}

function buildMeasurements(room, cornersM, floorY, ceilingY, ceilingHeightM) {
  measurementGroup = new THREE.Group();
  measurementGroup.visible = true;

  // Room center for nudging lines inward
  const roomCx = cornersM.reduce((s, p) => s + p[0], 0) / cornersM.length;
  const roomCz = cornersM.reduce((s, p) => s + p[1], 0) / cornersM.length;

  // Helper: nudge a corner point slightly toward room center so lines sit in front of walls
  const NUDGE = 0.005; // 5mm inward
  function nudge(x, z) {
    const dx = roomCx - x, dz = roomCz - z;
    const d = Math.sqrt(dx * dx + dz * dz) || 1;
    return [x + dx / d * NUDGE, z + dz / d * NUDGE];
  }

  // Line material that renders on top of surfaces (depthTest off, high renderOrder)
  function edgeMat(color) {
    const m = new THREE.LineBasicMaterial({ color, depthTest: false });
    return m;
  }

  // Edge outline: ceiling, floor, and vertical edges at each corner
  for (let i = 0; i < cornersM.length; i++) {
    const j = (i + 1) % cornersM.length;
    const [x0, z0] = cornersM[i];
    const [x1, z1] = cornersM[j];
    const [nx0, nz0] = nudge(x0, z0);
    const [nx1, nz1] = nudge(x1, z1);

    // Ceiling edge + wall length label
    const wallLen = Math.sqrt((x1-x0)**2 + (z1-z0)**2) * 3.28084; // back to feet
    const label = formatFtIn(wallLen);
    const mid = new THREE.Vector3((nx0+nx1)/2, ceilingY + 0.1, (nz0+nz1)/2);
    addLabel(label, mid, 'measure-label');

    const ceilLine = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(nx0, ceilingY, nz0),
        new THREE.Vector3(nx1, ceilingY, nz1),
      ]),
      edgeMat(0x2196F3),
    );
    ceilLine.renderOrder = 999;
    measurementGroup.add(ceilLine);

    // Floor edge — placed exactly at wall corners (no nudge, avoids parallax from above)
    const floorLine = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(x0, floorY, z0),
        new THREE.Vector3(x1, floorY, z1),
      ]),
      edgeMat(0x2196F3),
    );
    floorLine.renderOrder = 999;
    measurementGroup.add(floorLine);

    // Vertical edge at corner i — from exact floor to nudged ceiling
    const vertLine = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(x0, floorY, z0),
        new THREE.Vector3(nx0, ceilingY, nz0),
      ]),
      edgeMat(0x2196F3),
    );
    vertLine.renderOrder = 999;
    measurementGroup.add(vertLine);
  }

  // Ceiling height label — at first corner, nudged inward
  if (cornersM.length > 0) {
    const [nx, nz] = nudge(cornersM[0][0], cornersM[0][1]);
    // Nudge a bit more for the height label so it doesn't overlap the edge
    const dx = roomCx - cornersM[0][0], dz = roomCz - cornersM[0][1];
    const d = Math.sqrt(dx*dx + dz*dz) || 1;
    const hx = cornersM[0][0] + dx/d * 0.15;
    const hz = cornersM[0][1] + dz/d * 0.15;
    const label = formatFtIn(ceilingHeightM * 3.28084);
    const midPt = new THREE.Vector3(hx, (floorY + ceilingY) / 2, hz);
    addLabel(label, midPt, 'measure-label height');

    const heightLine = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(hx, floorY, hz),
        new THREE.Vector3(hx, ceilingY, hz),
      ]),
      edgeMat(0xFF9800),
    );
    heightLine.renderOrder = 999;
    measurementGroup.add(heightLine);
  }

  // Floor area label
  if (room.floor_area_sqft) {
    const cx = cornersM.reduce((s, p) => s + p[0], 0) / cornersM.length;
    const cz = cornersM.reduce((s, p) => s + p[1], 0) / cornersM.length;
    addLabel(`${Math.round(room.floor_area_sqft)} SF`, new THREE.Vector3(cx, floorY + 0.15, cz), 'measure-label area');
  }

  scene.add(measurementGroup);
}

function addLabel(text, position, className) {
  const div = document.createElement('div');
  div.className = className;
  div.textContent = text;
  const label = new CSS2DObject(div);
  label.position.copy(position);
  measurementGroup.add(label);
}

function formatFtIn(totalFt) {
  const ft = Math.floor(totalFt);
  const inches = Math.round((totalFt - ft) * 12);
  return inches === 0 ? `${ft}'` : `${ft}' ${inches}"`;
}

window.toggleMeasurements = function() {
  measurementsVisible = !measurementsVisible;
  if (measurementGroup) measurementGroup.visible = measurementsVisible;
  const btn = document.getElementById('btn-measures');
  btn.classList.toggle('active', measurementsVisible);
  btn.textContent = measurementsVisible ? 'Hide Measurements' : 'Show Measurements';
};

window.toggleViewMode = function() {
  isBirdsEye = !isBirdsEye;
  const btn = document.getElementById('btn-view-mode');

  if (isBirdsEye) {
    // Save current interior camera state
    savedInteriorCamPos = camera.position.clone();
    savedInteriorCamTarget = controls.target.clone();
    savedInteriorFov = camera.fov;

    // Compute bounding box of visible content
    const box = new THREE.Box3();
    if (activeContentGroup) box.expandByObject(activeContentGroup);
    const center = new THREE.Vector3();
    const size = new THREE.Vector3();
    box.getCenter(center);
    box.getSize(size);

    // Place camera well above ceiling, looking straight down
    const maxSpan = Math.max(size.x, size.z, 2);
    const camHeight = box.max.y + maxSpan * 1.5;
    camera.position.set(center.x, camHeight, center.z);
    controls.target.set(center.x, box.min.y, center.z);

    // FOV so the room appears small (~40% of viewport)
    const dist = camHeight - box.min.y;
    const aspect = camera.aspect;
    const fovFromV = 2 * Math.atan2(size.z / 2, dist);
    const fovFromH = 2 * Math.atan2(size.x / 2 / aspect, dist);
    const fovRad = Math.max(fovFromV, fovFromH) / 0.5;
    camera.fov = Math.min(Math.max(THREE.MathUtils.radToDeg(fovRad), 30), 120);
    camera.updateProjectionMatrix();

    // Switch to FrontSide so backface culling hides nearest surfaces (like comparison app)
    if (activeContentGroup) {
      activeContentGroup.traverse(child => {
        if (child.isMesh) {
          const mats = Array.isArray(child.material) ? child.material : [child.material];
          mats.forEach(m => { m.side = THREE.FrontSide; });
        }
      });
    }

    // Enable zoom and pan for birds eye navigation
    controls.enableZoom = true;
    controls.enablePan = true;
    controls.rotateSpeed = 0.5;
    controls.update();

    btn.classList.add('active');
    btn.textContent = '360 Tour';
  } else {
    // Restore interior look-around camera
    if (savedInteriorCamPos) {
      camera.position.copy(savedInteriorCamPos);
      controls.target.copy(savedInteriorCamTarget);
      camera.fov = savedInteriorFov;
      camera.updateProjectionMatrix();
    }

    // Restore DoubleSide for interior viewing (handles inconsistent winding)
    if (activeContentGroup) {
      activeContentGroup.traverse(child => {
        if (child.isMesh) {
          const mats = Array.isArray(child.material) ? child.material : [child.material];
          mats.forEach(m => { m.side = THREE.DoubleSide; });
        }
      });
    }

    // Restore interior-mode controls (rotate only)
    controls.enableZoom = false;
    controls.enablePan = false;
    controls.rotateSpeed = -0.3;
    controls.update();

    btn.classList.remove('active');
    btn.textContent = 'Birds Eye View';
  }
};

// --- OBJ Loading ---

function scanFilesBase(prefix) {
  const rfqId = getRfqId();
  const base = `${API_BASE}/api/rfqs/${rfqId}/scans/${currentScanId}/files/`;
  return prefix ? base + prefix + '/' : base;
}

function loadOBJMesh(objUrl, atlasUrl, showSpinner, targetGroup, isStandard) {
  const spinner = document.getElementById('viewer-spinner');
  if (showSpinner) { spinner.textContent = 'Loading...'; spinner.style.display = 'block'; }

  const parent = targetGroup || scene;

  // Use proxy for MTL + atlas so relative texture filenames resolve correctly
  const resourcePath = scanFilesBase(isStandard ? 'standard' : null);
  const mtlUrl = resourcePath + 'textured.mtl';

  const mtlLoader = new MTLLoader();
  mtlLoader.setResourcePath(resourcePath);
  mtlLoader.setCrossOrigin('anonymous');
  mtlLoader.load(mtlUrl, (materials) => {
    materials.preload();
    Object.values(materials.materials).forEach(mat => {
      if (mat.map) {
        mat.map.colorSpace = THREE.SRGBColorSpace;
        mat.map.needsUpdate = true;
      }
      mat.transparent = false;
      mat.opacity = 1.0;
      mat.side = THREE.DoubleSide;
    });

    const objLoader = new OBJLoader();
    objLoader.setMaterials(materials);
    objLoader.load(objUrl, (obj) => {
      parent.add(obj);
      spinner.style.display = 'none';
      console.log('OBJ loaded with materials');
    }, undefined, (err) => {
      console.error('OBJ load failed:', err);
      spinner.style.display = 'none';
    });
  }, undefined, (err) => {
    // Fallback: load OBJ with single atlas if MTL fails
    console.warn('MTL load failed, falling back to single atlas:', err);
    const texLoader = new THREE.TextureLoader();
    texLoader.crossOrigin = 'anonymous';
    const objLoader = new OBJLoader();
    objLoader.load(objUrl, (obj) => {
      if (atlasUrl) {
        const tex = texLoader.load(atlasUrl, () => { spinner.style.display = 'none'; });
        tex.colorSpace = THREE.SRGBColorSpace;
        const mat = new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide });
        obj.traverse(child => { if (child.isMesh) child.material = mat; });
      } else {
        spinner.style.display = 'none';
      }
      parent.add(obj);
    }, undefined, () => { spinner.style.display = 'none'; });
  });
}

window.toggleHD = function() {
  if (!currentTextureUrls) return;
  const btn = document.getElementById('btn-hd');
  isHD = !isHD;
  btn.classList.toggle('active', isHD);
  btn.textContent = isHD ? 'HD On' : 'HD';

  const cached = roomCache[activeRoomIndex];

  if (isHD && currentTextureUrls.obj_standard) {
    if (cached?.contentGroup) cached.contentGroup.visible = false;

    if (cached?.hdGroup) {
      cached.hdGroup.visible = true;
      activeContentGroup = cached.hdGroup;
      document.getElementById('viewer-spinner').style.display = 'none';
    } else {
      const hdGroup = new THREE.Group();
      scene.add(hdGroup);
      activeContentGroup = hdGroup;
      loadOBJMesh(currentTextureUrls.obj_standard, currentTextureUrls.atlas_standard, true, hdGroup, true);
      if (cached) { cached.hdGroup = hdGroup; cached.isHD = true; }
    }
  } else {
    if (cached?.hdGroup) cached.hdGroup.visible = false;
    if (cached?.contentGroup) {
      cached.contentGroup.visible = true;
      activeContentGroup = cached.contentGroup;
    }
    if (cached) cached.isHD = false;
    document.getElementById('viewer-spinner').style.display = 'none';
  }
};

// --- Isometric 3D Room View ---

let isoRenderer = null, isoScene = null, isoCamera = null;
let isoFullRenderer = null, isoFullControls = null, isoCssRenderer = null;
let isoRoomGroup = null, isoMeasureGroup = null;
let isoCenter = null;
let isoSpan = 1;
let isoFullscreen = false;

function buildIsoRoomGeometry(room) {
  const FT_TO_M = 1 / 3.28084;
  const M_TO_FT = 3.28084;
  const poly = room.room_polygon_ft;
  const cornersM = poly.map(([x, z]) => [x * FT_TO_M, z * FT_TO_M]);
  const ceilingHeightM = (room.ceiling_height_ft || 8) * FT_TO_M;
  const cornersYM = (room.wall_heights_ft || []).map(h => h * FT_TO_M);
  const avgCeilingY = cornersYM.length > 0 ? cornersYM.reduce((s, v) => s + v, 0) / cornersYM.length : ceilingHeightM;
  const floorY = avgCeilingY - ceilingHeightM;
  const n = cornersM.length;

  const group = new THREE.Group();
  const wallMat = new THREE.MeshPhongMaterial({ color: 0x4488cc, transparent: true, opacity: 0.35, side: THREE.DoubleSide });
  const floorMat = new THREE.MeshPhongMaterial({ color: 0x5599dd, transparent: true, opacity: 0.5, side: THREE.DoubleSide });
  const edgeMat = new THREE.LineBasicMaterial({ color: 0x88bbee });

  for (let i = 0; i < n; i++) {
    const j = (i + 1) % n;
    const [x0, z0] = cornersM[i], [x1, z1] = cornersM[j];
    const h0 = cornersYM[i] || avgCeilingY, h1 = cornersYM[j] || avgCeilingY;
    const verts = new Float32Array([x0,floorY,z0, x0,h0,z0, x1,h1,z1, x0,floorY,z0, x1,h1,z1, x1,floorY,z1]);
    const geom = new THREE.BufferGeometry();
    geom.setAttribute('position', new THREE.BufferAttribute(verts, 3));
    geom.computeVertexNormals();
    group.add(new THREE.Mesh(geom, wallMat));
    group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x0,h0,z0), new THREE.Vector3(x1,h1,z1)]), edgeMat));
    group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x0,floorY,z0), new THREE.Vector3(x1,floorY,z1)]), edgeMat));
    group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x0,floorY,z0), new THREE.Vector3(x0,h0,z0)]), edgeMat));
  }

  const cx = cornersM.reduce((s, p) => s + p[0], 0) / n;
  const cz = cornersM.reduce((s, p) => s + p[1], 0) / n;
  const fv = [];
  for (let i = 0; i < n; i++) { const j = (i+1)%n; fv.push(cx,floorY,cz, cornersM[i][0],floorY,cornersM[i][1], cornersM[j][0],floorY,cornersM[j][1]); }
  const fg = new THREE.BufferGeometry(); fg.setAttribute('position', new THREE.Float32BufferAttribute(fv, 3)); fg.computeVertexNormals();
  group.add(new THREE.Mesh(fg, floorMat));

  // Camera indicator
  const indicator = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), new THREE.MeshBasicMaterial({ color: 0xff3333 }));
  indicator.name = 'camIndicator';
  group.add(indicator);
  const lookLine = new THREE.Line(
    new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3(0,0,-0.4)]),
    new THREE.LineBasicMaterial({ color: 0xff3333 })
  );
  lookLine.name = 'camLookLine';
  group.add(lookLine);

  // Measurements (CSS2D labels) — separate group
  const measures = new THREE.Group();
  for (let i = 0; i < n; i++) {
    const j = (i + 1) % n;
    const [x0, z0] = cornersM[i], [x1, z1] = cornersM[j];
    const h0 = cornersYM[i] || avgCeilingY, h1 = cornersYM[j] || avgCeilingY;
    const wallLen = Math.sqrt((x1-x0)**2 + (z1-z0)**2) * M_TO_FT;
    if (wallLen < 0.5) continue;
    const div = document.createElement('div');
    div.className = 'measure-label';
    div.textContent = formatFtIn(wallLen);
    const label = new CSS2DObject(div);
    label.position.set((x0+x1)/2, (h0+h1)/2 + 0.08, (z0+z1)/2);
    measures.add(label);
  }
  // Height label at first significant corner
  if (n > 0) {
    const hDiv = document.createElement('div');
    hDiv.className = 'measure-label height';
    hDiv.textContent = formatFtIn(ceilingHeightM * M_TO_FT);
    const hLabel = new CSS2DObject(hDiv);
    hLabel.position.set(cornersM[0][0], (floorY + avgCeilingY) / 2, cornersM[0][1]);
    measures.add(hLabel);
  }
  // Floor area
  if (room.floor_area_sqft) {
    const aDiv = document.createElement('div');
    aDiv.className = 'measure-label area';
    aDiv.textContent = `${Math.round(room.floor_area_sqft)} SF`;
    const aLabel = new CSS2DObject(aDiv);
    aLabel.position.set(cx, floorY + 0.05, cz);
    measures.add(aLabel);
  }

  let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
  cornersM.forEach(([x, z]) => { minX = Math.min(minX, x); maxX = Math.max(maxX, x); minZ = Math.min(minZ, z); maxZ = Math.max(maxZ, z); });

  return {
    group, measures,
    center: { x: (minX+maxX)/2, y: (floorY+avgCeilingY)/2, z: (minZ+maxZ)/2 },
    span: Math.max(maxX-minX, maxZ-minZ, ceilingHeightM) * 0.8,
  };
}

function updateIsoView(room) {
  const thumb = document.getElementById('corner-thumb');
  if (!room?.room_polygon_ft || room.room_polygon_ft.length < 3) {
    thumb.style.display = 'none'; return;
  }
  thumb.style.display = 'block';
  document.getElementById('thumb-label').textContent = isoFullscreen ? '3D Texture' : '3D Model';

  if (!isoScene) {
    isoScene = new THREE.Scene();
    isoScene.background = new THREE.Color(0x1a1a1a);
    isoScene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const d = new THREE.DirectionalLight(0xffffff, 0.4); d.position.set(1,2,1); isoScene.add(d);
  }
  if (isoRoomGroup) { isoScene.remove(isoRoomGroup); }
  if (isoMeasureGroup) {
    // Dispose CSS2D label DOM elements to prevent them lingering on screen
    isoMeasureGroup.traverse(obj => {
      if (obj.isCSS2DObject && obj.element?.parentNode) {
        obj.element.parentNode.removeChild(obj.element);
      }
    });
    isoScene.remove(isoMeasureGroup);
  }

  const built = buildIsoRoomGeometry(room);
  isoRoomGroup = built.group;
  isoMeasureGroup = built.measures;
  isoMeasureGroup.visible = isoFullscreen; // only show in fullscreen
  isoCenter = built.center;
  isoSpan = built.span;
  isoScene.add(isoRoomGroup);
  isoScene.add(isoMeasureGroup);

  if (!isoRenderer) {
    isoRenderer = new THREE.WebGLRenderer({ canvas: document.getElementById('iso-canvas'), antialias: true });
    isoRenderer.setPixelRatio(window.devicePixelRatio);
  }
  isoRenderer.setSize(thumb.clientWidth, thumb.clientHeight);

  if (!isoCamera) {
    isoCamera = new THREE.OrthographicCamera(-1,1,1,-1, 0.01, 100);
  }
  const s = isoSpan;
  const thumbAspect = (thumb.clientWidth || 160) / (thumb.clientHeight || 120);
  isoCamera.left = -s; isoCamera.right = s;
  isoCamera.top = s / thumbAspect; isoCamera.bottom = -s / thumbAspect;
  isoCamera.updateProjectionMatrix();

  if (!isoFullRenderer) {
    const fCanvas = document.getElementById('iso-full-canvas');
    const fContainer = document.getElementById('iso-fullscreen');
    isoFullRenderer = new THREE.WebGLRenderer({ canvas: fCanvas, antialias: true });
    isoFullRenderer.setPixelRatio(window.devicePixelRatio);
    isoFullRenderer.setSize(fContainer.clientWidth, fContainer.clientHeight);

    isoCssRenderer = new CSS2DRenderer();
    isoCssRenderer.setSize(fContainer.clientWidth, fContainer.clientHeight);
    isoCssRenderer.domElement.style.position = 'absolute';
    isoCssRenderer.domElement.style.top = '0';
    isoCssRenderer.domElement.style.left = '0';
    isoCssRenderer.domElement.style.pointerEvents = 'none';
    fContainer.appendChild(isoCssRenderer.domElement);

    isoFullControls = new OrbitControls(isoCamera, fCanvas);
    isoFullControls.enableDamping = true;
    isoFullControls.dampingFactor = 0.1;
  }
}

function syncIsoCamera() {
  if (!isoCamera || !isoCenter || !camera) return;
  if (isoFullscreen) {
    isoFullControls.update();
  } else {
    const forward = new THREE.Vector3();
    camera.getWorldDirection(forward);
    const yaw = Math.atan2(forward.x, forward.z);
    const dist = isoSpan * 2;
    const pitch = 0.6;
    isoCamera.position.set(
      isoCenter.x + Math.sin(yaw + Math.PI) * dist * Math.cos(pitch),
      isoCenter.y + dist * Math.sin(pitch),
      isoCenter.z + Math.cos(yaw + Math.PI) * dist * Math.cos(pitch)
    );
    isoCamera.lookAt(isoCenter.x, isoCenter.y, isoCenter.z);
    isoCamera.updateProjectionMatrix();
  }

  if (isoRoomGroup && camera) {
    const indicator = isoRoomGroup.getObjectByName('camIndicator');
    const lookLine = isoRoomGroup.getObjectByName('camLookLine');
    if (indicator) indicator.position.copy(camera.position);
    if (lookLine) {
      lookLine.position.copy(camera.position);
      const fwd = new THREE.Vector3();
      camera.getWorldDirection(fwd);
      lookLine.lookAt(camera.position.x + fwd.x, camera.position.y, camera.position.z + fwd.z);
    }
  }
}

function renderIso() {
  if (!isoScene || !isoCamera) return;
  syncIsoCamera();
  if (isoFullscreen && isoFullRenderer) {
    const c = document.getElementById('iso-fullscreen');
    const fw = c.clientWidth, fh = c.clientHeight;
    isoFullRenderer.setSize(fw, fh);
    // Update ortho camera aspect for fullscreen
    const fAspect = (fw || 1) / (fh || 1);
    const s = isoSpan;
    isoCamera.left = -s * fAspect; isoCamera.right = s * fAspect;
    isoCamera.top = s; isoCamera.bottom = -s;
    isoCamera.updateProjectionMatrix();
    isoFullRenderer.render(isoScene, isoCamera);
    if (isoCssRenderer) {
      isoCssRenderer.setSize(c.clientWidth, c.clientHeight);
      isoCssRenderer.render(isoScene, isoCamera);
    }
    // Render main 3D scene into corner thumbnail
    if (isoRenderer && renderer && scene && camera) {
      const thumb = document.getElementById('corner-thumb');
      isoRenderer.setSize(thumb.clientWidth, thumb.clientHeight);
      isoRenderer.render(scene, camera);
    }
  } else if (isoRenderer) {
    // Update ortho camera aspect for mini thumbnail
    const thumb = document.getElementById('corner-thumb');
    const tw = thumb.clientWidth || 160, th = thumb.clientHeight || 120;
    const tAspect = tw / th;
    const s = isoSpan;
    isoCamera.left = -s; isoCamera.right = s;
    isoCamera.top = s / tAspect; isoCamera.bottom = -s / tAspect;
    isoCamera.updateProjectionMatrix();
    isoRenderer.setSize(tw, th);
    isoRenderer.render(isoScene, isoCamera);
  }
}

window.toggleIsoFullscreen = function() {
  isoFullscreen = !isoFullscreen;
  const thumb = document.getElementById('corner-thumb');
  document.getElementById('iso-fullscreen').classList.toggle('active', isoFullscreen);
  document.getElementById('thumb-label').textContent = isoFullscreen ? '3D Texture' : '3D Model';
  // Always keep thumbnail visible
  thumb.style.display = 'block';

  if (isoMeasureGroup) isoMeasureGroup.visible = isoFullscreen;

  if (isoFullscreen && isoFullControls && isoCenter) {
    isoFullControls.target.set(isoCenter.x, isoCenter.y, isoCenter.z);
    const s = isoSpan * 2;
    isoCamera.position.set(isoCenter.x + s*0.7, isoCenter.y + s*0.5, isoCenter.z + s*0.7);
    isoFullControls.update();
    const c = document.getElementById('iso-fullscreen');
    isoFullRenderer.setSize(c.clientWidth, c.clientHeight);
  }
};
