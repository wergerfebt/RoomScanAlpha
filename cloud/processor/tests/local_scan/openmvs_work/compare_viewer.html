<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A/B: Original ARKit Poses vs COLMAP Refined</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; overflow: hidden; font-family: -apple-system, sans-serif; }
  .container { display: flex; height: 100vh; }
  .panel { flex: 1; position: relative; border-right: 2px solid #333; }
  .panel:last-child { border-right: none; }
  .label { position: absolute; top: 8px; left: 8px; z-index: 10; padding: 6px 12px;
           border-radius: 4px; font-size: 13px; font-weight: 700; }
  .original { background: #c0392b; color: #fff; }
  .refined { background: #27ae60; color: #fff; }
  canvas { display: block; width: 100%; height: 100%; }
  .hint { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
          background: rgba(0,0,0,0.8); color: #888; font-size: 11px; padding: 4px 12px;
          border-radius: 4px; z-index: 10; }
</style>
</head>
<body>
<div class="container">
  <div class="panel" id="p1"><div class="label original">ORIGINAL (ARKit poses)</div></div>
  <div class="panel" id="p2"><div class="label refined">REFINED (COLMAP BA)</div></div>
</div>
<div class="hint">Drag to look around — check light switch, diplomas, tapestry for duplication</div>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
import { MTLLoader } from 'three/addons/loaders/MTLLoader.js';

const CX = -0.349, CY = 0.264, CZ = 0.584;

function createView(container, mtlFile, objFile) {
  const w = container.clientWidth, h = container.clientHeight;
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(w, h);
  renderer.setPixelRatio(window.devicePixelRatio);
  container.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x111111);
  const camera = new THREE.PerspectiveCamera(80, w / h, 0.01, 100);
  camera.position.set(CX, CY, CZ);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(CX + 0.01, CY, CZ);
  controls.enableZoom = false;
  controls.enablePan = false;
  controls.rotateSpeed = -0.5;
  controls.update();

  const mtlLoader = new MTLLoader();
  mtlLoader.load(mtlFile, (materials) => {
    materials.preload();
    const objLoader = new OBJLoader();
    objLoader.setMaterials(materials);
    objLoader.load(objFile, (obj) => {
      obj.traverse(child => {
        if (child.isMesh && child.material.map) {
          child.material = new THREE.MeshBasicMaterial({
            map: child.material.map, side: THREE.DoubleSide
          });
        }
      });
      scene.add(obj);
    });
  });

  return { renderer, scene, camera, controls };
}

const views = [
  createView(document.getElementById('p1'), 'textured_smooth.mtl', 'textured_smooth.obj'),
  createView(document.getElementById('p2'), 'textured_refined.mtl', 'textured_refined.obj'),
];

function syncFrom(src) {
  views.forEach(v => {
    if (v === src) return;
    v.camera.position.copy(src.camera.position);
    v.camera.quaternion.copy(src.camera.quaternion);
    v.controls.target.copy(src.controls.target);
    v.controls.update();
  });
}
views.forEach(v => v.controls.addEventListener('change', () => syncFrom(v)));

function animate() {
  requestAnimationFrame(animate);
  views.forEach(v => v.renderer.render(v.scene, v.camera));
}
animate();

window.addEventListener('resize', () => {
  views.forEach(v => {
    const p = v.renderer.domElement.parentElement;
    v.renderer.setSize(p.clientWidth, p.clientHeight);
    v.camera.aspect = p.clientWidth / p.clientHeight;
    v.camera.updateProjectionMatrix();
  });
});
</script>
</body>
</html>
